# =============================================================================
# reach_layer/config/domain.yaml — Domain-specific Reach Layer config.
# =============================================================================
# Contains DOMAIN-specific values only: UI branding, spoken/displayed text,
# language/voice choice, and the domain identifier itself. Infrastructure
# concerns (endpoints, ports, timeouts, protocol flags) live in dpg.yaml
# and are NOT duplicated here.
#
# This file is the local-dev baseline. At deploy time it is replaced by a
# volume-mounted copy of `dev-kit/configs/<domain>/reach_layer.yaml`.
#
# Every domain-overridable key is listed with either a sensible English
# default (active) or commented examples showing the expected shape. When
# you add a new domain, copy this file into `dev-kit/configs/<domain>/` and
# replace the values.
# =============================================================================

reach_layer:

  # ---------------------------------------------------------------------------
  # Shared
  # ---------------------------------------------------------------------------
  common:
    observability:
      domain: "local"                # Domain identifier (e.g. "kkb", "farmer_friendly").

  # ---------------------------------------------------------------------------
  # Per-channel — domain-specific values only
  # ---------------------------------------------------------------------------
  channels:

    # ─── CLI ─────────────────────────────────────────────────────────────────
    cli:
      prompt: "You: "
      agent_prefix: "Agent: "

    # ─── Web ─────────────────────────────────────────────────────────────────
    web:
      auth:
        enabled: false               # flip to true to require Google SSO
        google_client_id: ""         # OAuth client ID for the domain's Google project
        cookie_secure: false         # local dev runs on plain http://localhost; prod keeps true

      ui:
        app_name: "DPG Reach"
        app_tagline: "Conversational AI"
        app_icon: "💬"
        agent_avatar: "🤖"
        user_avatar: "👤"
        setup_heading: "Start a session"
        setup_subtitle: "Enter your user ID to begin. Returning users will have their previous conversation restored automatically."
        user_id_placeholder: "your_user_id"
        user_id_hint: "Use the same ID across sessions to restore your conversation history."
        start_btn_label: "Start chatting →"
        new_session_msg: "New session started. How can I help you today?"
        returning_user_msg: "Welcome back! Continuing your previous conversation."
        storage_key: "dpg_user_id"
        theme_storage_key: "dpg_theme"
        new_chat_label: "New chat"
        conversations_heading: "Conversations"
        no_conversations_msg: "No previous chats"
        delete_conversation_confirm: "Delete this conversation? This cannot be undone."
        delete_conversation_tooltip: "Delete conversation"
        sign_out_confirm: "Sign out of your account?"
        switch_user_confirm: "Switch user? Your current session will be closed."

    # ─── Voice ───────────────────────────────────────────────────────────────
    voice:
      raya:
        # stt_language: "hi"           # STT supports: en, hi, mr, ta, te, kn, gu, bn, ml, ...
        # tts_language: "hi"           # TTS language must match voice locale
        # voice_id: "d6a002d0-230c-49b1-a137-b8a7d564b1ae"  # Priyanka, hi
        # --- English ---
        stt_language: "en"
        tts_language: "en-us"
        voice_id: "97a155d0-8192-410e-a97c-540481182fc7"  # Liam, us
        # --- Marathi ---
        # stt_language: "mr"
        # tts_language: "mr"
        # voice_id: "c849b31b-b0ba-488f-b97d-3fd12f2656f4"
      agent_core:
        greeting: "Hello! I am Kaam Ki Baat. How can I help you today?"
        fallback_phrase: "I'm sorry, I couldn't understand that. Please try again."
