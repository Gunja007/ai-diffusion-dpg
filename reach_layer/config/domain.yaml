# =============================================================================
# reach_layer/config/domain.yaml — Domain-specific Reach Layer config template.
# =============================================================================
# Contains domain-specific values only: UI branding, spoken/displayed text,
# language/voice choice, and the domain identifier itself.
# Infrastructure concerns (endpoints, ports, timeouts, protocol flags) live in
# dpg.yaml and are NOT duplicated here.
#
# For local dev, set CONFIG_FOLDER in .env.local to point to your domain configs folder.
# At deploy time this file is replaced by dev-kit/configs/<domain>/reach_layer.yaml.
#
# The full annotated reference is in dev-kit/dev_kit/schemas/reach_layer.yaml.
# =============================================================================

reach_layer:

  # ---------------------------------------------------------------------------
  # Shared
  # ---------------------------------------------------------------------------
  common:
    observability:
      domain: ""  # Required. Domain identifier (e.g. "kkb", "farmer_friendly").

  # ---------------------------------------------------------------------------
  # Per-channel — domain-specific values only
  # ---------------------------------------------------------------------------
  channels:

    # ── CLI ───────────────────────────────────────────────────────────────────
    cli:
      prompt: "You: "           # Prompt prefix shown before user input.
      agent_prefix: "Agent: "   # Prefix shown before agent replies.

    # ── Web ───────────────────────────────────────────────────────────────────
    web:
      auth:
        enabled: false           # Set true to require Google SSO.
        google_client_id: ""     # OAuth client ID for the domain's Google project.
        cookie_secure: false     # Set false for local http://localhost; true for production TLS.

      ui:
        app_name: ""                       # Required. Display name shown in browser tab and header.
        app_tagline: ""                    # Required. Short subtitle shown under the app name.
        app_icon: ""                       # Required. Emoji representing the app, e.g. 🌾 💊 💼
        agent_avatar: ""                   # Emoji shown on agent chat bubbles.
        user_avatar: "👤"                  # Emoji shown on user chat bubbles.
        setup_heading: ""                  # Heading on the user ID setup screen.
        setup_subtitle: ""                 # Subtitle under the setup heading.
        user_id_placeholder: ""            # Hint text in the user ID input field.
        user_id_hint: ""                   # Secondary hint below the user ID field.
        start_btn_label: "Start chatting →"  # Label on the start/enter button.
        new_session_msg: ""                # First message shown to a brand new user.
        returning_user_msg: ""             # First message shown to a returning user.
        storage_key: ""                    # localStorage key for persisting the user ID.
        theme_storage_key: ""              # localStorage key for persisting the theme.
        sign_out_confirm: ""               # Confirmation prompt for sign-out action.
        switch_user_confirm: ""            # Confirmation prompt for switch-user action.
        delete_conversation_confirm: ""    # Confirmation prompt for delete-conversation action.

    # ── Voice ─────────────────────────────────────────────────────────────────
    voice:
      raya:
        stt_language: ""         # Required for voice. BCP-47 language code for STT, e.g. "hi", "en", "kn".
        tts_language: ""         # Required for voice. BCP-47 language code for TTS, e.g. "hi", "en-us".
        voice_id: ""             # Required for voice. Voice ID for the TTS provider.
                                 # English example: "97a155d0-8192-410e-a97c-540481182fc7" (Liam, us)
                                 # Hindi example:   "d6a002d0-230c-49b1-a137-b8a7d564b1ae" (Priyanka, hi)
      agent_core:
        timeout_ms: 15000        # Timeout for Agent Core responses during voice turns (ms).
        greeting: ""             # Required for voice. First message spoken when voice session starts.
        fallback_phrase: ""      # Required for voice. Spoken when STT fails or input is unintelligible.
