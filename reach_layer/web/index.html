<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DPG Chat</title>
  <style>
    /* ------------------------------------------------------------------ */
    /* Reset & base                                                         */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f1117;
      --surface:      #1a1d27;
      --surface-2:    #242736;
      --border:       #2e3147;
      --accent:       #6366f1;
      --accent-hover: #4f52d8;
      --accent-light: rgba(99,102,241,0.12);
      --text:         #e8eaf6;
      --text-muted:   #8b91b0;
      --bubble-user:  #6366f1;
      --bubble-agent: #242736;
      --danger:       #f87171;
      --success:      #34d399;
      --radius:       12px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ------------------------------------------------------------------ */
    /* Screens — shown/hidden via .active                                   */
    /* ------------------------------------------------------------------ */
    .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .screen.active { display: flex; }

    /* ------------------------------------------------------------------ */
    /* Loading screen                                                       */
    /* ------------------------------------------------------------------ */
    #loading-screen {
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--bg);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-screen p {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ------------------------------------------------------------------ */
    /* Setup screen                                                         */
    /* ------------------------------------------------------------------ */
    #setup-screen {
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
    }

    .setup-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .setup-card h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -0.4px;
    }

    .setup-card p.subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text);
      font-family: var(--font);
      outline: none;
      transition: border-color 0.15s;
    }

    .field input::placeholder { color: var(--text-muted); }
    .field input:focus { border-color: var(--accent); }

    .field-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ------------------------------------------------------------------ */
    /* Chat screen                                                          */
    /* ------------------------------------------------------------------ */
    #chat-screen { background: var(--bg); }

    /* Header */
    .chat-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
    }

    .btn-switch-user {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-switch-user:hover { color: var(--text); border-color: var(--text-muted); }

    .header-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }

    /* Message list */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message-row {
      display: flex;
      margin-bottom: 12px;
      align-items: flex-end;
      gap: 8px;
    }

    .message-row.user { justify-content: flex-end; }
    .message-row.agent { justify-content: flex-start; }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .msg-col {
      display: flex;
      flex-direction: column;
      max-width: min(75%, 520px);
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }

    .message-row.user .bubble {
      background: var(--bubble-user);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message-row.agent .bubble {
      background: var(--bubble-agent);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    .bubble.error { background: rgba(248,113,113,0.15); color: var(--danger); border-color: rgba(248,113,113,0.3); }
    .bubble.system { background: var(--accent-light); color: var(--text-muted); font-size: 12px; font-style: italic; border-color: transparent; }

    .bubble-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
      text-align: right;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 14px;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* Input area */
    .input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 10px 18px;
      font-size: 14px;
      color: var(--text);
      font-family: var(--font);
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    #user-input::placeholder { color: var(--text-muted); }
    #user-input:focus { border-color: var(--accent); }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:active { transform: scale(0.92); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    #send-btn svg { color: #fff; }

    /* ------------------------------------------------------------------ */
    /* Responsive                                                           */
    /* ------------------------------------------------------------------ */
    @media (min-width: 640px) {
      #messages { padding: 24px 24px; }
      .input-area { padding: 16px 24px; }
      .chat-header { padding: 16px 24px; }
    }
  </style>
</head>
<body>

<!-- ===================================================================== -->
<!-- Loading screen                                                          -->
<!-- ===================================================================== -->
<div id="loading-screen" class="screen">
  <div class="spinner"></div>
  <p id="loading-msg">Loading…</p>
</div>

<!-- ===================================================================== -->
<!-- Setup screen                                                            -->
<!-- ===================================================================== -->
<div id="setup-screen" class="screen">
  <div class="setup-card">
    <div class="logo">
      <div class="logo-icon" id="cfg-logo-icon"></div>
      <div>
        <div class="logo-text" id="cfg-app-name"></div>
        <div class="logo-sub" id="cfg-app-tagline"></div>
      </div>
    </div>

    <h1 id="cfg-setup-heading"></h1>
    <p class="subtitle" id="cfg-setup-subtitle"></p>

    <div class="field">
      <label for="user-id-input">User ID</label>
      <input type="text" id="user-id-input" autocomplete="username" />
      <div class="field-hint" id="cfg-user-id-hint"></div>
    </div>

    <button class="btn-primary" id="start-btn" onclick="startSession()"></button>
  </div>
</div>

<!-- ===================================================================== -->
<!-- Chat screen                                                             -->
<!-- ===================================================================== -->
<div id="chat-screen" class="screen">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="header-icon" id="cfg-header-icon"></div>
      <div>
        <div class="header-title" id="cfg-header-title"></div>
        <div class="header-meta" id="header-meta">
          <span class="status-dot"></span>Connected
        </div>
      </div>
    </div>
    <button class="btn-switch-user" onclick="switchUser()" title="Switch user">← Switch user</button>
  </div>

  <div id="messages"></div>

  <div class="input-area">
    <textarea
      id="user-input"
      rows="1"
      placeholder="Type your message…"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Send">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
        <path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576zm6.787-8.201L1.591 6.602l4.339 2.76z"/>
      </svg>
    </button>
  </div>
</div>

<!-- ===================================================================== -->
<!-- App logic                                                               -->
<!-- ===================================================================== -->
<script>
  "use strict";

  // -----------------------------------------------------------------------
  // State
  // -----------------------------------------------------------------------
  let SESSION_ID = null;
  let USER_ID    = null;
  let isSending  = false;

  // UI config fetched from /app-config at boot; framework defaults as fallback.
  let UI_CFG = {
    app_name: "DPG Chat",
    app_tagline: "AI Assistant",
    app_icon: "💬",
    agent_avatar: "🤖",
    user_avatar: "👤",
    setup_heading: "Start a session",
    setup_subtitle: "Enter your user ID to begin. Returning users will have their previous conversation restored automatically.",
    user_id_placeholder: "Enter your user ID",
    user_id_hint: "Use the same ID across sessions to restore your conversation history.",
    start_btn_label: "Start chatting →",
    new_session_msg: "New session started. How can I help you today?",
    returning_user_msg: "Welcome back! Continuing your previous conversation.",
    storage_key: "dpg_user_id",
  };

  async function loadUiConfig() {
    try {
      const res  = await fetch("/app-config");
      const data = await res.json();
      UI_CFG = Object.assign(UI_CFG, data);
    } catch (_) {
      // silently fall back to hardcoded defaults above
    }
  }

  function applyUiConfig() {
    document.title = UI_CFG.app_name;
    document.getElementById("cfg-logo-icon").textContent    = UI_CFG.app_icon;
    document.getElementById("cfg-app-name").textContent     = UI_CFG.app_name;
    document.getElementById("cfg-app-tagline").textContent  = UI_CFG.app_tagline;
    document.getElementById("cfg-setup-heading").textContent   = UI_CFG.setup_heading;
    document.getElementById("cfg-setup-subtitle").textContent  = UI_CFG.setup_subtitle;
    document.getElementById("cfg-user-id-hint").textContent    = UI_CFG.user_id_hint;
    document.getElementById("user-id-input").placeholder       = UI_CFG.user_id_placeholder;
    document.getElementById("start-btn").textContent           = UI_CFG.start_btn_label;
    document.getElementById("cfg-header-icon").textContent     = UI_CFG.app_icon;
    document.getElementById("cfg-header-title").textContent    = UI_CFG.app_name;
  }

  // -----------------------------------------------------------------------
  // Screen helpers
  // -----------------------------------------------------------------------
  function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function setLoadingMsg(msg) {
    document.getElementById("loading-msg").textContent = msg;
  }

  // -----------------------------------------------------------------------
  // Boot — decide which screen to show
  // -----------------------------------------------------------------------
  async function boot() {
    await loadUiConfig();
    applyUiConfig();

    // Check localStorage for a previously set user_id
    const storedUserId = localStorage.getItem(UI_CFG.storage_key);

    if (!storedUserId) {
      // Fresh visitor — show setup
      showScreen("setup-screen");
      return;
    }

    // Returning visitor — try to restore session
    showScreen("loading-screen");
    setLoadingMsg("Restoring your session…");

    USER_ID = storedUserId;
    await fetchUserHistory(storedUserId);
  }

  // -----------------------------------------------------------------------
  // Session start (from setup form)
  // -----------------------------------------------------------------------
  async function startSession() {
    const input    = document.getElementById("user-id-input");
    const startBtn = document.getElementById("start-btn");
    const rawId    = input.value.trim();

    USER_ID = rawId || ("guest_" + Math.random().toString(36).slice(2, 8));
    localStorage.setItem(UI_CFG.storage_key, USER_ID);

    startBtn.disabled = true;
    showScreen("loading-screen");
    setLoadingMsg("Setting up your session…");

    await fetchUserHistory(USER_ID);
  }

  // -----------------------------------------------------------------------
  // Fetch user history (Memory Layer via Reach Layer proxy)
  // -----------------------------------------------------------------------
  async function fetchUserHistory(userId) {
    try {
      const res  = await fetch(`/user-history/${encodeURIComponent(userId)}`);
      const data = await res.json();

      if (data.session_id) {
        SESSION_ID = data.session_id;
        openChat(data.turns || []);
      } else {
        SESSION_ID = generateUUID();
        openChat([]);
      }
    } catch (err) {
      console.error("fetchUserHistory error:", err);
      SESSION_ID = generateUUID();
      openChat([]);
    }
  }

  // -----------------------------------------------------------------------
  // Open chat screen with optional history
  // -----------------------------------------------------------------------
  function openChat(turns) {
    updateHeaderMeta();
    showScreen("chat-screen");
    document.getElementById("user-input").focus();

    if (turns.length === 0) {
      appendSystemMsg(UI_CFG.new_session_msg);
    } else {
      for (const turn of turns) {
        if (turn.user_message) appendBubble("user", turn.user_message, turn.timestamp);
        if (turn.system_message) appendBubble("agent", turn.system_message, turn.timestamp);
      }
      appendSystemMsg(UI_CFG.returning_user_msg);
      scrollToBottom();
    }
  }

  // -----------------------------------------------------------------------
  // Send a message
  // -----------------------------------------------------------------------
  async function sendMessage() {
    if (isSending) return;
    const textarea = document.getElementById("user-input");
    const text     = textarea.value.trim();
    if (!text) return;

    textarea.value = "";
    autoResize(textarea);

    isSending = true;
    setSendDisabled(true);

    appendBubble("user", text);

    const typingId = appendTypingIndicator();

    try {
      const res  = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          session_id: SESSION_ID,
          user_id: USER_ID || null,
          message: text,
        }),
      });
      const data = await res.json();

      removeTyping(typingId);

      if (data.was_escalated) {
        appendBubble("agent", data.response_text || "Escalated to human agent.", null, true);
      } else {
        appendBubble("agent", data.response_text || "(no response)");
      }
    } catch (err) {
      removeTyping(typingId);
      appendBubble("agent", "[Connection error. Please check your network and try again.]", null, false, true);
    } finally {
      isSending = false;
      setSendDisabled(false);
      document.getElementById("user-input").focus();
    }
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // -----------------------------------------------------------------------
  // DOM helpers
  // -----------------------------------------------------------------------
  function appendBubble(role, text, timestamp, escalated, error) {
    const messages = document.getElementById("messages");
    const row      = document.createElement("div");
    row.className  = `message-row ${role}`;

    const now = timestamp ? new Date(timestamp) : new Date();
    const timeStr = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

    if (role === "agent") {
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = UI_CFG.agent_avatar;
      row.appendChild(avatar);
    }

    const col = document.createElement("div");
    col.className = "msg-col";

    const bubble = document.createElement("div");
    bubble.className = "bubble" + (error ? " error" : "");
    bubble.textContent = text;
    col.appendChild(bubble);

    const time = document.createElement("div");
    time.className = "bubble-time";
    time.textContent = timeStr;
    col.appendChild(time);

    row.appendChild(col);

    if (role === "user") {
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = UI_CFG.user_avatar;
      row.appendChild(avatar);
    }

    messages.appendChild(row);
    scrollToBottom();
    return row;
  }

  function appendSystemMsg(text) {
    const messages = document.getElementById("messages");
    const row      = document.createElement("div");
    row.className  = "message-row agent";

    const bubble = document.createElement("div");
    bubble.className = "bubble system";
    bubble.textContent = text;
    row.appendChild(bubble);
    messages.appendChild(row);
    scrollToBottom();
  }

  function appendTypingIndicator() {
    const messages = document.getElementById("messages");
    const id       = "typing-" + Date.now();
    const row      = document.createElement("div");
    row.id         = id;
    row.className  = "message-row agent";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = UI_CFG.agent_avatar;
    row.appendChild(avatar);

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    row.appendChild(bubble);

    messages.appendChild(row);
    scrollToBottom();
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function scrollToBottom() {
    const messages = document.getElementById("messages");
    messages.scrollTop = messages.scrollHeight;
  }

  function setSendDisabled(disabled) {
    document.getElementById("send-btn").disabled = disabled;
    document.getElementById("user-input").disabled = disabled;
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  }

  function updateHeaderMeta() {
    const el = document.getElementById("header-meta");
    el.textContent = "";
    const dot = document.createElement("span");
    dot.className = "status-dot";
    el.appendChild(dot);
    el.appendChild(document.createTextNode("Connected" + (USER_ID ? ` · ${USER_ID}` : "")));
  }

  function switchUser() {
    localStorage.removeItem(UI_CFG.storage_key);
    USER_ID = null;
    SESSION_ID = null;
    document.getElementById("messages").innerHTML = "";
    document.getElementById("user-id-input").value = "";
    document.getElementById("start-btn").disabled = false;
    showScreen("setup-screen");
  }

  // -----------------------------------------------------------------------
  // UUID helper
  // -----------------------------------------------------------------------
  function generateUUID() {
    if (crypto && crypto.randomUUID) return crypto.randomUUID();
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16);
    });
  }

  // -----------------------------------------------------------------------
  // Start
  // -----------------------------------------------------------------------
  boot();
</script>
</body>
</html>
