# action_gateway/config/dpg.yaml — DPG framework defaults.

server:
  host: 0.0.0.0
  port: 9999

tools: []

action_gateway:
  timeout_ms: 5000

response:
  default_max_size_chars: 4000

# Observability — OTel collector endpoint for trace/metric export.
observability:
  otel:
    collector_endpoint: "http://localhost:4317"
    sample_rate: 1.0
    export_interval_ms: 5000
