# trust_layer/config/config.yaml — Trust Layer rule configuration for KKB PoC.
# All phrase lists are domain-specific — change these for a different deployment.

server:
  host: "0.0.0.0"
  port: 8003


trust:
  input_rules:
    blocked_phrases:
      - "bomb"
      - "weapon"
      - "kill"
      - "threat"
      - "violence"
    escalation_topics:
      - "arrested"
      - "police case"
      - "court notice"
      - "legal action"
      - "FIR"
      - "jail"
      - "suicide"
  output_rules:
    blocked_phrases:
      - "I cannot help with that"
      - "as an AI, I"
      - "guaranteed placement"    # guardrail: never promise placement
      - "100% job guarantee"      # guardrail: never promise job guarantee
