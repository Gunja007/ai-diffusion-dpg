# trust_layer/config/domain.yaml — KKB domain config (local dev).
# In Docker/Kubernetes this file is replaced by dev-kit/configs/kkb/trust_layer.yaml.

trust:
  input_rules:
    blocked_phrases:
      - "bomb"
      - "weapon"
      - "kill"
      - "threat"
      - "violence"
    escalation_topics:
      - "arrested"
      - "police case"
      - "court notice"
      - "legal action"
      - "FIR"
      - "jail"
      - "suicide"
  output_rules:
    blocked_phrases:
      - "I cannot help with that"
      - "as an AI, I"
      - "guaranteed placement"
      - "100% job guarantee"
