# agent_core domain config — TEMPLATE
# Fill in values only. Do NOT rename, add, or remove any keys.
# Keys with [] or {} are lists/maps — add items following the shape shown.
# Keys marked "# required" must be set for the block to function.

agent:
  primary_model: ""             # required — Claude model ID for primary inference
  fallback_model: ""            # required — Claude model ID used if primary call fails
  ask_for_consent: false        # true to ask new users for DPDP data-storage consent before saving anything
  consent_prompt: ""            # message shown when asking for consent (used when ask_for_consent is true)
  channels:                      # per-channel prompt shaping
    voice:
      system_prompt_suffix: "Respond in 1–2 short spoken sentences. No bullet points or markdown."
    web:
      system_prompt_suffix: ""   # no suffix — full formatting preserved
    cli:
      system_prompt_suffix: ""   # no suffix — full formatting preserved

conversation:
  blocked_message: ""           # shown when user input is blocked by Trust Layer
  escalation_message: ""        # shown when escalating conversation to a human agent
  output_blocked_message: ""    # shown when LLM output is blocked by Trust Layer
  unknown_intent_message: ""    # shown when intent cannot be classified
  termination_message: ""       # shown on session end (LLM translates to user language)
  consent_message: ""           # ask user for data storage consent
  consent_decline_ack: ""       # acknowledge when user declines consent
  unsupported_language_message: ""  # shown when user requests a language not in supported_languages
  profile_complete_message: ""  # confirm profile collection is complete
  returning_user_greeting: ""   # personalised greeting for returning users

connectors:
  read:                         # connectors that retrieve data; no consent needed
    - name: ""                  # required — snake_case, must match action_gateway connector key
      description: ""           # required — shown to LLM explaining when to call this
      input_schema:             # required
        type: object
        properties:
          param_name:           # replace param_name with actual parameter name
            type: string        # string | integer | boolean | array
            description: ""
        required: []            # list required parameter names here
        additionalProperties: false  # optional — set to false to reject unknown params
  write:                        # connectors that modify external state; Trust Layer consent required
    - name: ""
      description: ""
      input_schema:
        type: object
        properties:
          param_name:
            type: string
            description: ""
        required: []
        additionalProperties: false  # optional — set to false to reject unknown params
  identity: []                  # identity verification connectors — same structure as read
  internal:                     # routes tool calls to internal DPG blocks
    - name: knowledge_retrieval  # always include this for RAG-enabled domains
      route: knowledge_engine    # target DPG block
      description: ""           # required — shown to LLM
      input_schema:
        type: object
        properties:
          query:
            type: string
            description: ""
          trade:
            type: string
            description: ""
        required:
          - query
        additionalProperties: false  # optional — set to false to reject unknown params

preprocessing:
  language_normalisation:
    model: ""                   # required — Claude model ID for language normalisation
    provider: llm_native        # llm_native
    default_language: ""        # required — primary language e.g. english, hindi
    supported_languages: []     # required — e.g. [english, hindi, hinglish, kannada]
    min_detection_tokens: 3     # inputs with fewer tokens skip LLM detection; returns default_language
    transliteration: true       # normalise transliterated input to canonical script
    code_switching: true        # handle mixed-language input in a single message
  nlu_processor:
    model: ""                   # required — Claude model ID for NLU classification
    confidence_threshold: 0.5   # intents below this treated as unknown (0.0–1.0)
    domain_instruction: ""      # system prompt context for NLU classifier
    intents:                    # required — complete flat list of ALL intent identifiers
      - greeting
      - consent_granted
      - consent_declined
      - unknown
    entities: []                # entity names to extract e.g. [name, location, trade]
    sentiment_classes:          # sentiment classes to classify
      - neutral
      - positive
      - distressed
      - frustrated
    signal_intents:             # optional — map of intent → signal_type written to ContextGraph Signal node
      intent_name: signal_type  # e.g. pay_disappointment: objection

entity_to_profile_field:        # maps extracted entity name → persistent graph profile field
  name: name                    # example: entity "name" → profile field "name"
  location: location            # add one entry per entity defined in nlu_processor.entities

hitl:
  response_message: ""          # fixed message shown when HITL special_handler is triggered

agent_workflow:
  workflow_id: ""               # required — unique snake_case id e.g. docconnect_booking
  version: "1.0.0"
  agent_system_prompt: ""       # required — top-level system prompt for the orchestrating LLM
  global_intents: []            # intents handled globally before subagent routing
  global_routing:               # routing rules applied globally after intent classification
    - intent: ""                # must be listed in global_intents
      next_subagent_id: ""      # target subagent id
  default_fallback_subagent_id: ""  # subagent to route to when no routing rule matches

  subagent_mental_state_map:    # optional — maps subagent id → mental_state value written to session after routing
    subagent_id: mental_state   # e.g. profile_building: fog — aligns Five Mental States with conversation progression

  tool_result_mappings:         # optional — maps tool name → journey event config for persisting tool outputs to graph nodes
    tool_name:                  # replace with actual tool name, e.g. onest_market_lookup
      journey_event_label: ""   # required — graph node label to create, e.g. Role
      result_list_key: ""       # dot-path to the list in the tool result, e.g. data.items — creates one node per item
      field_map:                # maps graph node property names → dot-path in tool result item
        graph_field: result_field  # e.g. role_id: job.job_id

  subagents:                    # one or more — use create_subagent tool to add each one
    - id: ""                    # required — unique snake_case identifier
      name: ""                  # required — human-readable name
      description: ""           # required — what this subagent does
      is_start: false           # required — exactly ONE subagent must have is_start: true
      is_terminal: false        # required — terminal subagents must have routing: []
      special_handler: null     # null | hitl | whatsapp_handoff
      valid_intents: []         # intents this subagent handles (exclude global_intents)
      tools: []                 # connector names available e.g. [knowledge_retrieval]
      system_prompt: ""         # required — LLM instructions for this conversation state
      routing:                  # routing rules from this subagent; empty list if is_terminal
        - intent: ""            # intent that triggers this rule; use "*" for catch-all
          next_subagent_id: ""  # required — target subagent id
          condition:            # optional single condition — omit key if not needed
            field: ""           # session field name e.g. subagent_entry_count.greeting
            operator: eq        # eq | not_eq | gt | lt | in
            value: null         # scalar or list to compare against
          conditions: []        # optional list of conditions — ALL must be true
                                # each item: {field, operator, value}
          session_writes: {}    # optional — {field_name: value} written when rule fires

# Reach Layer turn-assembler tuning — controls how Agent Core receives assembled turns per channel.
# These are technical defaults; override only if your domain has specific VAD or typing-speed needs.
reach_layer:
  turn_assembler:
    semantic_gate:
      enabled: true               # true = NLU gate active; improves VAD accuracy for voice
      confidence_threshold: 0.75  # minimum NLU confidence to accept an input segment
  channels:
    voice:
      turn_assembler:
        silence_trigger:
          silence_ms: 400         # ms of silence before triggering (VAD-driven; shorter for voice)
        max_wait_ceiling:
          max_wait_ms: 8000       # hard cap in ms to wait for more input before forcing a turn
    web:
      turn_assembler:
        silence_trigger:
          silence_ms: 1500        # ms of silence before triggering (longer — users type slower)
        max_wait_ceiling:
          max_wait_ms: 15000
    cli:
      turn_assembler:
        silence_trigger:
          silence_ms: 200         # ms of silence before triggering (very short — dev/test convenience)
        max_wait_ceiling:
          max_wait_ms: 5000

observability:
  domain: ""                      # required — set to project slug automatically; do not fill manually
