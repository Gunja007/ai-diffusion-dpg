# memory_layer domain config — TEMPLATE
# Fill in values only. Do NOT rename, add, or remove any keys.

state:
  session:
    ttl_minutes: 1440           # session lifetime in minutes (1440 = 24 hours)
    schema:                     # domain-specific session fields (infrastructure fields are auto-injected)
      field_name:               # replace with actual field name
        type: enum              # enum | string | int | list
        values:                 # required when type is enum — list of allowed values
          - value_one
          - value_two
        default: value_one      # default value for this field
  persistent:
    backend: memgraph           # memgraph | neo4j
    graph:
      user_node:
        label: User             # required — graph node label e.g. User, Patient, Farmer
        key: user_id            # required — unique identifier property e.g. user_id, phone_number
      subnodes:                 # map of NodeName → subnode definition
        NodeName:               # replace with actual node name e.g. Profile, Journey
          rel: HAS_NODE         # required — relationship type e.g. HAS_PROFILE, HAS_APPOINTMENT
          grouping: false       # true = grouper node with no properties, used as a structural anchor
          declared_fields:      # list of known field names on this node (omit if grouping: true)
            - field_one
            - field_two
          child:                # optional single nested child node
            label: ChildNode
            rel: HAS_CHILD
            fields:
              - field_name
          children:             # optional list of child node types (use instead of child when multiple types exist)
            - label: ChildNodeA  # e.g. Role
              rel: HAS_CHILD_A   # e.g. OFFERED
              fields:
                - field_one
                - field_two
            - label: ChildNodeB  # e.g. DropOff
              rel: HAS_CHILD_B   # e.g. DROPPED_AT
              fields:
                - field_name
          adhoc:                # optional adhoc/dynamic subnode for free-form attributes
            label: AdhocNode
            rel: HAS_ADHOC
            fields:
              - field_name
    merge_on_session_end:       # promotes session fields to graph nodes on session close
      - session_field: ""       # required — session field name e.g. name, trade
        target: ""              # required — graph path e.g. UserProfile.name or Role

user_data_persistence:
  default_mode: saved           # required — saved | anonymous (DPDP-compliant erasure on session end)

reengagement:
  # Scheduler is not yet implemented — tracked in GH-168. Config is validated
  # at startup but no runtime code currently acts on these triggers.
  triggers:                     # optional — re-engagement messages after drop-off
    - event: ""                 # required — drop-off event code e.g. DOP_MT
      delay_hours: 24           # hours after event to send message (omit when using loop_threshold)
      channel: whatsapp         # required for time-based triggers — outbound_call | whatsapp | sms
      message_template: ""      # message content to send (omit when using action)
      loop_threshold: null      # optional — trigger when loop_count reaches this value instead of a time delay
      action: null              # optional — action to execute e.g. hitl_counsellor (use instead of channel+message_template)

observability:
  domain: ""                    # domain slug, e.g. kkb
