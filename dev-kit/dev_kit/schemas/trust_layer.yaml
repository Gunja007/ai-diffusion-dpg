# trust_layer domain config — TEMPLATE
# Fill in values only. Do NOT rename, add, or remove any keys.
# Keys with [] or {} are lists/maps — add items following the shape shown.
# Keys marked "# required" must be set for the block to function.

trust:
  policy_pack: ""                     # name of the active policy pack — must match a key in policy_packs

  input_rules:
    blocked_phrases: []               # exact strings that block user input
    escalation_topics: []             # strings that trigger immediate escalation to a human agent
    blocked_input_message: ""         # message returned to user when input is blocked

  output_rules:
    blocked_phrases: []               # strings that must not appear in LLM output
    output_blocked_message: ""        # message returned to user when LLM output is blocked

  policy_packs:
    policy_pack_name:                 # replace with actual pack name, e.g. kkb_advisory_jobs
      guardrails:
        guardrail_name:               # replace with risk name, e.g. false_certainty
          # severity and failure_mode declare intent but are not yet acted on
          # at runtime — differential enforcement is tracked in GH-170.
          severity: ""                # blocker | warning
          failure_mode: ""            # block | constrain
          prompt_constraints: []      # MUST/MUST NOT instructions injected into the LLM prompt
          required_disclosures: []    # disclosure strings appended to LLM output
          refusal_template: null      # fixed refusal text used when the guardrail fires in block mode

  consent:
    consent_phrases: []               # phrases indicating user consent, e.g. [yes, haan, theek hai]
    decline_phrases: []               # phrases indicating declined consent, e.g. [no, nahi]

  hitl:
    queue_backend: "log"              # backend for HITL queuing: log | redis | webhook
    holding_message: ""               # message shown to user while waiting for a human agent
    # notification_webhook is read but not yet dispatched — webhook backend
    # (and redis backend) are tracked in GH-36.
    notification_webhook: null        # webhook URL notified when an HITL case is queued

observability:
  domain: ""                          # domain slug, e.g. kkb

dignity_check:                        # NEW (GH-137) — auto-populated for Conversational agents
  enabled: false                      # dev-kit flips true for Conversational
  questions:                          # authors can override; defaults from the guide
    - "Does this blame the user?"
    - "Does it over-promise?"
    - "Does it push urgency?"
    - "Does it reduce their agency?"
    - "Does it sound like a script instead of a human call?"
  # fail_action is validated but not yet dispatched at runtime — implementation
  # (rewrite / block / flag) is tracked in GH-171.
  fail_action: "rewrite"              # rewrite | block | flag
