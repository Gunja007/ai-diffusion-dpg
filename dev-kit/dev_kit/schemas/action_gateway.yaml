# action_gateway domain config — TEMPLATE
# Fill in values only. Do NOT rename, add, or remove any keys.
# Add one entry per tool connector declared in agent_core connectors (read/write/identity).
# Supported types: rest_api | mcp

tools:
  - id: ""                         # required — unique tool identifier, must match agent_core connector key
    type: rest_api                 # rest_api | mcp
    category: read                 # read | write | identity
    description: ""                # shown to the LLM for routing decisions
    timeout_ms: 5000               # request timeout in milliseconds
    # --- rest_api fields (omit for mcp tools) ---
    base_url: ""                   # base URL of the API
    health_check:                  # optional — controls startup reachability probe
      enabled: true                # set false for self-referential mocks that would deadlock /health
    auth:
      type: none                   # none | api_key | bearer | oauth2
      header: ""                   # header name for api_key auth (e.g. X-API-KEY)
      secret_env: ""               # env var holding the key/token
      token_url: ""                # token endpoint for oauth2
    endpoints:
      - name: ""                   # endpoint name, e.g. 'search'
        method: POST               # GET | POST | PUT | DELETE | PATCH
        path: ""                   # path appended to base_url, e.g. /search
        params:
          - name: ""
            source: agent          # agent | static
            type: string           # string | integer | boolean | array
            required: false
            description: ""
            value: null
            default: null          # optional fallback hint shown to the LLM (e.g. 1 for page, 20 for limit)
    response:
      max_size_chars: 4000
      # Optional projection — when present, only these fields are sent to the LLM
      # (result_text). The raw response is still kept in ToolResult.result for
      # journey-graph writes and observability.
      projection:
        list_key: ""         # optional dot-path to a list in the response; when set,
                             # each element is projected; when empty, the root is projected.
        fields:              # target_name → dot-path into each item (or root)
          example_target: "path.into.item"
    # --- mcp fields (omit for rest_api tools) ---
    # McpAdapter connects to the server at startup and auto-discovers all tools.
    # tool_name and input_schema are NOT needed here — they are discovered at runtime.
    server_url: ""                 # base URL of the MCP server (e.g. https://mcp.example.com)
    transport: sse                 # sse | stdio — transport protocol (default: sse)
    namespace: ""                  # optional — prefix for tool names; defaults to tool id
    timeout_ms: 5000

observability:
  domain: ""                       # domain slug, e.g. kkb