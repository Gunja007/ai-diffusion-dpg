# reach_layer domain config — TEMPLATE
# Fill in values only. Do NOT rename, add, or remove any keys.

reach_layer:
  common:
    observability:
      domain: ""              # required — domain slug, e.g. "kkb"
  channels:
    cli:
      prompt: ""              # prompt prefix shown before user input, e.g. "You: "
      agent_prefix: ""        # prefix shown before agent replies, e.g. "Agent: "
    web:
      auth:
        enabled: false
        google_client_id: ""
        cookie_secure: true
      ui:
        app_name: ""                  # required — display name shown in browser tab and chat header
        app_tagline: ""               # required — short subtitle shown under the app name
        app_icon: ""                  # required — emoji representing the app, e.g. 🌾 💊 💼
        agent_avatar: ""              # emoji shown on agent chat bubbles
        user_avatar: ""               # emoji shown on user chat bubbles
        setup_heading: ""             # heading shown on the user ID setup screen
        setup_subtitle: ""            # subtitle shown under the setup heading
        user_id_placeholder: ""       # hint text in the user ID input field
        user_id_hint: ""              # secondary hint below the user ID field
        start_btn_label: ""           # label on the start/enter button
        new_session_msg: ""           # first message shown to a brand new user
        returning_user_msg: ""        # first message shown to a returning user
        storage_key: ""               # localStorage key for persisting the user ID
        theme_storage_key: ""         # localStorage key for persisting the theme
        sign_out_confirm: ""          # confirmation prompt for sign-out action
        switch_user_confirm: ""       # confirmation prompt for switch-user action
        delete_conversation_confirm: "" # confirmation prompt for delete-conversation action
    voice:
      raya:
        stt_language: ""              # required — BCP-47 language code for speech-to-text, e.g. "hi"
        tts_language: ""              # required — BCP-47 language code for text-to-speech
        voice_id: ""                  # required — Raya TTS voice UUID. Must be one of the valid Raya voices below.
        # ── Available Raya voices (first voice per language) ──
        # Language  | Voice Name  | voice_id
        # mr        | Sneha       | c849b31b-b0ba-488f-b97d-3fd12f2656f4
        # hi        | Priyanka    | d6a002d0-230c-49b1-a137-b8a7d564b1ae
        # te        | Tanvi       | 25a7c7d9-57b3-488a-a880-33edf6642902
        # kn        | Meera       | 6a897d02-83ab-43ea-b17f-a8cc2d96a279
        # bn        | Aishwarya   | a1b2c3d4-e5f6-4789-a012-b3c4d5e6f789
        # as        | Priti       | d4e5f6a7-b8c9-4a01-d345-e6f7a8b9c012
        # gu        | Jignesh     | 9a01bcde-2345-6789-abc1-123456abcdef
        # en-in     | Nayra       | 0f24fb66-e495-4781-9e84-1224aa7dacde
        # en-us     | Solene      | 90534e23-8bcb-4b1c-a16b-b9a4be646321
        # ml        | Devika      | 57a1e849-8e0f-43ee-adab-b4b74a9d79e1
        # ne        | Ritu        | 5d6c7ee4-2563-4dab-9c8a-c3269e22cba9
        # ta        | Abirami     | fed6231c-7e35-4fbe-bbca-254f566e5dd5
      agent_core:
        timeout_ms: 15000
        # The per-call welcome is emitted by Agent Core on SSE connect as the
        # entry subagent's opening_phrase (see agent_core.yaml, GH-149). There
        # is no static `greeting` field — do not add one here.
        fallback_phrase: ""           # phrase spoken when the Agent Core call fails (timeout / 5xx / empty)
        barge_in_acknowledgement: "" # brief ack spoken when the caller barges in; empty = bot falls silent
      # GH-247: voice-runtime knobs (read by reach_layer voice service).
      # terminal_word — required when voice deployed. Spoken just before the
      # WebSocket close on bot-initiated hangup (DoneEvent.session_ended=true).
      terminal_word: ""
      # GH-242: short filler ("एक सेकंड", "हाँ जी") played if the first
      # SentenceEvent hasn't reached TTS within filler_threshold_ms of
      # submit_input completing. Tool-chained turns can take 5–17 s before
      # the first sentence; without this the caller hears a dead line.
      # null / empty disables.
      filler_threshold_ms: 1500
      filler_phrase: ""
