observability:
  domain: fasal
tools:
- id: get_weather_current
  type: rest_api
  category: read
  description: Get current weather conditions (temperature, humidity, rainfall, wind)
    for a district to provide timely crop management advice
  base_url: https://api.cropweather.example.com/v1
  auth:
    type: api_key
    header: X-API-Key
    secret_env: CROP_WEATHER_API_KEY
  timeout_ms: 5000
  endpoints:
  - name: getCurrentWeather
    method: GET
    path: /weather/current
    params:
    - name: district
      source: agent
      type: string
      required: true
      description: District name (e.g. Amravati, Nagpur, Yavatmal, Wardha, Akola)
    - name: state
      source: static
      type: string
      value: Maharashtra
      required: false
      description: 'State name (default: Maharashtra)'
  response:
    max_size_chars: 4000
    field_mapping:
    - source: temperature_c
      target: temperature_c
      type: number
      description: Current temperature in Celsius
    - source: humidity_pct
      target: humidity_pct
      type: number
      description: Current humidity percentage
    - source: rainfall_mm
      target: rainfall_mm
      type: number
      description: Rainfall in millimeters
    - source: advisory
      target: advisory
      type: string
      description: Weather advisory text
- id: get_weather_forecast
  type: rest_api
  category: read
  description: Get 7-day weather forecast (temperature, rainfall, conditions) for
    planning irrigation, spraying, and pest management activities
  base_url: https://api.cropweather.example.com/v1
  auth:
    type: api_key
    header: X-API-Key
    secret_env: CROP_WEATHER_API_KEY
  timeout_ms: 5000
  endpoints:
  - name: getWeatherForecast
    method: GET
    path: /weather/forecast
    params:
    - name: district
      source: agent
      type: string
      required: true
      description: District name in Vidarbha
    - name: days
      source: static
      type: integer
      value: 7
      required: false
      description: 'Number of days to forecast (default: 7, max: 14)'
  response:
    max_size_chars: 4000
    field_mapping:
    - source: forecast[*].date
      target: forecast_date
      type: string
      description: Forecast date
    - source: forecast[*].max_temp_c
      target: max_temperature
      type: number
      description: Maximum temperature in Celsius
    - source: forecast[*].min_temp_c
      target: min_temperature
      type: number
      description: Minimum temperature in Celsius
    - source: forecast[*].rainfall_mm
      target: rainfall_forecast
      type: number
      description: Expected rainfall in millimeters
    - source: forecast[*].condition
      target: weather_condition
      type: string
      description: Weather condition description
- id: get_advisory_crop
  type: rest_api
  category: read
  description: Get crop-specific pest and disease risk advisory based on current weather
    and season to guide preventive and curative measures
  base_url: https://api.cropweather.example.com/v1
  auth:
    type: api_key
    header: X-API-Key
    secret_env: CROP_WEATHER_API_KEY
  timeout_ms: 5000
  endpoints:
  - name: getCropAdvisory
    method: GET
    path: /advisory/crop
    params:
    - name: crop
      source: agent
      type: string
      required: true
      description: Crop name (cotton or soybean)
    - name: district
      source: agent
      type: string
      required: true
      description: District name in Vidarbha
    - name: season
      source: agent
      type: string
      required: false
      description: Farming season (kharif, rabi, or zaid)
  response:
    max_size_chars: 4000
    field_mapping:
    - source: crop
      target: crop
      type: string
      description: Crop name
    - source: risk_level
      target: risk_level
      type: string
      description: Risk level (low, medium, high)
    - source: active_threats[*].threat
      target: threat_name
      type: string
      description: Name of pest or disease threat
    - source: active_threats[*].recommendation
      target: treatment_recommendation
      type: string
      description: Recommended treatment or control measure
