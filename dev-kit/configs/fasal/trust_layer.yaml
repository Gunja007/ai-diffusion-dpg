trust:
  policy_pack: fasal_advisory
  input_rules:
    blocked_phrases:
    - DDT
    - endosulfan
    - monocrotophos
    - phosphamidon
    - kill myself
    - no point living
    - end it
    - free money
    - lottery
    - dating
    escalation_topics:
    - entire field dead
    - crop failure
    - financial crisis
    - debt
    - government scheme application
    - suspected fraud
    - fake government scheme
    - health emergency
    - safety emergency
    blocked_input_message: माफ कीजिए, मैं इस विषय में मदद नहीं कर सकता। कृपया अपनी
      फसल की समस्या के बारे में बताएं। (Sorry, I cannot help with this. Please tell
      me about your crop problem.)
  output_rules:
    blocked_phrases:
    - 100% cure
    - will definitely cure
    - guaranteed to work
    - only this works
    - you must buy this today
    - will also cure your diabetes
    - will also treat your illness
    - banned pesticide
    - overdose
    - use more than recommended
    output_blocked_message: मुझे खेद है, मैं सुरक्षित सलाह नहीं दे सकता। कृपया स्थानीय
      कृषि अधिकारी से संपर्क करें। (I apologize, I cannot provide safe advice. Please
      contact a local agriculture officer.)
  policy_packs:
    fasal_advisory:
      risks:
      - false_certainty
      - dangerous_recommendation
      - out_of_scope_medical
      - pressure_language
      guardrails:
        false_certainty:
          id: GR-FC-001
          severity: warning
          failure_mode: constrain
          prompt_constraints:
          - MUST use words like 'may', 'likely', 'could', 'suggest' instead of absolute
            certainty
          - MUST NOT say '100% will work' or 'guaranteed to cure'
          - MUST add disclaimers like 'based on symptoms reported'
          required_disclosures:
          - This advice is based on the symptoms you described and general agricultural
            practices. Consult a local agriculture officer for confirmation.
          refusal_template: null
        dangerous_recommendation:
          id: GR-DR-001
          severity: blocker
          failure_mode: block
          prompt_constraints:
          - MUST NOT recommend banned pesticides (DDT, endosulfan, monocrotophos,
            phosphamidon)
          - MUST NOT recommend dosages above government-approved levels
          - MUST recommend only legal, approved treatments
          required_disclosures: []
          refusal_template: मैं यह सलाह नहीं दे सकता क्योंकि यह आपकी फसल के लिए सुरक्षित
            नहीं है। कृपया सरकारी कृषि विभाग से संपर्क करें। (I cannot recommend this
            as it is not safe for your crop. Please contact the government agriculture
            department.)
        out_of_scope_medical:
          id: GR-MED-001
          severity: warning
          failure_mode: constrain
          prompt_constraints:
          - MUST NOT make health or medical claims
          - MUST stay focused on crop disease and pest management only
          - MUST NOT claim pesticides treat human illnesses
          required_disclosures:
          - I can only advise on crop and farm management. For health concerns, please
            consult a doctor.
          refusal_template: null
        pressure_language:
          id: GR-PL-001
          severity: warning
          failure_mode: constrain
          prompt_constraints:
          - MUST NOT use urgency words like 'immediately', 'right now', 'today only'
          - MUST NOT say 'you must' — instead use 'you can', 'you may want to'
          - MUST respect farmer's autonomy and decision-making
          required_disclosures:
          - You decide what is best for your farm. This is a suggestion based on your
            situation.
          refusal_template: null
  hitl:
    queue_backend: log
    holding_message: कृपया प्रतीक्षा करें। एक कृषि सलाहकार आपसे जल्द ही बात करेगा।
      (Please wait. An agriculture advisor will speak with you shortly.)
  consent:
    consent_phrases:
    - हाँ
    - haan
    - ठीक है
    - theek hai
    - चल
    - chal
    - सहमत
    - sahmat
    decline_phrases:
    - नहीं
    - nahi
    - नहीं चाहिए
    - nahi chahiye
    - बाद में
    - baad mein
    - नहीं धन्यवाद
    - nahi dhanyavaad
dignity_check:
  enabled: true
  questions:
  - Does this blame the user?
  - Does it over-promise?
  - Does it push urgency?
  - Does it reduce their agency?
  - Does it sound like a script instead of a human call?
  fail_action: rewrite
observability:
  domain: fasal
