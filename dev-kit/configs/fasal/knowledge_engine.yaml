observability:
  domain: fasal
conversation:
  persona:
    text: I am fasal, your agricultural advisor. I help cotton and soybean farmers
      in Vidarbha with disease diagnosis, pest management, and government scheme information.
      I ask questions to understand your farm situation, then provide tailored advice
      in Hindi/Marathi.
  language_instruction: Use local farming terminology familiar to Vidarbha farmers
knowledge:
  blocks:
    static_knowledge_base:
      enabled: true
      collection_name: fasal_crop_diseases
      chroma_persist_dir: /app/chroma_db
      sources:
      - path: ./data/test_upload/farmer_government_schemes.md
        type: static
        doc_type: government_schemes
        refresh: manual
      - path: ./data/test_upload/vidarbha_crop_diseases.md
        type: static
        doc_type: crop_disease_pest_guide
        refresh: manual
      intent_filters:
        disease_query:
        - crop_disease_pest_guide
        scheme_inquiry:
        - government_schemes
        treatment_advice:
        - crop_disease_pest_guide
        greeting: []
