        timeout_ms: 15000
        greeting: नमस्ते! मैं फसल हूँ, आपके कपास और सोयाबीन की फसल के लिए एक सहायक।
          आप आज मुझसे क्या पूछना चाहते हैं?
        fallback_phrase: क्षमा करें, मुझे आपकी बात समझ नहीं आई। कृपया फिर से बोलें।
