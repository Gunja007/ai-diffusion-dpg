        returning_user_msg: स्वागत है! क्या आप अपनी पिछली समस्या के बारे में अधिक
          जानना चाहते हैं, या कोई नया प्रश्न है?
        storage_key: fasal_user_id
        theme_storage_key: fasal_theme
        sign_out_confirm: क्या आप साइन आउट करना चाहते हैं?
        switch_user_confirm: क्या आप एक अलग उपयोगकर्ता के रूप में जारी रखना चाहते
          हैं?
        delete_conversation_confirm: क्या आप यह बातचीत हटाना चाहते हैं?
