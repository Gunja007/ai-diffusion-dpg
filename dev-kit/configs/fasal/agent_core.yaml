agent:
  primary_model: claude-haiku-4-5-20251001
  fallback_model: claude-haiku-4-5-20251001
  ask_for_consent: true
  consent_prompt: आपकी व्यक्तिगत जानकारी सुरक्षित रखने के लिए, कृपया डेटा संग्रहण
    के लिए सहमति दें।
conversation:
  blocked_message: माफी करें, मैं इस विषय पर सहायता नहीं कर सकता। कृपया किसी अन्य
    समस्या के बारे में पूछें।
  escalation_message: कृपया प्रतीक्षा करें, एक विशेषज्ञ आपसे बात करेगा।
  output_blocked_message: माफी करें, मेरा जवाब अभी तैयार नहीं है। कृपया बाद में पूछें।
  unknown_intent_message: मुझे आपकी समस्या समझ नहीं आई। कृपया फिर से कहें।
  termination_message: आपसे बात करने के लिए धन्यवाद। शुभकामनाएं!
  consent_message: क्या आप अपनी जानकारी सुरक्षित रखने के लिए सहमत हैं?
  consent_decline_ack: ठीक है, हम आपकी जानकारी सुरक्षित नहीं रखेंगे।
  unsupported_language_message: माफी करें, यह भाषा समर्थित नहीं है। कृपया हिंदी या
    मराठी में बोलें।
  profile_complete_message: आपकी जानकारी संग्रहित हो गई है।
  returning_user_greeting: नमस्ते! फिर से आपसे बात करके खुशी हुई।
preprocessing:
  language_normalisation:
    model: claude-haiku-4-5-20251001
    provider: llm_native
    default_language: hindi
    supported_languages:
    - hindi
    - marathi
    - hinglish
    min_detection_tokens: 3
    transliteration: true
    code_switching: true
  nlu_processor:
    model: claude-haiku-4-5-20251001
    confidence_threshold: 0.5
    domain_instruction: You are an NLU classifier for an agricultural advisory agent
      serving smallholder cotton and soybean farmers in Vidarbha, Maharashtra. Classify
      farmer intents related to crop diseases, pest management, treatment advice,
      and government schemes.
    intents:
    - greeting
    - provide_district
    - report_problem
    - describe_symptom
    - confirm_treatment
    - ask_prevention
    - ask_scheme
    - confirm_application
    - ask_supplies
    - ask_timing
    - ask_about_schemes
    - ask_scheme_details
    - ask_eligibility
    - ask_application
    - interested_scheme
    - not_interested
    - ask_followup
    - escalate_to_human
    - end_session
    - consent_granted
    - consent_declined
    - unknown
    entities:
    - crop_type
    - symptom
    - location
    sentiment_classes:
    - neutral
    - positive
    - distressed
    - frustrated
hitl:
  response_message: कृपया प्रतीक्षा करें, एक विशेषज्ञ आपसे बात करेगा।
channels:
  voice:
    tts_rules:
      numbers: Read numbers as whole number in Hindi (e.g., 123 = 'एक सौ तेईस'). For
        agricultural quantities, use common units (किलोग्राम, हेक्टेयर).
      money: Always include 'रुपये' or 'रुपया' after amount (e.g., ₹500 = 'पाँच सौ
        रुपये'). Use 'हजार' for thousands, 'लाख' for lakhs.
      dates: Spell out dates in full Hindi (e.g., 15-10-2024 = 'पन्द्रह अक्टूबर बीस
        चौबीस'). Use month names in Hindi.
      time: Use 24-hour format with 'बजे' (e.g., 14:30 = 'दो बजकर तीस मिनट').
      phone: Read phone numbers digit-by-digit in Hindi (e.g., 9876543210 = 'नौ आठ
        सात छः पाँच चार तीन दो एक शून्य').
      abbreviations: Spell out agricultural acronyms (PM-KISAN = 'पीएम किसान', FYM
        = 'गोबर की खाद').
      output_script: Devanagari (Hindi/Marathi script). Do not use Roman transliteration
        in TTS output.
      english_loanwords: Translate agricultural terms to Hindi/Marathi where possible
        (e.g., 'pesticide' = 'कीटनाशक', 'fungicide' = 'फफूंदनाशक'). Keep only essential
        terms in English.
    terminal_word: अलविदा
observability:
  domain: fasal
entity_to_profile_field:
  location: location
connectors:
  read:
  - name: get_weather_current
    description: Get current weather conditions (temperature, humidity, rainfall)
      for a district to provide timely crop management advice
    input_schema:
      type: object
      properties:
        district:
          type: string
          description: District name (e.g. Amravati, Nagpur, Yavatmal, Wardha, Akola)
      required:
      - district
      additionalProperties: false
    invocation_rules:
      call_when: When the farmer asks about current weather conditions, or when current
        weather is needed to advise on pest/disease risk or crop management
      required_before_calling:
      - district
      must_not_substitute: Prior weather data from earlier conversations. Always fetch
        fresh current conditions.
      on_empty: मुझे क्षमा करें, अभी मौसम की जानकारी नहीं मिल पाई। कृपया बाद में फिर
        से कोशिश करें।
      on_failure: मुझे क्षमा करें, मौसम सेवा अभी उपलब्ध नहीं है। कृपया कुछ देर बाद
        फिर से पूछें।
      bridge_line: ठीक है, आपके जिले का मौसम देख लेती हूँ।
  - name: get_weather_forecast
    description: Get 7-day weather forecast (temperature, rainfall, conditions) for
      planning irrigation, spraying, and pest management activities
    input_schema:
      type: object
      properties:
        district:
          type: string
          description: District name in Vidarbha
      required:
      - district
      additionalProperties: false
    invocation_rules:
      call_when: When the farmer asks about upcoming weather for the next few days,
        or when planning irrigation, spraying, or pest management activities that
        depend on future weather
      required_before_calling:
      - district
      must_not_substitute: Current weather or past forecasts. Always fetch the fresh
        7-day forecast.
      on_empty: मुझे क्षमा करें, आने वाले दिनों की मौसम की जानकारी अभी उपलब्ध नहीं
        है। कृपया बाद में फिर से कोशिश करें।
      on_failure: मुझे क्षमा करें, पूर्वानुमान सेवा अभी काम नहीं कर रही है। कृपया
        कुछ देर बाद फिर से पूछें।
      bridge_line: ठीक है, आने वाले सात दिनों का मौसम देख लेती हूँ।
  - name: get_advisory_crop
    description: Get crop-specific pest and disease risk advisory based on current
      weather and season to guide preventive and curative measures
    input_schema:
      type: object
      properties:
        crop:
          type: string
          description: Crop name (cotton or soybean)
        district:
          type: string
          description: District name in Vidarbha
        season:
          type: string
          description: Farming season (kharif, rabi, or zaid)
      required:
      - crop
      - district
      additionalProperties: false
    invocation_rules:
      call_when: When the farmer reports a pest or disease symptom on cotton or soybean,
        or when proactively recommending preventive measures based on current season
        and weather risk
      required_before_calling:
      - crop
      - district
      must_not_substitute: General agricultural knowledge or past advisories. Always
        fetch the current crop-specific risk advisory based on real-time conditions.
      on_empty: मुझे क्षमा करें, इस समय आपकी फसल के लिए कोई विशेष सलाह उपलब्ध नहीं
        है। कृपया बाद में फिर से पूछें।
      on_failure: मुझे क्षमा करें, सलाह सेवा अभी काम नहीं कर रही है। कृपया कुछ देर
        बाद फिर से पूछें।
      bridge_line: ठीक है, आपकी फसल के लिए वर्तमान सलाह देख लेती हूँ।
agent_workflow:
  subagents:
  - id: greeting_new
    name: Greeting (New Farmer)
    description: Entry point for brand-new farmers. Warm welcome, introduce Fasal,
      capture initial context (name, district, crops).
    is_start: true
    is_terminal: false
    special_handler: null
    valid_intents:
    - provide_district
    - report_problem
    - ask_about_schemes
    - other
    tools: []
    system_prompt: You are Fasal, a friendly agricultural advisor for cotton and soybean
      farmers in Vidarbha. On this first turn, welcome the farmer warmly in Hindi/Marathi,
      introduce yourself, and ask for their district name. Be conversational and encouraging.
      After capturing district, ask about current crops and any immediate concerns.
      Keep responses concise for voice.
    routing:
    - intent: provide_district
      next_subagent_id: crop_problem_diagnosis
    - intent: report_problem
      next_subagent_id: crop_problem_diagnosis
    - intent: ask_about_schemes
      next_subagent_id: scheme_discovery
  - id: crop_problem_diagnosis
    name: Crop Problem Diagnosis
    description: Handles farmer reporting pest or disease symptoms. Ask clarifying
      questions, fetch current advisory, diagnose issue, recommend treatment or management
      practices.
    is_start: false
    is_terminal: false
    special_handler: null
    valid_intents:
    - describe_symptom
    - confirm_treatment
    - ask_prevention
    - ask_scheme
    - other
    tools:
    - get_advisory_crop
    - get_weather_current
    system_prompt: 'You are a crop health expert. Listen carefully to the farmer''s
      description of symptoms (leaf color, insect presence, wilting, etc.). Ask 2-3
      clarifying questions to narrow down the pest or disease. Once you understand
      the problem, call get_advisory_crop with the crop type and district. Present
      the advisory findings clearly: threat name, risk level, and recommended treatment.
      Be direct and actionable for voice.'
    routing:
    - intent: describe_symptom
      next_subagent_id: crop_problem_diagnosis
    - intent: confirm_treatment
      next_subagent_id: treatment_confirmation
    - intent: ask_scheme
      next_subagent_id: scheme_discovery
  - id: treatment_confirmation
    name: Treatment Confirmation
    description: Confirms farmer will apply recommended treatment, provides detailed
      application instructions, educates on prevention for next season.
    is_start: false
    is_terminal: false
    special_handler: null
    valid_intents:
    - confirm_application
    - ask_supplies
    - ask_timing
    - ask_prevention
    - ask_scheme
    - other
    tools: []
    system_prompt: 'You are a treatment guide. Confirm the farmer understands the
      recommended treatment. Provide step-by-step application instructions: timing,
      dosage, safety precautions (wear gloves, avoid rain). Mention when to expect
      results. Ask if they need anything else or have other crop concerns. End by
      offering information on government schemes or prevention tips.'
    routing:
    - intent: ask_prevention
      next_subagent_id: treatment_confirmation
    - intent: ask_scheme
      next_subagent_id: scheme_discovery
    - intent: confirm_application
      next_subagent_id: greeting_returning
  - id: scheme_discovery
    name: Scheme Discovery
    description: Proactively recommends government schemes (crop insurance, subsidies,
      training) based on farmer's district, crop type, and situation.
    is_start: false
    is_terminal: false
    special_handler: null
    valid_intents:
    - ask_scheme_details
    - ask_eligibility
    - ask_application
    - interested_scheme
    - not_interested
    - other
    tools: []
    system_prompt: You are a government scheme advisor. Based on the farmer's district,
      crop type, and current situation, recommend 1-2 relevant schemes (crop insurance
      like PMFBY, input subsidies, pest management schemes, training programs). Explain
      eligibility, benefits, and how to apply. Use knowledge from the knowledge base.
      Be encouraging and clear about how schemes can help reduce financial risk.
    routing:
    - intent: interested_scheme
      next_subagent_id: scheme_discovery
    - intent: not_interested
      next_subagent_id: greeting_returning
  - id: greeting_returning
    name: Greeting (Returning Farmer)
    description: Re-entry point for returning farmers (sparse/rich/mid-journey contact
      memory). Warm greeting with farmer's name, acknowledge previous interactions,
      check for new problems.
    is_start: false
    is_terminal: false
    special_handler: null
    valid_intents:
    - report_problem
    - ask_about_schemes
    - ask_followup
    - other
    tools: []
    system_prompt: You are welcoming back a farmer who has interacted with Fasal before.
      Start by acknowledging the previous interaction (if context is available, reference
      it). Ask how the previous advice or treatment worked out. Then ask about current
      crop status and any new concerns. Be warm, encouraging, and ready to provide
      fresh advisory or scheme information. Keep the tone familiar and supportive.
    routing:
    - intent: report_problem
      next_subagent_id: crop_problem_diagnosis
    - intent: ask_about_schemes
      next_subagent_id: scheme_discovery
  workflow_id: fasal_cotton_soybean_advisor
  version: 1.0.0
  agent_system_prompt: You are Fasal, a voice-first agricultural advisory agent for
    cotton and soybean farmers in Vidarbha, Maharashtra. Your role is to provide timely,
    actionable advice on pest and disease management, treatment options, and government
    scheme eligibility. You speak Hindi and Marathi fluently and conversationally.
    You ask clarifying questions when needed before diagnosing crop problems. You
    proactively recommend government schemes tailored to each farmer's situation.
    Always be warm, encouraging, and respectful of the farmer's knowledge. Keep responses
    concise for voice interactions. Never make up information — always rely on the
    advisory tools and knowledge base.
  global_intents:
  - escalate_to_human
  - end_session
  - other
  global_routing:
  - intent: escalate_to_human
    next_subagent_id: greeting_returning
  - intent: end_session
    next_subagent_id: greeting_returning
  default_fallback_subagent_id: greeting_returning
