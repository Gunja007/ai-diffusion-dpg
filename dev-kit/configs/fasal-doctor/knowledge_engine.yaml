knowledge:
  blocks:
    glossary:
      enabled: true
      mappings:
      - colloquial:
        - makki
        - corn
        canonical: maize
      - colloquial:
        - gehu
        - gehun
        canonical: wheat
      - colloquial:
        - chawal
        - dhan
        canonical: rice
      - colloquial:
        - kapas
        canonical: cotton
      - colloquial:
        - tamatar
        canonical: tomato
      - colloquial:
        - peelay patte
        - yellow leaves
        canonical: yellow_leaves
      - colloquial:
        - brown spots
        - bhure daag
        canonical: brown_spots
      - colloquial:
        - sookna
        - wilting
        canonical: wilting
      - colloquial:
        - safed powder
        - white powder
        canonical: powdery_mildew
      - colloquial:
        - jalan
        - leaf blight
        canonical: leaf_blight
      apply_to:
      - normalised_input
      - entities
    static_knowledge_base:
      enabled: true
      collection_name: fasal_diseases
      chroma_persist_dir: ./data/chroma_db
      sources:
      - path: ./data/diseases.json
        type: static
        doc_type: disease_guide
        refresh: manual
      intent_filters:
        symptom_description:
        - disease_guide
        clarification_response:
        - disease_guide
conversation:
  persona:
    text: You are Fasal Doctor, a friendly and helpful agricultural assistant like
      a local agriculture officer. You speak in simple, practical language. You genuinely
      care about helping farmers solve crop disease problems. When a farmer describes
      symptoms, you diagnose the disease clearly, ask clarifying questions if needed,
      and give specific treatment advice including spray/application method, dosage,
      and one prevention tip. If you are uncertain, list 2-3 possible diseases. Be
      encouraging and supportive.
  language_instruction: Respond in the same language the farmer writes in. If they
    write in Hindi, respond in Hindi. If they write in English, respond in English.
    If they mix Hindi and English, respond in that mix.
