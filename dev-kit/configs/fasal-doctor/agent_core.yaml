agent:
  primary_model: claude-haiku-4-5-20251001
  fallback_model: claude-haiku-4-5-20251001
  ask_for_consent: true
  consent_prompt: Can I save your name, location, and crops you grow? This helps me
    give better advice next time.
  max_tool_rounds: 3
preprocessing:
  language_normalisation:
    model: claude-haiku-4-5-20251001
    provider: llm_native
    default_language: hindi
    supported_languages:
    - hindi
    - english
    - hinglish
    transliteration: true
    code_switching: true
  nlu_processor:
    model: claude-haiku-4-5-20251001
    confidence_threshold: 0.6
    domain_instruction: You are a crop disease diagnostic chatbot. Classify farmer
      messages into intents related to describing crop symptoms, seeking treatment
      advice, and consent. Prioritize symptom_description and clarification_response
      intents.
    intents:
    - consent_granted
    - consent_declined
    - profile_complete
    - symptoms_received
    - diagnosis_confirmed
    - clarification_provided
    - treatment_received
    - new_diagnosis_requested
    - session_ended
    - goodbye
    entities:
    - crop
    - symptom
    - location
    sentiment_classes:
    - neutral
    - distressed
    - positive
connectors:
  read: []
  write: []
  identity: []
  internal:
  - name: knowledge_retrieval
    route: knowledge_engine
    description: Retrieve disease guides, symptoms, and treatment recommendations
      from the crop disease knowledge base. Use this to diagnose diseases from farmer
      descriptions.
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: Symptom description or disease query (e.g., 'yellow leaves
            on rice')
        trade:
          type: string
          description: Crop or trade name (e.g., 'rice', 'wheat', 'cotton')
      required:
      - query
agent_workflow:
  subagents:
  - id: greeting
    name: Greeting
    description: Welcome the farmer and ask for consent to save their location and
      crops for future personalized interactions.
    is_start: true
    is_terminal: false
    special_handler: null
    valid_intents:
    - consent_granted
    - consent_declined
    tools: []
    system_prompt: Welcome the farmer warmly in their language (Hindi or English).
      Briefly explain that Fasal Doctor helps diagnose crop diseases. Ask for consent
      to remember their location and crops for better future assistance. Keep it short
      and friendly.
    routing:
    - intent: consent_granted
      next_subagent_id: profile_setup
      session_writes:
        user_storage_mode: saved
    - intent: consent_declined
      next_subagent_id: symptom_collection
      session_writes:
        user_storage_mode: anonymous
  - id: profile_setup
    name: Profile Setup
    description: Collect farmer's location and main crops grown (only if consent was
      granted).
    is_start: false
    is_terminal: false
    special_handler: null
    valid_intents:
    - profile_complete
    tools: []
    system_prompt: Ask the farmer for their location (district/state) and the main
      crops they grow. Keep questions simple. Once you have both pieces of information,
      confirm the profile and prepare to move to symptom collection.
    routing:
    - intent: profile_complete
      next_subagent_id: symptom_collection
  - id: symptom_collection
    name: Symptom Collection
    description: Ask the farmer to describe visible symptoms on their crop. Use knowledge_retrieval
      to search for matching diseases.
    is_start: false
    is_terminal: false
    special_handler: null
    valid_intents:
    - symptoms_received
    tools:
    - knowledge_retrieval
    system_prompt: 'IMPORTANT: You MUST call the knowledge_retrieval tool as soon
      as the farmer describes any symptoms. Do NOT respond from memory — always retrieve
      from the knowledge base first. Ask the farmer to describe symptoms (leaf color,
      spots, wilting, affected plant parts). Once they describe ANY symptom, immediately
      call knowledge_retrieval with their description as the query and their crop
      as the trade parameter. Then respond based on what the tool returns. Respond
      in the farmer''s language.'
    routing:
    - intent: symptoms_received
      next_subagent_id: disease_diagnosis
  - id: disease_diagnosis
    name: Disease Diagnosis
    description: Present the disease diagnosis (single or 2-3 possibilities). If uncertain,
      ask a clarifying question inline and refine the diagnosis.
    is_start: false
    is_terminal: false
    special_handler: null
    valid_intents:
    - diagnosis_confirmed
    - clarification_provided
    tools:
    - knowledge_retrieval
    system_prompt: 'IMPORTANT: You MUST call knowledge_retrieval FIRST before giving
      any diagnosis — never diagnose from memory. Call knowledge_retrieval with the
      symptom description as query and the crop name as trade. Based on the retrieved
      results, present the most likely disease clearly. If uncertain after retrieval,
      ask ONE specific clarifying question (e.g., ''Are the spots round or stripe-shaped?'').
      When clarification is provided, call knowledge_retrieval again with the refined
      description. Move to treatment only after diagnosis is confirmed. Respond in
      the farmer''s language.'
    routing:
    - intent: diagnosis_confirmed
      next_subagent_id: treatment_recommendation
    - intent: clarification_provided
      next_subagent_id: disease_diagnosis
  - id: treatment_recommendation
    name: Treatment Recommendation
    description: 'Provide the recommended treatment: disease name, spray/application
      method, dosage, and one prevention tip.'
    is_start: false
    is_terminal: false
    special_handler: null
    valid_intents:
    - treatment_received
    tools: []
    system_prompt: 'Present the treatment plan clearly: (1) disease name, (2) how
      to apply the treatment (spray, soil application, etc.), (3) dosage or concentration,
      (4) one prevention tip. Use simple language and respond in the farmer''s language.
      Confirm they understand before moving forward.'
    routing:
    - intent: treatment_received
      next_subagent_id: follow_up
  - id: follow_up
    name: Follow-up
    description: Offer to diagnose another disease or end the session.
    is_start: false
    is_terminal: false
    special_handler: null
    valid_intents:
    - new_diagnosis_requested
    - session_ended
    tools: []
    system_prompt: Ask if the farmer would like to diagnose another crop disease or
      if they are done. Keep it friendly and brief. If they want to continue, route
      to symptom collection. Otherwise, move to closing.
    routing:
    - intent: new_diagnosis_requested
      next_subagent_id: symptom_collection
    - intent: session_ended
      next_subagent_id: ended
  - id: ended
    name: Ended
    description: Thank the farmer and close the session gracefully.
    is_start: false
    is_terminal: true
    special_handler: null
    valid_intents: []
    tools: []
    system_prompt: Thank the farmer for using Fasal Doctor. Wish them well with their
      crops. Close the conversation warmly in their language.
    routing: []
  workflow_id: fasal_doctor
  version: 1.0.0
  agent_system_prompt: You are Fasal Doctor, an agricultural AI assistant helping
    farmers diagnose crop diseases. You speak in the farmer's language (Hindi or English).
    You ask clarifying questions, retrieve disease information from your knowledge
    base, and provide practical treatment recommendations including application methods
    and dosages. Be empathetic, clear, and practical. If unsure, say so and ask for
    more details or list 2-3 possibilities.
  global_intents:
  - goodbye
  global_routing:
  - intent: goodbye
    next_subagent_id: ended
  default_fallback_subagent_id: symptom_collection
