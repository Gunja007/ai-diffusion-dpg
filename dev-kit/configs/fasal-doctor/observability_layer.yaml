observability:
  domain: fasal_doctor
  sli:
    turn_latency_p99_ms: 1200
    trust_block_rate_max: 0.05
  audit:
    retention_days: 90
  outcomes:
    lifecycle:
    - state: enquiry
      trigger_tool: null
      trigger_condition: null
    - state: diagnosis_given
      trigger_tool: knowledge_retrieval
      trigger_condition: null
    - state: session_closed
      trigger_tool: null
      trigger_condition: null
    metrics:
    - name: diagnoses.total
      instrument: counter
      description: Total number of crop disease diagnoses provided to farmers
      unit: '1'
      attributes:
      - farmer_id
      - crop_type
      - disease_name
    - name: escalations.total
      instrument: counter
      description: Total number of sessions escalated due to trust violations or uncertain
        diagnoses
      unit: '1'
      attributes:
      - reason
      - state
