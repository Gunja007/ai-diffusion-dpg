# dev-kit/configs/blue-dots-economy/action_gateway.yaml
# Blue Dots Economy domain values for Action Gateway.
# Merged with dev-kit/dpg/action_gateway.yaml by loader.py before deployment.
#
# Four tools back the voice-first job-seeker journey:
#   fetch_profile  — GET  /mock/blue_dots/seeker_fetch  (seeker lookup by phone)
#   fetch_jobs     — GET  /mock/blue_dots/job_fetch     (provider listings)
#   onboard        — POST /mock/blue_dots/onboard       (create/update user+profile)
#   apply_job      — POST /mock/blue_dots/apply         (submit application)
#
# All four endpoints currently point at the in-process Action Gateway mocks
# (http://action_gateway:9999/mock/blue_dots/*). Swap each tool's base_url
# and path to the real upstream once the schemas are finalised.
#
# Auth (when we switch to the real services):
#   - fetch_profile, fetch_jobs       — public, no key required
#   - onboard, apply_job              — x-api-key header, shared secret
#     (env var: BLUE_DOTS_API_KEY)

tools:

  # ────────────────────────────────────────────────────────────────────
  # READ — Seeker profile lookup by phone.
  # ────────────────────────────────────────────────────────────────────
  - id: fetch_profile
    type: rest_api
    category: read
    description: >
      Fetch any existing seeker profiles for the caller's phone number
      from the Porbandar Job Fair 2026 provider network. Returns zero profiles for a
      new user, one profile for a returning user, or multiple profiles
      when the same phone has been used to create several accounts.
      ALWAYS call this once on the first turn after consent has been
      granted. For multi-profile callers, prefer the most recently
      updated profile (highest `updated_at`) when extracting fields.

      Profile schema (profile_1.0). Required: name, gender, location,
      age, phone. Optional: trade (nameOfJobRolesInterestedIn),
      work_experience (workExperience: Fresher / Worked before /
      Returning after a break), experience_years
      (workExperienceYearsConditional: 0 / < 1 Year / 1 Year /
      2 Years / 3 Years / 3-5 Years / 5-10 Years / 10-15 Years /
      15+ Years / Other), qualification
      (highestQualificationOrSkill: School / College / ITI Other
      Vocational Trainings / Certification Learned on the job),
      job_nature (natureOfJobsInterestedIn: Internship / Apprenticeship
      / Full-time / Flexible), help_needed (otherHelpNeeded: Training /
      Accommodation / Travel / Other). The trade field may be empty or
      noisy in older records — still ask the user to confirm.
    # Signals-DPG runs on the host at port 2742; from inside the
    # action_gateway container we reach it via host.docker.internal.
    base_url: "http://host.docker.internal:2742"
    # fetch_local is a public endpoint — no auth headers required.
    timeout_ms: 5000
    health_check:
      enabled: false
    endpoints:
      - name: seeker_fetch
        method: POST
        path: /api/v1/network/item/fetch_local
        # POST body declares the filter (item_state.phone) inline.
        # Caller's phone is auto-injected from session.user_id via the
        # adapter's body-template substitution. Upstream stores phone
        # in bare 10-digit form ("7892487848"), which matches what
        # Reach Layer surfaces as user_id after the 91-prefix strip
        # in reach_layer/voice/server.py.
        body_template:
          item_network: "blue_dot"
          item_domain: "seeker"
          item_type: "profile_1.0"
          item_state:
            phone: "{user_id}"
          limit: 20
          offset: 0
        params: []
    response:
      max_size_chars: 4000
      projection:
        list_key: items
        fields:
          # Identity + required fields per the profile_1.0 schema.
          item_id: item_id
          # ``source_item_owner`` is what apply_job needs to pass as
          # the profile owner's UUID. The upstream stores it as
          # ``created_by`` on the seeker item. Projecting it here lets
          # the existing-profile path skip the list_user_profiles call
          # entirely — fetch_profile already returns everything the
          # downstream apply step needs.
          source_item_owner: created_by
          name: item_state.name
          phone: item_state.phone
          age: item_state.age
          gender: item_state.gender
          location: item_state.location
          # Optional fields — may be absent on older / partial profiles.
          # `trade` is the user's intended role; may be empty or noisy
          # ("1") on older records, so always confirm with the user.
          trade: item_state.nameOfJobRolesInterestedIn
          # Fed into apply_job.requirements_snapshot
          work_experience: item_state.workExperience
          experience_years: item_state.workExperienceYearsConditional
          qualification: item_state.highestQualificationOrSkill
          job_nature: item_state.natureOfJobsInterestedIn
          help_needed: item_state.otherHelpNeeded
          # For multi-profile disambiguation (most recently updated wins).
          updated_at: updated_at

  # ────────────────────────────────────────────────────────────────────
  # READ — Job listings filtered by city and role.
  # ────────────────────────────────────────────────────────────────────
  - id: fetch_jobs
    type: rest_api
    category: read
    description: >
      Search the Porbandar Job Fair 2026 provider network for live job postings,
      filtered by the user's location (jobProviderLocation). ALWAYS
      call this once after location is confirmed. The trade/role is
      NOT filtered server-side — read the projected results and pick
      the one(s) that match the user's role of interest. NEVER
      describe job availability from memory — always fetch fresh.

      Each item carries: role, company (jobProviderName), location
      (jobProviderLocation), positions, nature_of_job (Internship /
      Apprenticeship / Full-time / Flexible), and one of three
      pay-model pairs depending on the job: salary_min / salary_max,
      stipend_min / stipend_max, or task_rate_min / task_rate_max.
      Read out whichever is populated. Hiring-manager contact
      details are intentionally not exposed to the LLM.
    base_url: "http://host.docker.internal:2742"
    # fetch_local is a public endpoint — no auth headers required.
    timeout_ms: 5000
    health_check:
      enabled: false
    endpoints:
      - name: job_fetch
        method: POST
        path: /api/v1/network/item/fetch_local
        # Server-side filter on jobProviderLocation. The LLM supplies
        # the canonical city name ("Bengaluru", "Mumbai", etc.) and
        # the adapter substitutes it into the body. Upstream returns
        # only matching jobs.
        body_template:
          item_network: "blue_dot"
          item_domain: "provider"
          item_type: "job_posting_1.0"
          item_state:
            jobProviderLocation: "{location}"
          limit: 20
          offset: 0
        params:
          - name: location
            source: agent
            type: string
            required: true
            description: >
              City to filter jobs by. Pass the canonical spelling
              ("Bengaluru", "Mumbai", "Kannur", etc.). The upstream
              matches jobProviderLocation EXACTLY — a different
              spelling = zero matches. The job_match subagent's
              prompt has a normalisation map for common Indian
              cities.
    response:
      max_size_chars: 4000
      projection:
        list_key: items
        fields:
          # Identity + display fields (used by the bot when reading jobs aloud).
          item_id: item_id
          role: item_state.role
          company: item_state.jobProviderName
          location: item_state.jobProviderLocation
          positions: item_state.positions
          nature_of_job: item_state.natureOfJob
          # Three pay-model pairs; only one is populated per job. Bot
          # reads out whichever pair has values.
          salary_min: item_state.salaryMin
          salary_max: item_state.salaryMax
          stipend_min: item_state.stipendMin
          stipend_max: item_state.stipendMax
          task_rate_min: item_state.taskRateMin
          task_rate_max: item_state.taskRateMax
          # Match-quality fields the LLM can use if the user asks
          # about fit. Optional on the upstream side.
          candidate_experience_type: item_state.candidateExperienceType
          work_experience_years: item_state.workExperienceYears
          min_educational_institute: item_state.minEducationalInstitute
          last_role_held: item_state.lastRoleHeld
          # Hiring-manager fields (hiringManagerName,
          # hiringManagerPhoneNumber, hiringManagerEmail) are
          # intentionally NOT projected — internal/PII, not for the
          # LLM to mention or read aloud.

  # ────────────────────────────────────────────────────────────────────
  # WRITE — Create or update the seeker profile via the Signals
  # /api/v1/admin/participant endpoint. The same call covers both
  # CREATE and UPDATE: omit ``item_id`` to insert a new profile;
  # include ``item_id`` (the existing profile's UUID) to update that
  # one. The upstream does NOT support partial updates — pass the
  # full ``item_state`` every time. Response carries the upserting
  # participant's ``user_id`` (= acting_as_user_id for apply_job) and
  # an ``items`` array containing the affected profile (1 item for
  # UPDATE, all of the user's profiles for CREATE).
  # ────────────────────────────────────────────────────────────────────
  - id: save_profile
    type: rest_api
    category: write
    description: >
      Create a new seeker profile, OR update an existing one. Call this
      when the user has chosen create_new or update_existing
      (profile_action in session). For UPDATE, pass the chosen profile's
      item_id along with the full item_state (existing values with the
      user's changes overlaid). For CREATE, omit item_id. workExperience
      MUST be one of "Fresher" / "Worked before" / "Returning after a
      break". The response returns the affected profile in the items
      array — for UPDATE it has just the updated profile; for CREATE it
      has all the user's profiles and the newly-created one is the last
      by created_at.
    base_url: "http://host.docker.internal:2742"
    auth:
      type: api_key
      header: x-api-key
      secret_env: BLUE_DOTS_API_KEY
    # Signals' admin endpoints require a tenant identifier alongside
    # the API key — generic adapter feature, env-driven.
    extra_headers:
      - name: x-acting-org-id
        secret_env: BLUE_DOTS_ORG_ID
    timeout_ms: 5000
    health_check:
      enabled: false
    endpoints:
      - name: save_profile
        method: POST
        path: /api/v1/admin/participant
        body_template:
          # Top-level participant identity. name is the participant's
          # display name; phone_number must be E.164 (+91 prefix is
          # required by the upstream's regex). The adapter substitutes
          # session.user_id (bare 10-digit) into the embedded +91 prefix.
          name: "{name}"
          phone_number: "+91{user_id}"
          # Both consent flags MUST be literal true — schema-enforced.
          # Voice consent has already been captured at session start.
          terms_accepted: true
          privacy_accepted: true
          # channel must be one of bulk/link/voice/self — we're voice.
          channel: "voice"
          # source_id is the Vobiz outbound number — tags every profile
          # written via the voice bot for analytics / audit.
          source_id: "919240024229"
          network: "blue_dot"
          domain: "seeker"
          item_type: "profile_1.0"
          # When the LLM omits profile_item_id (create_new path), the
          # body_template renderer DROPS the item_id field entirely.
          # When present, the upstream treats the call as UPDATE on
          # that specific item_id.
          item_id: "{profile_item_id}"
          item_state:
            name: "{name}"
            phone: "{user_id}"
            gender: "{gender}"
            location: "{location}"
            age: "{age}"
            workExperience: "{work_experience}"
            workExperienceYearsConditional: "{experience_years}"
            nameOfJobRolesInterestedIn: "{trade}"
            highestQualificationOrSkill: "{qualification}"
            natureOfJobsInterestedIn: "{job_nature}"
            otherHelpNeeded: "{help_needed}"
        params:
          - name: name
            source: agent
            type: string
            required: true
            description: "Caller's full name."
          - name: gender
            source: agent
            type: string
            required: true
            description: 'Gender (e.g. "Male", "Female", "Other").'
          - name: location
            source: agent
            type: string
            required: true
            description: "City the caller is in / wants to work."
          - name: age
            source: agent
            type: integer
            required: true
            description: "Caller's age in years."
          - name: work_experience
            source: agent
            type: string
            required: true
            description: >
              Must be EXACTLY one of: "Fresher", "Worked before",
              "Returning after a break". Map the caller's words to the
              closest enum value.
          - name: profile_item_id
            source: agent
            type: string
            required: false
            description: >
              Existing profile's item_id, when UPDATING that profile.
              Omit (or pass empty) to CREATE a new profile.
          - name: experience_years
            source: agent
            type: string
            required: false
            description: >
              workExperienceYearsConditional value if known. One of:
              "0", "< 1 Year", "1 Year", "2 Years", "3 Years",
              "3-5 Years", "5-10 Years", "10-15 Years", "15+ Years",
              "Other".
          - name: trade
            source: agent
            type: string
            required: false
            description: 'nameOfJobRolesInterestedIn (e.g. "Plumber").'
          - name: qualification
            source: agent
            type: string
            required: false
            description: >
              highestQualificationOrSkill. One of: "School", "College",
              "ITI / Other Vocational Trainings", "Certification /
              Learned on the job".
          - name: job_nature
            source: agent
            type: string
            required: false
            description: >
              natureOfJobsInterestedIn. One of: "Internship",
              "Apprenticeship", "Full-time", "Flexible".
          - name: help_needed
            source: agent
            type: string
            required: false
            description: >
              otherHelpNeeded. One of: "Training", "Accommodation",
              "Travel", "Other".
    response:
      max_size_chars: 4000
      # Expose user_id (= acting_as_user_id for apply_job) and the items
      # array. For UPDATE the array has one element (the updated profile);
      # for CREATE it contains all the user's profiles and the new one
      # is the last by created_at — the LLM picks the right one.
      projection:
        fields:
          user_id: user_id
          user_existed: user_existed
          items: items

  # ────────────────────────────────────────────────────────────────────
  # WRITE — Submit the application linking caller profile to the job.
  # ────────────────────────────────────────────────────────────────────
  - id: apply_job
    type: rest_api
    category: write
    description: >
      Submit a job application linking the chosen seeker profile to the
      selected job posting. Call ONLY after a profile has been chosen
      (use_existing) or created/updated via save_profile AND the
      acting_as_user_id is known. The LLM passes the three dynamic IDs
      plus the requirements_snapshot fields — the static envelope
      (item_network, item_domain, item_type, item_instance_url,
      action_type) lives in body_template and never needs to be
      supplied by the LLM.
    base_url: "http://host.docker.internal:2742"
    auth:
      type: api_key
      header: x-api-key
      secret_env: BLUE_DOTS_API_KEY
    extra_headers:
      - name: x-acting-org-id
        secret_env: BLUE_DOTS_ORG_ID
    timeout_ms: 5000
    health_check:
      enabled: false
    endpoints:
      - name: apply
        method: POST
        path: /api/v1/action/perform
        body_template:
          action_type: "apply"
          source_item:
            item_network: "blue_dot"
            item_domain: "seeker"
            item_type: "profile_1.0"
            item_id: "{profile_item_id}"
          target_item:
            item_network: "blue_dot"
            item_domain: "provider"
            item_type: "job_posting_1.0"
            item_id: "{job_item_id}"
            # The Signals self-URL — the target lives on this same
            # Signals instance. Localhost is what Signals knows itself
            # as; from action_gateway's docker network we send it
            # back through host.docker.internal but the URL value
            # embedded in the action record is what the upstream uses.
            item_instance_url: "http://localhost:2742"
          requirements_snapshot:
            role: "{role}"
            workExperience: "{work_experience}"
            age: "{age}"
          # The acting user — the seeker who is applying. From
          # fetch_profile's `source_item_owner` (use_existing path)
          # or save_profile's `user_id` (create_new / update_existing).
          acting_as_user_id: "{acting_as_user_id}"
        params:
          - name: profile_item_id
            source: agent
            type: string
            required: true
            description: >
              The chosen profile's item_id — from fetch_profile (use_existing
              path) or save_profile's response (create_new / update_existing).
          - name: acting_as_user_id
            source: agent
            type: string
            required: true
            description: >
              The seeker's user UUID. From fetch_profile's
              source_item_owner field (use_existing) or save_profile's
              user_id (create_new / update_existing). The upstream rejects
              the apply without it.
          - name: job_item_id
            source: agent
            type: string
            required: true
            description: >
              The chosen job's item_id from the prior fetch_jobs result.
          - name: role
            source: agent
            type: string
            required: true
            description: >
              The role being applied for — the SELECTED JOB's role
              (e.g. "Plumber"), NOT the user's intended trade. They
              usually match.
          - name: work_experience
            source: agent
            type: string
            required: true
            description: >
              workExperience for requirements_snapshot. One of:
              "Fresher", "Worked before", "Returning after a break".
              Pull from the chosen profile; ask the user if missing.
          - name: age
            source: agent
            type: integer
            required: true
            description: >
              age for requirements_snapshot — pull from the chosen
              profile.
    response:
      max_size_chars: 1000
      projection:
        fields:
          action_id: action_id
          action_status: action_status
          source_item_id: source_item_id
          target_item_id: target_item_id

observability:
  domain: "blue_dot"
