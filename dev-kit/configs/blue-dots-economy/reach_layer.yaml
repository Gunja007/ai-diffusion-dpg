# dev-kit/configs/blue-dots-economy/reach_layer.yaml
# Blue Dots Economy — Reach Layer domain config.
# Deep-merged on top of dev-kit/dpg/reach_layer.yaml at startup.
#
# Voice channel only. Web is left disabled but present so the config
# is structurally complete and easy to flip on later.

reach_layer:

  common:
    observability:
      domain: "blue_dot"

  channels:

    cli:
      prompt: "You: "
      agent_prefix: "Agent: "

    web:
      auth:
        enabled: false
        google_client_id: ""
        cookie_secure: false
      ui:
        app_name: "Porbandar Job Fair 2026"
        app_tagline: "Voice job assistant"
        app_icon: "🔵"
        agent_avatar: "🔵"
        user_avatar: "👤"
        setup_heading: "Welcome to the Porbandar Job Fair 2026"
        setup_subtitle: "Enter your phone number to begin a session."
        user_id_placeholder: "e.g. 9876543210"
        user_id_hint: "Use your phone number — no spaces, no country code."
        start_btn_label: "Start →"
        new_session_msg: "Hello! I'm the Porbandar Job Fair 2026 assistant. How can I help you find work today?"
        returning_user_msg: "Welcome back!"
        storage_key: "blue_dots_user_id"
        theme_storage_key: "blue_dots_theme"
        sign_out_confirm: "Sign out?"
        switch_user_confirm: "Switch user? Your current session will be closed."
        delete_conversation_confirm: "Delete this conversation? This cannot be undone."

    voice:
      # English / Hindi / Gujarati. VAD tuned for English (shorter
      # pauses than Hindi-only callers); Hindi/Gujarati turns still
      # land within the ceiling.
      vad:
        stop_secs: 0.7
      raya:
        stt_language: "en"
        tts_language: "en-in"
        voice_id: "0f24fb66-e495-4781-9e84-1224aa7dacde"   # Nayra, en-in
      agent_core:
        timeout_ms: 15000
        # Opening line on call pickup is emitted by Agent Core as the
        # entry subagent's opening_phrase (greet_consent). Do not add
        # a static greeting here.
        fallback_phrase: "Sorry, I didn't catch that. Could you say it again?"
        # GH-152: brief acknowledgement spoken when the caller barges
        # in mid-response. TTS already flushed by the time this plays.
        barge_in_acknowledgement: "One second."
      # GH-242: short filler if the first SentenceEvent hasn't reached
      # TTS within filler_threshold_ms of submit_input completing.
      filler_threshold_ms: 1500
      filler_phrase: "One second"
      # GH-137: spoken just before WebSocket close on bot-initiated hangup.
      terminal_word: "Thank you"
      recording:
        source: pipeline
        consent_purpose: storage    # piggy-backs on the storage consent grant.
        min_duration_ms: 500
        caller_id_hash_salt: "blue-dots-local-salt-change-me-32chars+"
        store:
          backend: local
          local:
            base_path: /var/recordings
        start_on_connect: true
