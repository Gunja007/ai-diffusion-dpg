# dev-kit/configs/blue-dots-economy/observability_layer.yaml
# Blue Dots Economy — Observability Layer domain config.

observability:
  domain: "blue_dot"

  outcomes:
    lifecycle:
      - state: "enquiry"
        trigger_tool: null

      # trigger_condition values are reserved (GH-115). For now any
      # successful invocation of trigger_tool transitions into the state.
      - state: "profile_fetched"
        trigger_tool: "fetch_profile"
        trigger_condition: "result == 'success'"

      - state: "jobs_listed"
        trigger_tool: "fetch_jobs"
        trigger_condition: "result == 'success'"

      - state: "onboarded"
        trigger_tool: "onboard"
        trigger_condition: "result == 'success'"

      - state: "applied"
        trigger_tool: "apply_job"
        trigger_condition: "result == 'success'"

    metrics:
      - name: "blue_dots.applications"
        instrument: counter
        description: "Total job applications submitted via the Porbandar Job Fair 2026."
        attributes:
          - "trade"
          - "city"

      - name: "blue_dots.jobs_listed"
        instrument: counter
        description: "Total fetch_jobs calls that returned at least one result."
        attributes:
          - "trade"
          - "city"

      - name: "blue_dots.drop_off.by_stage"
        instrument: counter
        description: >
          Sessions that ended at each lifecycle stage. Useful to spot
          where callers churn — pre-consent vs pre-trade vs pre-apply.
        attributes:
          - "stage"
          - "intent"

  sli:
    # SLI threshold enforcement (alerts) tracked in GH-160.
    turn_latency_p99_ms: 1200
    trust_block_rate_max: 0.05

  audit:
    # retention_days sweep tracked in GH-161.
    retention_days: 90
