# knowledge_engine/config/domain.yaml — KKB domain config (local dev).
# In Docker/Kubernetes this file is replaced by dev-kit/configs/kkb/knowledge_engine.yaml.

knowledge:
  blocks:
    glossary:
      enabled: true
      mappings:
        - colloquial: ["kaam chahiye", "naukri chahiye", "job chahiye"]
          canonical: "market_truth_query"
        - colloquial: ["ITI", "tradesman", "technician"]
          canonical: "iti_graduate"
        - colloquial: ["course", "training", "sikhai"]
          canonical: "training_query"
        - colloquial: ["apply kar do", "form bharo"]
          canonical: "apply_now"
        - colloquial: ["counsellor chahiye", "kisi se baat karni hai"]
          canonical: "counsellor_request"
        - colloquial: ["kitna milega", "salary kya hai", "pay kya hai"]
          canonical: "pay_range_query"
        - colloquial: ["electrician", "bijli wala"]
          canonical: "trade:electrician"
        - colloquial: ["fitter"]
          canonical: "trade:fitter"
        - colloquial: ["welder"]
          canonical: "trade:welder"
        - colloquial: ["PMKVY", "Pradhan Mantri Kaushal"]
          canonical: "scheme:pmkvy"
        - colloquial: ["Hubli", "Dharwad", "Belgaum"]
          canonical: "location:karnataka_north"
      apply_to: [normalised_input, entities]

    static_knowledge_base:
      enabled: true
      collection_name: kkb_knowledge
      chroma_persist_dir: /app/chroma_db
      sources:
        - path: ./data/labour_schemes.pdf
          type: static
          doc_type: scheme
          refresh: manual
        - path: ./data/trade_descriptions.pdf
          type: static
          doc_type: trade
          refresh: annual
        - path: ./data/training_institutes.csv
          type: static
          doc_type: institute
          refresh: monthly
        - path: ./data/bridge_income_options.pdf
          type: static
          doc_type: bridge_income
          refresh: manual
        - path: ./data/onest_market_truth_framing.md
          type: always_include
          doc_type: always_include
          refresh: manual
      intent_filters:
        market_truth_query: [scheme, trade, bridge_income]
        scheme_query: [scheme]
        training_query: [trade, institute]
        pay_range_query: [trade]
        apply_now: [scheme, institute]
        counsellor_request: []
        unknown: []

    multimodal_input_handler:
      image_model: claude-haiku-4-5-20251001

# NOTE: the `conversation:` block (persona, language_instruction, guardrail_reminders)
# that previously lived here was a duplicate of the same block in agent_core.yaml.
# Knowledge Engine does not assemble prompts — main.py:retrieve explicitly documents
# "Returns knowledge chunks only — prompt assembly is Agent Core's responsibility."
# If prompt assembly is ever moved back into KE, re-add the block here.

observability:
  domain: "kkb"
