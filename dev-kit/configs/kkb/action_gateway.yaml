# dev-kit/configs/kkb/action_gateway.yaml
# KKB domain values for Action Gateway.
# Merged with dev-kit/dpg/action_gateway.yaml by loader.py before deployment.

tools:
  - id: onest_market_lookup
    type: rest_api
    category: read
    description: >
      Search the ONEST job network for live job listings. Returns verified job postings
      from the ONEST network including roles, employers, locations, and salary details.
      Always call with a natural language query_text describing what the user is looking for.
      Add structured filters only when the user has explicitly stated those preferences.
    base_url: "https://up-onest-lite-bap.dhiway.net/api/v1"
    auth:
      type: api_key
      header: X-API-KEY
      secret_env: ONEST_API_KEY
    timeout_ms: 5000
    health_check:
      enabled: false
    endpoints:
      - name: search
        method: POST
        path: /search/top
        params:
          - name: query_text
            source: agent
            type: string
            required: true
            description: >
              Natural language sentence describing the user's job search in English.
              Always include location and trade. 1-2 sentences max.
              Examples: "electrician jobs in Hubballi with 15000 monthly in-hand",
              "ITI fitter mechanical jobs in Pune immediate joining",
              "helper warehouse jobs in Noida full-time day shift".
          - name: industry
            source: agent
            type: string
            required: false
            description: >
              Broad industry category. Include only if clearly known.
              Examples: Manufacturing, Electrical, Construction, Customer Facing, Logistics.
          - name: age
            source: agent
            type: integer
            required: false
            description: "Candidate age in years. Include only if known from profile."
          - name: languages
            source: agent
            type: array
            required: false
            description: >
              Languages the candidate speaks. Capitalised strings.
              Examples: ["Hindi"], ["Hindi", "Kannada"].
          - name: preferred_work_mode
            source: agent
            type: array
            required: false
            description: >
              Work preference from: on-site-no-shift, on-site-shifts, remote, hybrid.
              Include only if the user has stated a preference.
          - name: monthly_in_hand
            source: agent
            type: integer
            required: false
            description: "Expected monthly in-hand salary in INR. Include only if stated."
          - name: work_hours_per_day
            source: agent
            type: integer
            required: false
            description: "Preferred working hours per day. Include only if stated."
          - name: limit
            source: static
            type: integer
            value: 10
          - name: page
            source: static
            type: integer
            value: 1
          - name: role
            source: agent
            type: string
            required: false
            description: "Preferred role. Include only if stated."
          - name: location
            source: agent
            type: string
            required: false
            description: "Preferred location of search. Include only if stated."
    response:
      max_size_chars: 4000
      # Slim LLM-visible projection — shapes what flows back into the second
      # LLM call as result_text. The raw response is still retained on
      # ToolResult.result for observability.
      projection:
        list_key: data
        fields:
          role_id: job_id
          title: metadata.tags.jobDetails.title
          employer: metadata.tags.basicInfo.jobProviderName
          city: metadata.locations.city
          state: metadata.locations.state
          pay_min: metadata.tags.jobDetails.minMonthlyInHand
          pay_max: metadata.tags.jobDetails.maxMonthlyInHand
          positions: metadata.tags.jobDetails.positions
          industry: metadata.tags.industry
          status: metadata.tags.status
          role: metadata.tags.role

  # ────────────────────────────────────────────────────────────────────
  # Mocked profile / apply flow (demo fixtures).
  #
  # All three tools point at Action Gateway's own /mock/* routes — no
  # external service is required to exercise the end-to-end tool path.
  # Swap each base_url to a real upstream once one exists.
  #
  # The ``{user_id}`` in the paths is substituted by the rest_api adapter
  # from the caller's session user_id — the LLM does NOT supply it.
  # ────────────────────────────────────────────────────────────────────

  - id: get_profile
    type: rest_api
    category: read
    description: >
      Fetch the caller's saved profile. Call ONLY after the user has
      explicitly agreed to let you look up their profile. Returns the
      stored fields (trade, location, age, languages, years_experience,
      certifications, preferred_work_mode, monthly_in_hand_expected,
      actions_taken, profile_id) for returning users; returns an empty
      object when the user is new. After receiving a profile, briefly
      summarise what you found in one sentence and continue with one
      open-ended question — do NOT immediately make another tool call.
    base_url: "http://action_gateway:9999"
    timeout_ms: 3000
    # Self-referential mocks would deadlock the synchronous /health probe;
    # skip the reachability HEAD and always report healthy.
    health_check:
      enabled: false
    endpoints:
      - name: get_profile
        method: GET
        path: "/mock/profile/{user_id}"
        params: []
    response:
      max_size_chars: 3000

  - id: update_profile
    type: rest_api
    category: write
    description: >
      Save a correction or an addition to the caller's profile. Call when
      the user explicitly restates a field (e.g. "my trade is plumber,
      not electrician" or "I'm based in Pune now"). Pass only the fields
      the user actually mentioned — do NOT echo back the entire profile.
      Returns the list of fields that were applied so you can confirm the
      update to the user in one short sentence.
    base_url: "http://action_gateway:9999"
    timeout_ms: 3000
    health_check:
      enabled: false
    endpoints:
      - name: update_profile
        method: POST
        path: "/mock/profile/{user_id}"
        params:
          - name: trade
            source: agent
            type: string
            required: false
            description: "User's primary trade (e.g. electrician, fitter, plumber)."
          - name: location
            source: agent
            type: string
            required: false
            description: "City or district the user wants to work in."
          - name: age
            source: agent
            type: integer
            required: false
            description: "User's age in years."
          - name: languages
            source: agent
            type: array
            required: false
            description: 'Capitalised language names, e.g. ["Hindi", "Kannada"].'
          - name: years_experience
            source: agent
            type: integer
            required: false
            description: "Years of experience in the stated trade."
          - name: certifications
            source: agent
            type: array
            required: false
            description: 'Any formal certifications, e.g. ["ITI", "NCVT"].'
          - name: preferred_work_mode
            source: agent
            type: array
            required: false
            description: >
              One or more of: on-site-no-shift, on-site-shifts, remote, hybrid.
          - name: monthly_in_hand_expected
            source: agent
            type: integer
            required: false
            description: "Expected monthly in-hand salary in INR."
    response:
      max_size_chars: 1000

  - id: apply_job
    type: rest_api
    category: write
    description: >
      Submit a job application on the caller's behalf. Call ONLY after the
      user has explicitly confirmed they want to apply to a specific job.
      Both job_id (from a prior onest_market_lookup result) and profile_id
      (from a prior get_profile result) are REQUIRED. Returns the
      application_id, expected callback window, and employer name so you
      can confirm the submission to the user.
    base_url: "http://action_gateway:9999"
    timeout_ms: 5000
    health_check:
      enabled: false
    endpoints:
      - name: apply_job
        method: POST
        path: "/mock/apply"
        params:
          - name: job_id
            source: agent
            type: string
            required: true
            description: "Job listing ID from a previous onest_market_lookup result."
          - name: profile_id
            source: agent
            type: string
            required: true
            description: "User's profile_id from a prior get_profile call."
    response:
      max_size_chars: 1000

