# =============================================================================
# dev-kit/configs/kkb/reach_layer.yaml — KKB domain-specific Reach Layer config.
# =============================================================================
# Contains KKB-specific values only: UI branding, spoken/displayed text,
# language/voice choice, SSO policy, and the domain identifier. Deep-merged
# on top of `dev-kit/dpg/reach_layer.yaml` (which holds infrastructure keys:
# endpoints, ports, timeouts, protocol flags) at startup.
#
# Keys here must NOT duplicate anything in dpg/reach_layer.yaml — the two
# files partition the schema by purpose, not by override.
# =============================================================================

reach_layer:

  common:
    observability:
      domain: "kkb"

  channels:

    cli:
      prompt: "You: "
      agent_prefix: "Agent: "

    web:
      auth:
        enabled: false
        google_client_id: ""
        # Local dev uses plain http://localhost, so Secure cookies would be
        # dropped by the browser. Override to false; production deploys flip
        # this to true once served over TLS.
        cookie_secure: false

      ui:
        app_name: "Kaam Ki Baat"
        app_tagline: "DPG Skill-Jobs AI"
        app_icon: "💼"
        agent_avatar: "💼"
        user_avatar: "👤"
        setup_heading: "Kaam Ki Baat में आपका स्वागत है · Welcome to Kaam Ki Baat"
        setup_subtitle: "अपना यूज़र ID दर्ज करें · Enter your user ID to begin or resume a conversation."
        user_id_placeholder: "e.g. rahul_electrician"
        user_id_hint: "Use your name and trade, e.g. rahul_electrician"
        start_btn_label: "बातचीत शुरू करें · Start chatting →"
        new_session_msg: "नमस्ते! मैं Kaam Ki Baat हूँ। आज मैं आपकी कैसे मदद कर सकता हूँ? · Hello! I'm Kaam Ki Baat. How can I help you today?"
        returning_user_msg: "वापस आने पर स्वागत है! · Welcome back! Continuing your previous conversation."
        storage_key: "kkb_user_id"
        theme_storage_key: "kkb_theme"
        sign_out_confirm: "क्या आप साइन आउट करना चाहते हैं? · Sign out of your account?"
        switch_user_confirm: "यूज़र बदलें? आपका मौजूदा सेशन बंद हो जाएगा। · Switch user? Your current session will be closed."
        delete_conversation_confirm: "क्या यह बातचीत डिलीट करें? यह वापस नहीं आएगी। · Delete this conversation? This cannot be undone."

    voice:
      raya:
        stt_language: "hi"
        tts_language: "hi"
        voice_id: "d6a002d0-230c-49b1-a137-b8a7d564b1ae"  # Priyanka, hi
      agent_core:
        timeout_ms: 15000
        greeting: "नमस्ते! मैं Kaam Ki Baat हूँ। आज मैं आपकी कैसे मदद कर सकता हूँ?"
        fallback_phrase: "माफ़ कीजिए, मैं इसे समझ नहीं पाया। कृपया दोबारा कहें।"
