# agent_core/config/domain.yaml — KKB domain config (local dev).
# In Docker/Kubernetes this file is replaced by dev-kit/configs/kkb/agent_core.yaml.

agent:
  primary_model: claude-haiku-4-5-20251001
  fallback_model: claude-haiku-4-5-20251001
  ask_for_consent: true
  consent_prompt: "Namaste! Kya main aapki trade aur location yaad rakh sakta hoon? Isse agle baar aapko dobara batana nahi padega."

channels:
  voice:
    system_prompt_suffix: "1-2 chhote vakya bolein. Bullet points ya markdown mat use karein."
    terminal_word: "Goodbye"
    tts_rules:
      numbers: >
        Write all numbers in words in Devanagari. Never use digits in spoken output.
        Examples: 2 → दो, 350 → तीन सौ पचास, 24 → चौबीस, 48 → अड़तालीस.
      money: >
        Always speak monetary amounts in full words.
        Examples: ₹13,000–₹17,000 → तेरह हज़ार से सत्रह हज़ार,
        ₹500/day → पाँच सौ रुपये दिन का.
      dates: >
        Write dates in full spoken form, never use short formats.
        Example: 29/01/2026 → उनतीस जनवरी दो हज़ार छब्बीस.
      time: >
        Use सुबह/दोपहर/शाम/रात instead of AM/PM.
        Example: 3 PM → दोपहर तीन बजे, 10 AM → सुबह दस बजे.
      phone: >
        Say each digit one by one in words.
        Example: 9876543210 → नौ, आठ, सात, छह, पाँच, चार, तीन, दो, एक, शून्य.
      abbreviations: >
        Expand abbreviations as spoken letters in Devanagari.
        Examples: PMKVY → पी एम के वी वाय, NCVT → एन सी वी टी, GST → जी एस टी, ITI → आई टी आई.
      output_script: >
        All Hindi and Hinglish output MUST be in Devanagari script only.
        Never use Roman script for Hindi words.
        Examples: job → जॉब, market → मार्केट, skill → स्किल, option → ऑप्शन.
      english_loanwords: >
        Write English words used in Hindi speech in Devanagari transliteration.
        Examples: apply → अप्लाई, verified → वेरिफाइड, WhatsApp → व्हाट्सऐप,
        signal → सिग्नल, data → डेटा, location → लोकेशन, district → डिस्ट्रिक्ट.
    turn_assembler:
      silence_trigger:
        silence_ms: 400         # Voice: short silence before trigger (VAD-driven segments)
      max_wait_ceiling:
        max_wait_ms: 8000
  web:
    system_prompt_suffix: ""
    turn_assembler:
      silence_trigger:
        silence_ms: 1500        # Web: longer silence — users type slower than they speak
      max_wait_ceiling:
        max_wait_ms: 15000
  cli:
    system_prompt_suffix: ""
    turn_assembler:
      silence_trigger:
        silence_ms: 200         # CLI: very short — dev/test convenience
      max_wait_ceiling:
        max_wait_ms: 5000

conversation:
  blocked_message: "Maafi kijiye, main is vishay mein madad nahi kar sakta."
  escalation_message: "Main aapko ek counsellor se connect kar raha hoon jo aapki poori madad kar sakenge."
  output_blocked_message: "Maafi kijiye, abhi jawab dene mein dikkat ho rahi hai. Kripya dobara poochein."
  unknown_intent_message: "Maafi kijiye, main samajh nahi paya. Kripya dobara batayein."
  # Termination message — the LLM translates this into the user's language automatically.
  termination_message: "Shukriya! Aapki baat karke achha laga. Agar phir koi zaroorat ho toh zaroor aayein."
  unsupported_language_message: "Maafi kijiye, abhi hum sirf Hindi, Kannada, English aur Hinglish mein baat kar sakte hain. Kripya Hindi ya English mein poochein."

  # Consent and profile flow messages — the LLM translates these into the user's language.
  consent_message: >
    Namaskar! Kaam Ki Baat mein aapka swagat hai.
    Hum aapki madad karne se pehle, ek baar poochhna chahte hain —
    kya aap apni jaankari save karne ki anumati dete hain?
    Isse agle baar aapko wahi sawaal nahi poochhe jaayenge.
    Haan ya Nahi — dono theek hai.
  consent_decline_ack: >
    Theek hai, aapki privacy hum respect karte hain.
    Aapki jaankari is session ke baad delete kar di jaayegi.
    Ab chaliye aapki madad karte hain!
  profile_complete_message: "Shukriya! Ab main aapke liye sahi kaam dhundh raha hoon..."
  returning_user_greeting: "Namaskar! Aap wapas aa gaye. Chaliye dekhte hain aapke liye kya naya hai."

  # NEW (GH-139) — Conversational agent user mental-state model.
  # KKB classifies callers into five states that shape tone, pacing, and detail level.
  user_state_model:
    enabled: true
    default_state: fog
    states:
      - id: fog
        signals:
          - "koi kaam hai kya"
          - "kuch samajh nahi aa raha"
          - "naukri chahiye"
          - "kuch bata do"
          - "pata nahi kya karna hai"
        guidance: >
          User has not yet understood their market situation. Do not jump to options or interrogate.
          Ask only 1-2 natural questions to establish location and trade. Show what the market
          looks like before making any suggestions. Tone: patient, grounded.

      - id: orientation
        signals:
          - "pay kitna milega"
          - "kaun si naukri hai"
          - "mere liye kya hai"
          - "skill kya chahiye"
          - "training chahiye"
          - "kaun sa trade achha hai"
          - "kitna deta hai"
        guidance: >
          User is starting to understand their landscape. Show verified market data clearly.
          Fill only the information gaps needed for a useful next answer. Present market reality
          honestly — ranges and counts, not guarantees. Tone: informative, steady.

      - id: evaluation
        signals:
          - "yeh wala ya woh wala"
          - "dono compare karo"
          - "kaunsa better hai"
          - "farak kya hai"
          - "sochna hai"
          - "decide nahi kar pa raha"
        guidance: >
          User is comparing real paths. Surface honest trade-offs: pay, distance, fit, growth.
          Never push one option as best. Explain what changes if they choose each path.
          Tone: balanced, never pressuring.

      - id: commitment
        signals:
          - "theek hai kar do"
          - "apply kar do"
          - "haan"
          - "chal karte hain"
          - "detail bhejo"
          - "abhi karna hai"
          - "ready hoon"
        guidance: >
          User has decided to act. Remove friction — get consent and execute.
          Do NOT ask clarifying questions at this stage. Keep language precise.
          Tone: efficient, warm.

      - id: follow_through
        signals:
          - "callback aaya kya"
          - "interview tha"
          - "job mili"
          - "nahi aaya"
          - "galat nikla"
          - "change ho gaya"
          - "wapas aa gaya"
        guidance: >
          Something has already happened. Do not restart the journey. Continue from where it
          left off. If something went wrong, acknowledge it before asking anything.
          Tone: empathetic, trust-building.

  # NEW (GH-137) — LLM-driven session-end detection for voice calls.
  session_end_eval:
    enabled: true
    prompt: |
      ## Session-end evaluation
      When the user clearly signals they want to end this conversation — by saying words like
      "shukriya", "theek hai bandh karo", "alvida", "phone rakh deti hoon", "phir milte hain",
      "bas ho gaya", or when you have delivered a complete closing message ending with "Goodbye" —
      call the `end_session` tool to cleanly close the session and save state for next time.
      Do NOT call end_session while the user still has open questions or is mid-journey.
    fail_action: "none"

connectors:
  read:
    - name: onest_market_lookup
      description: >
        Search the ONEST job network for live job listings matching the user's trade and location.
        ALWAYS call this before presenting any job options, pay ranges, or market picture.
        NEVER describe current job availability without calling this first — never use memory
        or prior results as a substitute for a fresh call.
      input_schema:
        type: object
        properties:
          query_text:
            type: string
            description: >
              Natural language search sentence in English describing what the user is looking for.
              Always include location and trade. Keep to 1-2 sentences.
              Examples: "electrician jobs in Hubballi with 15000 monthly salary",
              "helper or warehouse jobs in Noida full-time day shift",
              "ITI fitter mechanical jobs in Pune with immediate joining".
          industry:
            type: string
            description: >
              Broad industry category. Include only if clearly known.
              Examples: Manufacturing, Electrical, Construction, Customer Facing, Logistics.
          age:
            type: integer
            description: "Candidate age in years. Include only if known from profile."
          languages:
            type: array
            items:
              type: string
            description: >
              Languages the candidate speaks. Always capitalised. Include only if known.
              Examples: ["Hindi"], ["Hindi", "Kannada"], ["English", "Hindi"].
          preferred_work_mode:
            type: array
            items:
              type: string
              enum: ["on-site-no-shift", "on-site-shifts", "remote", "hybrid"]
            description: "Work preference. Include only if the user has stated a preference."
          monthly_in_hand:
            type: integer
            description: "Expected monthly in-hand salary in INR. Include only if stated by user."
          work_hours_per_day:
            type: integer
            description: "Preferred working hours per day. Include only if stated by user."
        required:
          - query_text
        additionalProperties: false
      invocation_rules:
        call_when: >
          The user is asking about current job availability, pay ranges, or specific openings
          AND both location and trade_or_stream are known in the session profile.
        required_before_calling:
          - location
          - trade_or_stream
        must_not_substitute: >
          NEVER use session memory, prior search results, or assumed market knowledge as a
          substitute for a fresh call. Always fetch live data when the user asks about
          current opportunities, even if a search was already done this session.
        on_empty: >
          ठीक है, इस वक्त इस एरिया में verified listing नहीं मिली।
          यह market weak हो सकती है, या data अभी नहीं है।
          कोई दूसरा angle देखें — थोड़ा wider radius, या adjacent trade?
        on_failure: >
          अभी market data available नहीं है। थोड़ी देर में दोबारा try करते हैं।
        bridge_line: "ठीक है, current picture देख लेती हूँ।"

  internal:
    - name: knowledge_retrieval
      route: knowledge_engine
      description: >
        Search the verified Kaam Ki Baat knowledge base for information on job trades,
        government schemes (PMKVY, NAPS, etc.), training institutes, and market context.
        Use this when the user asks a specific question that requires verified facts
        or scheme details — not for live job listings (use onest_market_lookup for that).
      input_schema:
        type: object
        properties:
          query:
            type: string
            description: "The search query in plain language"
          trade:
            type: string
            description: "Optional trade/skill to narrow the search scope"
        required:
          - query
        additionalProperties: false
      invocation_rules:
        call_when: >
          The user asks a specific factual question about government schemes, training institutes,
          trade descriptions, certification requirements, or verified market context that requires
          KB lookup — not for live job listings.
        required_before_calling:
          - query
        must_not_substitute: >
          Do not use general AI training knowledge as a substitute for KKB KB retrieval.
          Always retrieve verified content for scheme and trade facts.
        on_empty: >
          Is topic ke baare mein humare verified database mein abhi detailed information nahi hai.
        on_failure: >
          Knowledge base abhi accessible nahi hai. Main general information ke basis par bata
          sakti hoon, lekin verified details baad mein confirm kar lein.
        bridge_line: ""

preprocessing:
  language_normalisation:
    model: claude-haiku-4-5-20251001
    provider: llm_native
    default_language: hindi
    supported_languages: [hindi, kannada, english, hinglish]
    transliteration: true
    code_switching: true

  nlu_processor:
    model: claude-haiku-4-5-20251001
    confidence_threshold: 0.5
    user_state_confidence_threshold: 0.4  # (GH-139) below this, state classification stays sticky
    domain_instruction: |
      You are an NLU (Natural Language Understanding) classifier for Kaam Ki Baat (KKB), 
      an employment assistance chatbot.
    intents:
      # Greeting / session start
      - greeting
      - any_input
      - returning_user
      - new_user
      # Profile collection
      - profile_answer
      - skip_question
      - profile_complete
      # Market truth reactions
      - interested_engaged
      - pay_disappointment
      - distance_issue
      - overwhelmed_silent
      - hang_up
      - market_truth_query
      # Skill assessment
      - skill_direct_match
      - skill_partial_match
      - skill_significant_gap
      # Evaluation
      - ready_to_apply
      - wants_to_think
      - wants_counsellor
      - not_ready_yet
      - evaluation_question
      # Pay branch
      - expectation_adjusted
      - expectation_firm
      # Distance branch
      - constraint_hard
      - constraint_flexible
      # Normalise / WhatsApp
      - whatsapp_accepted
      - whatsapp_declined
      - re_engaged
      # Commitment
      - apply_now
      - enrol_course
      - connect_counsellor
      - action_declined
      # Follow-through outcomes
      - outcome_positive
      - outcome_employer_ghost
      - outcome_job_mismatch
      - outcome_no_response
      # Drop-off
      - drop_off_acknowledged
      # Global intents
      - counsellor_request
      - termination_intent
      - whatsapp_handoff_request
      # Catch-all
      - unknown
    entities:
      - name
      - age_bracket
      - location
      - gender
      - disability_status
      - language_preference
      - education_level
      - trade_or_stream
      - certifications
      - years_experience
      - informal_skills
      - language_skills
      - digital_literacy
      - income_urgency
      - max_commute_km
      - availability_hours
      - mobility_owned
      - dependents
      - primary_goal
      - sector_preference
      - open_to_training
      - growth_horizon
      - distance_km
    sentiment_classes: [neutral, positive, distressed, frustrated]

    # Intents that generate a context graph Signal node for longitudinal analysis.
    # Key = intent name, value = signal_type written to the Signal node.
    signal_intents:
      pay_disappointment: objection
      distance_issue: constraint
      overwhelmed_silent: emotion
      hang_up: dropoff_signal
      not_ready_yet: dropoff_signal
      expectation_firm: objection
      constraint_hard: constraint
      outcome_employer_ghost: outcome_signal
      outcome_job_mismatch: outcome_signal

