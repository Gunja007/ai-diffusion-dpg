# dev-kit/configs/kkb/trust_layer.yaml
trust:
  policy_pack: "kkb_advisory_jobs"

  input_rules:
    blocked_phrases:
      - "bomb"
      - "weapon"
      - "kill"
      - "threat"
      - "violence"
    escalation_topics:
      - "suicide"
      - "arrested"
      - "police case"
      - "FIR"
      - "jail"
    blocked_input_message: "यह बात मैं हैंडल नहीं कर सकती।"

  output_rules:
    blocked_phrases:
      # English prohibited phrases
      - "guaranteed placement"
      - "100% job guarantee"
      - "as an AI, I"
      # Hindi prohibited phrases from kkbconfig.txt — promotional/pressure language
      - "बेस्ट ऑपर्च्युनिटी"
      - "गारंटीड जॉब"
      - "हाई पेइंग"
      - "लाइफ चेंजिंग"
      - "शोर शॉट"
      - "डोंट वरी"
      - "सब ठीक हो जाएगा"
      - "आप कर सकते हो"
      - "आपको करना चाहिए"
      - "ट्रेमेन्डस ऑपर्च्युनिटीज़"
      - "सौ प्रतिशत"
      - "पक्का मिलेगा"
      - "यह miss मत कीजिए"
    output_blocked_message: "मुझे यह जवाब देने में दिक्कत आ रही है।"

  policy_packs:
    # severity and failure_mode declare operator intent but are not yet acted
    # on at runtime — differential enforcement is tracked in GH-170.
    kkb_advisory_jobs:
      guardrails:
        false_certainty:
          severity: "blocker"
          failure_mode: "block"
          prompt_constraints:
            - "MUST NOT guarantee or imply certainty about job outcomes"
            - "MUST frame all opportunities as possibilities, not certainties"
          required_disclosures:
            - "Hiring decisions rest with the employer"
          refusal_template: "मैं किसी भी नौकरी की गारंटी नहीं दे सकती।"

        hallucinated_reality:
          severity: "blocker"
          failure_mode: "block"
          prompt_constraints:
            - "MUST NOT infer or generalise from missing data"
            - "MUST only reference verified signals available in context"
          required_disclosures:
            - "Information is based only on verified data"
          refusal_template: "इस बारे में कोई वेरिफाइड डेटा उपलब्ध नहीं है।"

        emotional_overreach:
          severity: "warning"
          failure_mode: "constrain"
          prompt_constraints:
            - "MUST NOT provide counselling or motivational language"
            - "MUST limit empathetic language to one brief acknowledgement"
          required_disclosures: []
          refusal_template: null

        dignity_harm:
          severity: "blocker"
          failure_mode: "block"
          prompt_constraints:
            - "MUST NOT imply blame, deficiency, or judgment about the user"
          required_disclosures: []
          refusal_template: null

        agency_violation:
          severity: "blocker"
          failure_mode: "block"
          prompt_constraints:
            - "MUST NOT act without explicit user confirmation"
            - "MUST present options and wait for user decision before any action"
          required_disclosures:
            - "Any action requires your explicit confirmation"
          refusal_template: null

  consent:
    # GH-239: Devanagari STT output is the common case on Hindi voice calls;
    # romanised forms are kept for typed/English channels and STT fallbacks.
    # Substring match is naive — any longer phrase containing one of these
    # will count as consent, so order matters less than coverage.
    consent_phrases:
      # Romanised
      - "haan"
      - "yes"
      - "theek hai"
      - "manzoor hai"
      - "ok"
      - "okay"
      - "sahi hai"
      # Devanagari
      - "हाँ"
      - "हा"
      - "जी हाँ"
      - "जी"
      - "ठीक है"
      - "ठीक"
      - "सही है"
      - "सही"
      - "मंज़ूर"
      - "मंजूर"
      - "ओके"
    decline_phrases:
      # Romanised
      - "nahi"
      - "no"
      - "nahi chahiye"
      - "mat"
      # Devanagari
      - "नहीं"
      - "नही"
      - "नहीं चाहिए"
      - "मना"

  hitl:
    queue_backend: "log"
    holding_message: "आपकी बात एक एडवाइज़र तक पहुँच रही है। थोड़ी देर में आपसे संपर्क होगा।"
    # notification_webhook is read but not yet dispatched — webhook backend tracked in GH-36.
    notification_webhook: null

observability:
  domain: "kkb"

# NEW (GH-137) — Pre-response dignity check for Conversational agents.
# KKB is a Conversational agent; dignity_check MUST be enabled.
# These 6 questions are evaluated by the LLM before every response via /assemble_constraints.
dignity_check:
  enabled: true
  questions:
    - "Does this blame the user for their situation or lack of opportunity?"
    - "Does it over-promise job availability, placement rate, or income outcomes?"
    - "Does it push urgency or use pressure language (e.g. 'offer sirf 2 din ke liye')?"
    - "Does it reduce the user's agency to decide their own path?"
    - "Does it sound like a scripted call rather than a genuine human conversation?"
    - "Am I saying more than this state needs?"
  # fail_action is validated but not yet dispatched at runtime — tracked in GH-171.
  fail_action: "rewrite"
