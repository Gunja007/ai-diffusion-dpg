# dev-kit/configs/kkb/trust_layer.yaml
# KKB domain values for Trust Layer.
# Merged with dev-kit/dpg/trust_layer.yaml by loader.py before deployment.

trust:
  input_rules:
    blocked_phrases:
      - "bomb"
      - "weapon"
      - "kill"
      - "threat"
      - "violence"
    escalation_topics:
      - "arrested"
      - "police case"
      - "court notice"
      - "legal action"
      - "FIR"
      - "jail"
      - "suicide"

  output_rules:
    blocked_phrases:
      - "I cannot help with that"
      - "as an AI, I"
      - "guaranteed placement"
      - "100% job guarantee"
