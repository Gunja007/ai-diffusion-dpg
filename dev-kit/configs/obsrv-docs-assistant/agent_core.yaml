agent:
  primary_model: claude-haiku-4-5-20251001
  fallback_model: claude-haiku-4-5-20251001
  ask_for_consent: false
  consent_prompt: ''
preprocessing:
  language_normalisation:
    model: claude-haiku-4-5-20251001
    provider: llm_native
    default_language: english
    supported_languages:
    - english
    - hindi
    - hinglish
    - kannada
    transliteration: true
    code_switching: true
  nlu_processor:
    model: claude-haiku-4-5-20251001
    confidence_threshold: 0.5
    domain_instruction: You are an NLU classifier for a documentation search assistant.
      Classify user messages into intents related to documentation queries, greetings,
      consent, or unknown questions.
    intents:
    - ready_for_question
    - ask_question
    - follow_up_question
    - end_session
    entities: []
    sentiment_classes:
    - neutral
    - positive
    - distressed
    - frustrated
connectors: {}
agent_workflow:
  subagents:
  - id: greeting
    name: Greeting
    description: Welcome the user and prepare for documentation questions
    is_start: true
    is_terminal: false
    special_handler: null
    valid_intents:
    - ready_for_question
    tools: []
    system_prompt: Welcome the user warmly and briefly. Acknowledge that you can help
      them search and navigate the Obsrv documentation. Respond in the user's preferred
      language. Ask them what documentation topic or question they'd like help with.
    routing:
    - intent: ready_for_question
      next_subagent_id: documentation_search
    - intent: '*'
      next_subagent_id: greeting
  - id: documentation_search
    name: Documentation Search
    description: Search and retrieve documentation, answer questions, handle follow-ups
    is_start: false
    is_terminal: false
    special_handler: null
    valid_intents:
    - ask_question
    - follow_up_question
    - end_session
    tools:
    - obsrv_docs.searchDocumentation
    - obsrv_docs.getPage
    system_prompt: You are a helpful Obsrv documentation assistant. When users ask
      questions, search the documentation using the available tools. Provide clear,
      contextual answers with links when relevant. Support follow-up questions by
      maintaining conversation context. Respond in the user's language.
    routing:
    - intent: ask_question
      next_subagent_id: documentation_search
    - intent: follow_up_question
      next_subagent_id: documentation_search
    - intent: end_session
      next_subagent_id: ended
    - intent: '*'
      next_subagent_id: documentation_search
  - id: ended
    name: Ended
    description: Close the conversation session
    is_start: false
    is_terminal: true
    special_handler: null
    valid_intents: []
    tools: []
    system_prompt: Thank the user for using the Obsrv documentation assistant. Wish
      them well with their development work. Keep it brief and friendly.
    routing: []
  workflow_id: obsrv_docs_assistant
  version: 1.0.0
  agent_system_prompt: You are a helpful assistant for the Obsrv data platform documentation.
    Your role is to help external developers search, navigate, and understand the
    documentation. Use the available tools to search and retrieve relevant documentation
    pages. Provide clear, contextual answers with links when appropriate. Maintain
    conversation context across multiple turns to support follow-up questions. Respond
    in the user's preferred language.
  global_intents: []
  global_routing: []
  default_fallback_subagent_id: documentation_search
