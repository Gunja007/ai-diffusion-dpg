trust:
  policy_pack: obsrv_docs_assistant
  input_rules:
    blocked_phrases: []
    escalation_topics:
    - abuse
    - harassment
    - billing
    - account_issues
    blocked_input_message: I can only help with Obsrv documentation questions. Please
      contact support for other matters.
  output_rules:
    blocked_phrases: []
    output_blocked_message: I can only help with documentation questions.
  policy_packs:
    obsrv_docs_assistant:
      risks: []
      guardrails: {}
  consent:
    consent_phrases:
    - 'yes'
    - haan
    - theek hai
    - sure
    - ok
    decline_phrases:
    - 'no'
    - nahi
    - nope
    - decline
  hitl:
    queue_backend: log
    holding_message: Thank you for reaching out. A support agent will be with you
      shortly.
