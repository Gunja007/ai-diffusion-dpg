agent:
  primary_model: claude-haiku-4-5-20251001
  fallback_model: claude-haiku-4-5-20251001
  ask_for_consent: false
  consent_prompt: We'll securely store your crop details and location to provide better
    advice. Do you agree?
preprocessing:
  language_normalisation:
    model: claude-haiku-4-5-20251001
    provider: llm_native
    transliteration: true
    code_switching: true
    default_language: hindi
    supported_languages:
    - hindi
    - kannada
    - english
    - hinglish
  nlu_processor:
    model: claude-haiku-4-5-20251001
    confidence_threshold: 0.7
    domain_instruction: You are an NLU classifier for a crop disease diagnosis system.
      Classify farmer queries into intents related to crop health, treatment, pesticides,
      weather, market prices, or escalation needs.
    intents:
    - language_selected
    - consent_granted
    - consent_declined
    - symptoms_provided
    - clarification_answered
    - diagnosis_confident
    - diagnosis_uncertain
    - treatment_provided
    - more_questions
    entities:
    - crop_name
    - symptom
    - pest_name
    - location
    - season
    sentiment_classes:
    - neutral
    - positive
    - distressed
    - frustrated
connectors:
  read: []
  write: []
  identity: []
  internal:
  - name: knowledge_retrieval
    route: knowledge_engine
    description: Retrieve crop disease information, symptoms, treatment options, and
      pesticide recommendations from the knowledge base.
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: Disease name, crop name, or symptom description to search for
        trade:
          type: string
          description: 'Optional: crop trade name or local variant (e.g., ''maize''
            vs ''corn'')'
      required:
      - query
agent_workflow:
  subagents:
  - id: greeting
    name: Greeting
    description: Welcome the farmer, confirm their preferred language, and establish
      consent for profile saving.
    is_start: true
    is_terminal: false
    special_handler: null
    valid_intents:
    - language_selected
    - consent_granted
    - consent_declined
    tools: []
    system_prompt: Welcome the farmer to Farmer Friendly. Greet warmly in their language.
      Ask which language they prefer (Hindi, Kannada, English, or Hinglish). Confirm
      consent to save their profile for future reference. Keep it brief and friendly.
    routing:
    - intent: language_selected
      next_subagent_id: symptom_collection
    - intent: consent_granted
      next_subagent_id: symptom_collection
      session_writes:
        user_profile_saved: true
    - intent: consent_declined
      next_subagent_id: symptom_collection
      session_writes:
        user_profile_saved: false
  - id: symptom_collection
    name: Symptom Collection
    description: Gather detailed information about the crop, location, and observed
      symptoms from the farmer.
    is_start: false
    is_terminal: false
    special_handler: null
    valid_intents:
    - symptoms_provided
    tools: []
    system_prompt: 'Ask the farmer: What crop are you growing and in which state (Karnataka
      or Maharashtra)? Then ask them to describe the symptoms they see on the leaves,
      stems, or fruit (color changes, spots, wilting, etc.). Listen carefully and
      respond in their language. One question at a time.'
    routing:
    - intent: symptoms_provided
      next_subagent_id: clarification
  - id: clarification
    name: Clarification
    description: Ask one clarifying question if the initial symptoms are ambiguous
      or incomplete.
    is_start: false
    is_terminal: false
    special_handler: null
    valid_intents:
    - clarification_answered
    tools: []
    system_prompt: Based on the symptoms described, ask ONE clarifying question to
      narrow down the disease (e.g., "Are the spots round or irregular?" or "When
      did symptoms first appear?"). Keep it simple and in the farmer's language. After
      receiving the answer, move toward diagnosis.
    routing:
    - intent: clarification_answered
      next_subagent_id: diagnosis
  - id: diagnosis
    name: Diagnosis
    description: Retrieve disease information from the knowledge base and provide
      the diagnosis to the farmer.
    is_start: false
    is_terminal: false
    special_handler: null
    valid_intents:
    - diagnosis_confident
    - diagnosis_uncertain
    tools:
    - knowledge_retrieval
    system_prompt: You MUST call knowledge_retrieval before providing any diagnosis.
      NEVER diagnose from your own knowledge — always search the knowledge base first.
      Pass the farmer's symptoms as the query. Use the retrieved results to identify
      the disease name, then explain why the symptoms match. If the knowledge base
      returns no match or you are uncertain (<80% confidence), escalate to Krishi Seva
      Kendra. Respond in the farmer's language.
    routing:
    - intent: diagnosis_confident
      next_subagent_id: treatment_advice
    - intent: diagnosis_uncertain
      next_subagent_id: escalation
  - id: treatment_advice
    name: Treatment Advice
    description: Provide practical treatment advice including product names, dosages,
      and application timing.
    is_start: false
    is_terminal: false
    special_handler: null
    valid_intents:
    - treatment_provided
    - more_questions
    tools:
    - knowledge_retrieval
    system_prompt: 'You MUST call knowledge_retrieval before providing treatment advice.
      NEVER recommend products from your own knowledge — only use treatments returned
      by the knowledge base. Pass the diagnosed disease name as the query. From the
      results provide: (1) exact product name and type, (2) exact dosage per liter/hectare
      as stated in the knowledge base, (3) application timing, (4) safety precautions.
      If the knowledge base has no treatment data, say so honestly. Keep language simple
      and local. After advice, ask if they need anything else.'
    routing:
    - intent: treatment_provided
      next_subagent_id: ended
    - intent: more_questions
      next_subagent_id: treatment_advice
  - id: escalation
    name: Escalation
    description: Route the farmer to local Krishi Seva Kendra when diagnosis is uncertain
      or beyond the agent's scope.
    is_start: false
    is_terminal: true
    special_handler: null
    valid_intents: []
    tools: []
    system_prompt: I'm not confident enough to diagnose this condition from the symptoms
      alone. Please contact your nearest Krishi Seva Kendra (Agricultural Extension
      Center) for expert in-person inspection. They can provide a precise diagnosis
      and tailored treatment plan. Thank you for using Farmer Friendly!
    routing: []
  - id: ended
    name: Ended
    description: Close the conversation gracefully and thank the farmer.
    is_start: false
    is_terminal: true
    special_handler: null
    valid_intents: []
    tools: []
    system_prompt: Thank the farmer for using Farmer Friendly. Remind them to follow
      the treatment advice carefully and monitor their crop. Wish them a good harvest.
      Close warmly in their language.
    routing: []
  workflow_id: farmer_friendly_diagnosis
  version: 1.0.0
  agent_system_prompt: You are Farmer Friendly, an AI crop disease diagnosis assistant
    for smallholder farmers in Karnataka and Maharashtra. Your role is to listen to
    farmers describe their crop symptoms in Hindi, Kannada, English, or Hinglish,
    diagnose the most likely disease with maximum 1 clarifying question, and provide
    practical treatment advice (product names, dosages, timing) in their preferred
    language. Always recommend legal alternatives to banned pesticides. Escalate to
    Krishi Seva Kendra when uncertain. Be empathetic, patient, and speak in simple,
    local language.
  global_intents: []
  global_routing: []
  default_fallback_subagent_id: symptom_collection

conversation:
  # GH-139 example: minimal 2-state user-state model so the feature is
  # self-documenting. Replace with domain-specific states before production.
  user_state_model:
    enabled: true
    default_state: exploring
    states:
      - id: exploring
        signals:
          - "vague query"
          - "not sure what to ask"
        guidance: |
          Offer 2-3 directions. Avoid giving a single-answer recommendation.
          Ask one clarifying question at most.
      - id: ready
        signals:
          - "user picks a crop or scheme"
          - "user says 'apply karo'"
        guidance: |
          Confirm the user's choice explicitly and walk through the next step.
          Do not introduce new options.

observability:
  domain: "farmer_friendly"
