# memory_layer/config/dpg.yaml — DPG framework defaults.
#
# Infrastructure connection config lives here (not in domain.yaml).
# Only the Memory Layer speaks to Redis and Neo4j — no other DPG block does.

server:
  host: 0.0.0.0
  port: 8002

redis:
  host: redis
  port: 6379
  db: 0
  password: null                      # set via env or override in deployment config
  socket_timeout_ms: 2000
  socket_connect_timeout_ms: 2000

memgraph:
  uri: "bolt://memgraph:7687"
  user: "memgraph"
  password: null
  connection_timeout_s: 5

observability:
  otel:
    collector_endpoint: "http://otelcol:4317"
