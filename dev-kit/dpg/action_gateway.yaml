# dev-kit/dpg/action_gateway.yaml
# DPG framework defaults for Action Gateway — same for any domain deployment.
# Connector definitions and external endpoints are domain-specific — never put them here.

server:
  host: "0.0.0.0"
  port: 9999

action_gateway:
  timeout_ms: 5000

observability:
  otel:
    collector_endpoint: "http://otelcol:4317"
    sample_rate: 1.0
    export_interval_ms: 5000