# dev-kit/dpg/action_gateway.yaml
# Framework defaults for Action Gateway.
# Domain config overrides these values.

server:
  host: "0.0.0.0"
  port: 9999

tools: []

action_gateway:
  timeout_ms: 5000

response:
  default_max_size_chars: 4000

observability:
  otel:
    collector_endpoint: "http://otelcol:4317"
    sample_rate: 1.0
    export_interval_ms: 5000
