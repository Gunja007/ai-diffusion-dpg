# reach_layer/config/dpg.yaml — DPG framework defaults.

server:
  host: 0.0.0.0
  port: 8005

reach_layer:
  cli:
    prompt: "You: "
    agent_prefix: "Agent: "
  # Sidebar conversations list — max recent sessions returned to the UI.
  sessions:
    limit: 25

agent_core_client:
  endpoint: "http://agent_core:8000/process_turn"
  timeout_s: 30.0

memory_layer_client:
  endpoint: "http://memory_layer:8002"
  timeout_s: 10.0

# Authentication — Google Sign-On.
# When `enabled: false` (default) the legacy SetupScreen path is used and
# no cookies are issued. When true, /chat and /user-history require a
# valid session cookie and the SPA boots into the LoginScreen.
# `google_client_id` is the OAuth 2.0 Web client_id from Google Cloud
# Console. The HMAC secret for session JWTs is read from the
# REACH_SESSION_SECRET env var (never commit this value).
auth:
  enabled: false
  google_client_id: ""        # set per domain or via GOOGLE_CLIENT_ID env
  session_cookie_name: "reach_session"
  session_ttl_s: 86400        # 24h
  cookie_secure: true         # set false only for plain-http local dev
  cookie_samesite: "lax"

ui:
  agent_avatar: "🤖"
  user_avatar: "👤"
  setup_heading: "Start a session"
  setup_subtitle: "Enter your user ID to begin or resume a conversation."
  user_id_hint: "Use letters, numbers, or underscores."
  start_btn_label: "Start chatting →"
  new_session_msg: "New session started. How can I help you?"
  returning_user_msg: "Welcome back! How can I help you today?"
  storage_key: "dpg_user_id"
  theme_storage_key: "dpg_theme"
  # Sidebar / conversations-list copy. English defaults; domains may
  # override any of these in domain.yaml for localisation.
  new_chat_label: "New chat"
  conversations_heading: "Conversations"
  no_conversations_msg: "No previous chats"
  delete_conversation_confirm: "Delete this conversation? This cannot be undone."
  delete_conversation_tooltip: "Delete conversation"
  sign_out_confirm: "Sign out of your account?"
  switch_user_confirm: "Switch user? Your current session will be closed."

# Observability — OTel collector endpoint for trace/metric export.
observability:
  otel:
    collector_endpoint: "http://otelcol:4317"
    sample_rate: 1.0
    export_interval_ms: 5000
