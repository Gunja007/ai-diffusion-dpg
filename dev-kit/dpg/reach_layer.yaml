# =============================================================================
# dev-kit/dpg/reach_layer.yaml — Deploy-time Reach Layer framework defaults.
# =============================================================================
# Non-domain-specific config only: endpoints, ports, timeouts, protocol flags,
# and technical tuning. Mounted by docker-compose (and by Helm/Kustomize in
# real deploys) as the Reach Layer's `config/dpg.yaml` inside every channel
# container.
#
# Shares the exact schema of `reach_layer/config/dpg.yaml`; the only
# difference is that service endpoints point at in-cluster DNS names rather
# than localhost.
#
# Domain-specific values (branding, UI text, language, greeting, etc.) live
# in `dev-kit/configs/<domain>/reach_layer.yaml` and are deep-merged on top
# of this file at startup.
# =============================================================================

reach_layer:

  # ---------------------------------------------------------------------------
  # Shared — inherited by all three channel services.
  # ---------------------------------------------------------------------------
  common:
    agent_core_client:
      endpoint: "http://agent_core:8000/process_turn"
      timeout_s: 30.0
    memory_layer_client:
      endpoint: "http://memory_layer:8002"
      timeout_s: 10.0
    observability:
      otel:
        collector_endpoint: "http://otelcol:4317"
        sample_rate: 1.0
        export_interval_ms: 5000
      # domain identifier is set in dev-kit/configs/<domain>/reach_layer.yaml

  # ---------------------------------------------------------------------------
  # Per-channel sections. Each channel service reads only its own slice plus
  # `common`. `enabled: false` makes the service refuse to start.
  # `assembly_mode` is the single switch:
  #   - session → POST /sessions/{id}/input + SSE events (via TurnAssembler)
  #   - direct  → POST /process_turn (synchronous)
  # ---------------------------------------------------------------------------
  channels:

    # ─── CLI ─────────────────────────────────────────────────────────────────
    cli:
      enabled: true
      assembly_mode: session
      # prompt / agent_prefix are locale-specific → dev-kit/configs/<domain>/

    # ─── Web ─────────────────────────────────────────────────────────────────
    web:
      enabled: true
      assembly_mode: direct
      server:
        host: 0.0.0.0
        port: 8005
      sessions:
        limit: 25
      auth:
        enabled: true
        google_client_id: ${GOOGLE_CLIENT_ID}
        cookie_secure: false
        session_cookie_name: "reach_session"
        session_ttl_s: 86400
        cookie_samesite: "lax"
      # ui.* (avatars, copy, storage keys) is domain-specific → dev-kit/configs/<domain>/

    # ─── Voice ───────────────────────────────────────────────────────────────
    # Voice-channel keys mirror the legacy `telephony_adapter.*` shape so the
    # config loader can alias this block under `telephony_adapter` without
    # touching the ~28 files that read those keys today.
    voice:
      enabled: true
      assembly_mode: session
      port: 8006
      public_url: ${PUBLIC_URL}
      vobiz:
        auth_id: ${VOBIZ_AUTH_ID}
        auth_token: ${VOBIZ_AUTH_TOKEN}
        api_base: "https://api.vobiz.ai/api/v1"
        from_number: ${VOBIZ_FROM_NUMBER}
      vad:
        # Silero VAD tuning for 8 kHz telephony audio (GH-152 follow-up).
        # The prior defaults (confidence 0.4, min_volume 0.3, start_secs 0.1)
        # were far below pipecat's own defaults (0.7 / 0.6 / 0.2) and caused
        # ambient noise to fire VADUserStartedSpeakingFrame, which the
        # UserTurnProcessor turned into InterruptionFrame — flushing the
        # opening_phrase TTS and creating phantom reply turns. Tightened to
        # telephony-realistic values; override per-domain only with measured
        # evidence that a specific caller-population needs something else.
        stop_secs: 0.4        # silence window before closing the utterance
        min_volume: 0.4       # reject soft background noise / distant voices
        confidence: 0.6       # require high-confidence speech, not static
        start_secs: 0.2       # require ~250 ms of continuous speech to trigger
        smoothing_factor: 0.1
      raya:
        api_key: ${RAYA_API_KEY}
        stt_wss_url: "https://hub.getraya.app/transcribe"
        tts_base_url: "https://hub.getraya.app/v1"
        tts_model: "standard"
        tts_speed: 1.0
        # P99 latency (seconds) from end of user speech to final transcript.
        # Broadcast via STTMetadataFrame so downstream turn strategies can time
        # interruption / end-of-turn decisions. Measure on your deployment and
        # tune — too low clips slow transcripts, too high delays turn handoff.
        stt_ttfs_p99_latency: 1
        # language, voice_id are per-domain → dev-kit/configs/<domain>/
      agent_core:
        base_url: "http://agent_core:8000"
        timeout_ms: 5000
        # fallback_phrase is per-domain (spoken text) → dev-kit/configs/<domain>/
        # Spoken ONLY when the Agent Core call fails (timeout / 5xx / empty
        # stream). NOT a conversational fallback — low-confidence turns are
        # handled by the `clarification` subagent in agent_core.yaml.
        # The per-call welcome is the entry subagent's opening_phrase, emitted
        # by Agent Core on SSE connect (GH-149) — do NOT add a static greeting
        # here.
        # GH-152: spoken briefly when the caller barges in while the bot is
        # speaking. Empty string → bot simply goes silent. Override per-domain.
        barge_in_acknowledgement: ""
      observability:
        # GH-238: emit `voice.heartbeat` every N seconds during a call so a
        # stalled VAD/STT/turn-assembler chain is visible as a steadily rising
        # `seconds_since_*` field. Set to 0 (or negative) to disable.
        heartbeat_interval_s: 10.0
      # GH-242: filler utterance played if no SentenceEvent has reached TTS
      # within the threshold. Capped to one filler per turn. Tool-chained
      # turns can take 5–17 s before the first sentence — without this the
      # caller hears a dead line. Override per-domain.
      filler_threshold_ms: null    # null disables the filler entirely
      filler_phrase: ""
      # GH-137: spoken just before the WebSocket close on bot-initiated
      # hangup (DoneEvent.session_ended=true). Override per-domain.
      terminal_word: null
      # ── Recording ────────────────────────────────────────────────────────────
      # GH-322: call recording configuration. `source: disabled` is the safe
      # default — no recording takes place and no behaviour changes. Set
      # `source: vobiz` (or another provider) to opt in. Full schema lives in
      # dev-kit/dev_kit/schemas/dpg/voice.py (RecordingDpg / VoiceDpg).
      recording:
        source: disabled
        consent_purpose: recording
        webhook_timeout_s: 300
        fetch_timeout_s: 60
        min_duration_ms: 500
        caller_id_hash_salt: ""
        # Testing/disclosure escape hatch (#332): start recording on websocket
        # connect, bypassing the Trust Layer consent gate.
        start_on_connect: false
        store:
          backend: local
          local:
            base_path: /var/recordings
          s3:
            bucket: ""
            prefix: recordings/
            region: ap-south-1
            kms_key_id: ""
