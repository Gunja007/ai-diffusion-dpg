# dev-kit/dpg/agent_core.yaml
# DPG framework defaults for Agent Core — same for any domain deployment.
# Never put domain-specific values here (model names, persona, intents, connectors).

server:
  host: "0.0.0.0"
  port: 8000

agent:
  timeout_ms: 10000                         # per-request LLM timeout (ms)
  retry_attempts: 2                         # retries on rate-limit/timeout before fallback
  retry_backoff_seconds: [0, 0.5, 1.0]     # delay per attempt (index = attempt number, 0-based)
  max_tool_rounds: 1                        # max tool→LLM cycles per turn

conversation:
  max_turns: 20
  blocked_message: "I'm unable to help with that request."
  escalation_message: "I'm connecting you to a human agent who can better assist you."
  output_blocked_message: "I wasn't able to produce a safe response. Please try rephrasing your question."
