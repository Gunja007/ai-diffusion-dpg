# agent_core/config/dpg.yaml — DPG framework defaults.
# These values are the same for any domain deployment.

server:
  host: 0.0.0.0
  port: 8000

agent:
  ask_for_consent: false
  consent_prompt: ""
  timeout_ms: 10000
  retry_attempts: 2
  retry_backoff_seconds: [0, 0.5, 1.0]
  max_tool_rounds: 3

conversation:
  max_turns: 20
  # blocked_message, escalation_message, output_blocked_message are domain-specific
  # persona text — they must be set in domain.yaml, not here.

# Default service client endpoints (localhost for local dev).
# Override in domain.yaml or deployment config for staging/production.
ke_client:
  endpoint: "http://knowledge_engine:8001/retrieve"
  timeout_ms: 30000

memory_client:
  endpoint: "http://memory_layer:8002"
  timeout_ms: 3000

trust_client:
  endpoint: "http://trust_layer:8003"
  timeout_ms: 2000

learning_client:
  endpoint: "http://observability_layer:8004"
  timeout_ms: 2000

action_gateway_client:
  endpoint: "http://action_gateway:9999/execute"
  timeout_ms: 5000

observability:
  otel:
    collector_endpoint: "http://otelcol:4317"
