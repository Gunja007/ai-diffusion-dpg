# agent-core/config/dpg.yaml — DPG framework defaults.
# These values are the same for any domain deployment.

server:
  host: 0.0.0.0
  port: 8000

agent:
  ask_for_consent: false
  consent_prompt: ""
  timeout_ms: 10000
  retry_attempts: 2
  retry_backoff_seconds: [0, 0.5, 1.0]
  max_tool_rounds: 3
  recent_tool_exchanges:
    max_items: 3            # Cap on prior tool_use/tool_result pairs replayed across turns (#193).
    max_chars: 4000         # Per-result content cap; mirrors action_gateway max_size_chars default.

# conversation.* is domain-specific (blocked_message, escalation_message,
# output_blocked_message, persona text). All fields must be set in domain.yaml.
# The block intentionally lives only in domain configs.

# Default service client endpoints (localhost for local dev).
# Override in domain.yaml or deployment config for staging/production.
ke_client:
  endpoint: "http://knowledge_engine:8001/retrieve"
  timeout_ms: 30000

memory_client:
  endpoint: "http://memory_layer:8002"
  timeout_ms: 3000

trust_client:
  endpoint: "http://trust_layer:8003"
  timeout_ms: 2000
  # GH-196 — Batch per-sentence Trust Layer /check/output calls during streaming.
  # Sentences are buffered and submitted as a single concatenated check whenever
  # the buffer reaches max_sentences or max_interval_ms has elapsed since the
  # first buffered sentence — whichever fires first. On block / escalate, the
  # pending batch is replaced with conversation.output_blocked_message; earlier
  # batches that already streamed to the user are NOT retracted.
  check_output_batch:
    enabled: true
    max_sentences: 3
    max_interval_ms: 500

learning_client:
  endpoint: "http://observability_layer:8004"
  timeout_ms: 2000

action_gateway_client:
  endpoint: "http://action_gateway:9999"
  timeout_ms: 5000

# Reach Layer defaults — TurnAssembler policy stack runs inside Agent Core.
# Per-channel overrides live under top-level `channels.<name>.turn_assembler`
# (GH-137). assembly_mode lives in reach_layer.yaml (Reach Layer concern).
reach_layer:
  # Default turn_assembler policy stack — applies to any channel that
  # does not declare its own turn_assembler section under channels.<name>.
  turn_assembler:
    semantic_gate:
      enabled: false             # Enable NLU-based early trigger (requires nlu_processor)
      confidence_threshold: 0.75 # Invoke immediately if NLU confidence >= this value
    silence_trigger:
      silence_ms: 400            # ms of silence before invoking (resets on each segment)
    max_wait_ceiling:
      max_wait_ms: 8000          # Absolute max wait ms — never resets

observability:
  otel:
    collector_endpoint: "http://otelcol:4317"
    sample_rate: 1.0
    export_interval_ms: 5000