# dev-kit/dpg/knowledge_engine.yaml
# DPG framework defaults for Knowledge Engine — same for any domain deployment.
# Never put glossary mappings, persona, sources, or intent_filters here.

server:
  host: 0.0.0.0
  port: 8001

knowledge:
  conversation:
    max_history_turns: 10

  blocks:
    static_knowledge_base:
      vector_store: chromadb
      embedding_provider: chroma_default  # options: chroma_default (free, no deps) | openai (paid, set OPENAI_API_KEY) | sentence_transformers (local, +2 GB image)
      # embedding_model: text-embedding-3-small  # only for openai provider; if changed, delete chroma volume and re-ingest
      top_k: 3
      similarity_threshold: 0.65
      metadata_filters:
        use_location_filter: true   # narrows search to chunks matching the user's location entity; set false if KB has no district-level content
        use_intent_filter: true     # narrows search to doc_types mapped to the detected intent (see intent_filters in domain config); set false to search all doc_types

    multimodal_input_handler:
      enabled: false
      supported_types: [pdf, image]
      audio_enabled: false
      max_file_size_mb: 10

observability:
  otel:
    collector_endpoint: "http://otelcol:4317"
    sample_rate: 1.0
    export_interval_ms: 5000