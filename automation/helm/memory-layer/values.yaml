# Path inside the container that holds dpg.yaml and domain.yaml config files.
configFolder: /app/config

# Redis connection — session/turn state store.
redis:
  url: redis://redis:6379/0

# Neo4j connection — persistent user profile store.
# Override password at install time: --set neo4j.password=<secret>
neo4j:
  uri: bolt://neo4j:7687
  user: neo4j
  password: dpg_password

replicaCount: 1

image:
  repository: srivatsak2002/dpg-memory-layer
  tag: latest
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# DPG framework defaults — mounted as /app/config/dpg.yaml inside the pod.
dpgConfig:
  server:
    host: "0.0.0.0"
    port: 8002
  memory:
    session_ttl_seconds: 3600
    max_sessions: 1000

# Domain-specific config — mounted as /app/config/domain.yaml inside the pod.
config:
  server:
    host: "0.0.0.0"
    port: 8002

  memory:
    session_ttl_seconds: 3600
    max_sessions: 1000
