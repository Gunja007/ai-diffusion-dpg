apiVersion: v1
kind: Service
metadata:
  name: memgraph
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-memgraph
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-memgraph
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: http
      port: 7444
      targetPort: 7444
