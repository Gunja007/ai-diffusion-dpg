apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: memory-layer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8002
          env:
            - name: CONFIG_FOLDER
              value: {{ .Values.configFolder | quote }}
            - name: REDIS_URL
              value: {{ .Values.redis.url | quote }}
            - name: NEO4J_URI
              value: {{ .Values.neo4j.uri | quote }}
            - name: NEO4J_USER
              value: {{ .Values.neo4j.user | quote }}
            - name: NEO4J_PASSWORD
              value: {{ .Values.neo4j.password | quote }}
          volumeMounts:
            - name: dpg-config
              mountPath: /app/config/dpg.yaml
              subPath: dpg.yaml
            - name: domain-config
              mountPath: /app/config/domain.yaml
              subPath: domain.yaml
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: dpg-config
          configMap:
            name: {{ .Release.Name }}-dpg-config
        - name: domain-config
          configMap:
            name: {{ .Release.Name }}-domain-config
