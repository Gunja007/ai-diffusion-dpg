apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-memgraph-data
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.memgraph.storageClass | default "" }}
  resources:
    requests:
      storage: {{ .Values.memgraph.storageSize }}
