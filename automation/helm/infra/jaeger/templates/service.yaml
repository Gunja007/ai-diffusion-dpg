apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}
  ports:
    - name: ui
      port: {{ .Values.service.uiPort }}
      targetPort: {{ .Values.service.uiPort }}
      protocol: TCP
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: {{ .Values.service.grpcPort }}
      protocol: TCP
    - name: otlp-grpc
      port: {{ .Values.service.otlpGrpcPort }}
      targetPort: {{ .Values.service.otlpGrpcPort }}
      protocol: TCP
