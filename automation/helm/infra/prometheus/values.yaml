image:
  repository: prom/prometheus
  tag: "v2.50.1"
  pullPolicy: IfNotPresent
service:
  port: 9090
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 512Mi
config: |
  global:
    scrape_interval: 15s
  scrape_configs:
    - job_name: dpg_metrics
      static_configs:
        - targets: ['otelcol:8889']
