apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ['sh', '-c', 'chown -R 101:101 /var/lib/memgraph']
          volumeMounts:
            - name: data
              mountPath: /var/lib/memgraph
      containers:
        - name: memgraph
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--also-log-to-stderr"
            - "--storage-wal-enabled={{ .Values.flags.walEnabled }}"
            - "--storage-snapshot-interval-sec={{ .Values.flags.snapshotIntervalSec }}"
            {{- if .Values.password }}
            - "--password-encryption-algorithm=bcrypt"
            {{- end }}
          ports:
            - name: bolt
              containerPort: {{ .Values.service.boltPort }}
            - name: http
              containerPort: {{ .Values.service.httpPort }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.service.boltPort }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: {{ .Values.service.boltPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/memgraph
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-pvc
