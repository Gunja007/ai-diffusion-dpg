replicaCount: 1

image:
  repository: ghcr.io/your-org/reach-layer
  tag: latest
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# DPG framework defaults — mounted as /app/config/dpg.yaml inside the pod.
dpgConfig:
  server:
    host: "0.0.0.0"
    port: 8005
  reach_layer:
    cli:
      prompt: "You: "
      agent_prefix: "Agent: "
  agent_core_client:
    timeout_s: 30.0

# Domain-specific config — mounted as /app/config/domain.yaml inside the pod.
config:
  server:
    host: "0.0.0.0"
    port: 8005

  reach_layer:
    cli:
      prompt: "You: "
      agent_prefix: "Agent: "

  agent_core_client:
    endpoint: "http://agent-core.agent-core.svc.cluster.local:8000/process_turn"
    timeout_s: 30.0
