# Config-agnostic: dpgConfig and domainConfig injected at deploy time via --set-file
configFolder: /app/config
replicaCount: 1

image:
  repository: srivatsak2002/dpg-agent-core
  tag: "0.2.0"
  pullPolicy: IfNotPresent

service:
  port: 8000

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

healthCheck:
  readiness:
    initialDelaySeconds: 15
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 20

anthropicApiKey: ""

# Injected at deploy time — do not set here
dpgConfig: ""
domainConfig: ""
