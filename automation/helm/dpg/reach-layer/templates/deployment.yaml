apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: reach-layer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          stdin: true
          tty: true
          env:
            - name: CONFIG_FOLDER
              value: {{ .Values.configFolder | quote }}
            {{- if .Values.auth.enabled }}
            - name: GOOGLE_CLIENT_ID
              value: {{ .Values.auth.googleClientId | required "auth.googleClientId is required when auth.enabled is true" | quote }}
            - name: REACH_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.sessionSecretName | required "auth.sessionSecretName is required when auth.enabled is true" | quote }}
                  key: {{ .Values.auth.sessionSecretKey | required "auth.sessionSecretKey is required when auth.enabled is true" | quote }}
            {{- end }}
          volumeMounts:
            - name: dpg-config
              mountPath: /app/config/dpg.yaml
              subPath: dpg.yaml
            - name: domain-config
              mountPath: /app/config/reach_layer.yaml
              subPath: reach_layer.yaml
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
      volumes:
        - name: dpg-config
          configMap:
            name: {{ .Release.Name }}-dpg-config
        - name: domain-config
          configMap:
            name: {{ .Release.Name }}-domain-config
