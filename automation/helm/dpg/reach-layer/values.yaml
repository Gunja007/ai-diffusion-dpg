# Config-agnostic: dpgConfig and domainConfig injected at deploy time via --set-file
configFolder: /app/config
replicaCount: 1

image:
  repository: sanketikahub/dpg-reach-layer
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 8005

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

healthCheck:
  readiness:
    initialDelaySeconds: 15
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 20

# Injected at deploy time — do not set here
dpgConfig: ""
domainConfig: ""

# Google Sign-On — set at deploy time. When auth.enabled is true in
# reach_layer.yaml, both of these MUST be provided.
auth:
  # Set to true when the domain config has auth.enabled: true.
  # When true, googleClientId and sessionSecretName/Key below are all required.
  enabled: false
  # Public OAuth 2.0 Web client_id from Google Cloud Console.
  googleClientId: ""
  # Kubernetes Secret holding the HMAC secret for session JWTs.
  # Must contain a key named `session-secret`. Create with:
  #   kubectl create secret generic reach-layer-auth \
  #     --from-literal=session-secret=$(openssl rand -hex 32)
  sessionSecretName: ""
  sessionSecretKey: "session-secret"
