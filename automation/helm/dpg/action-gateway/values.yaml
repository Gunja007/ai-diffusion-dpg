# Config-agnostic: dpgConfig and domainConfig injected at deploy time via --set-file
configFolder: /app/config
replicaCount: 1

image:
  repository: sanketikahub/dpg-action-gateway
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 9999

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

healthCheck:
  readiness:
    initialDelaySeconds: 15
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 20

# Injected at deploy time — do not set here
dpgConfig: ""
domainConfig: ""

# Required — pass at install/upgrade time via --set onestApiKey=<key>
# Never store the key in this file or in version control.
onestApiKey: ""
