# Config-agnostic: dpgConfig and domainConfig injected at deploy time via --set-file
configFolder: /app/config
replicaCount: 1

image:
  repository: sanketikahub/dpg-action-gateway
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 9999

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

healthCheck:
  readiness:
    initialDelaySeconds: 15
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 20

# Injected at deploy time — do not set here
dpgConfig: ""
domainConfig: ""

# Domain-specific API key secrets for Action Gateway tools.
# Add one entry per REST tool that requires an API key.
# Keys become environment variables inside the container.
# Set at deploy time via --set 'extraSecrets.MY_API_KEY=value'
# Never store actual values here or in version control.
extraSecrets: {}
