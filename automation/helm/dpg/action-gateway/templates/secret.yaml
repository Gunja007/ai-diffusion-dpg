# Pass the ONEST API key at install/upgrade time — never store it in values.yaml.
#
# Install:
#   helm install action-gateway ./action-gateway -n dpg --create-namespace \
#     --set onestApiKey=$ONEST_API_KEY
#
# Upgrade:
#   helm upgrade action-gateway ./action-gateway -n dpg \
#     --set onestApiKey=$ONEST_API_KEY
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
type: Opaque
stringData:
  ONEST_API_KEY: {{ .Values.onestApiKey | required "onestApiKey is required — pass it with --set onestApiKey=<your_key>" }}
