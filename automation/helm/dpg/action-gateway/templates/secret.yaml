# Action Gateway secret — domain-agnostic.
#
# All API keys required by REST tools are passed as extraSecrets at deploy
# time by the dev-kit. No domain-specific key names are hardcoded here.
#
# Install example:
#   helm install action-gateway ./action-gateway \
#     --set 'extraSecrets.ONEST_API_KEY=sk-...'
#
# The dev-kit generates the --set extraSecrets.* flags automatically from
# the tools configured during the Tools phase.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
type: Opaque
stringData:
{{- range $key, $value := .Values.extraSecrets }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
