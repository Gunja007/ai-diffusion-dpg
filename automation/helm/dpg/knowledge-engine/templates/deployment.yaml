apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: knowledge-engine
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: CONFIG_FOLDER
              value: {{ .Values.configFolder | quote }}
            - name: HOME
              value: "/tmp"
            - name: HF_HOME
              value: "/tmp/huggingface"
            - name: TRANSFORMERS_CACHE
              value: "/tmp/huggingface/transformers"
            # Upload chain auth — set at deploy time via uploadAuth values.
            - name: REACH_TO_KE_API_KEY
              value: {{ .Values.uploadAuth.reachToKeApiKey | quote }}
            - name: KE_TO_DEVKIT_API_KEY
              value: {{ .Values.uploadAuth.keToDevkitApiKey | quote }}
            - name: KE_DEVKIT_CALLBACK_URL
              value: {{ .Values.uploadAuth.devkitCallbackUrl | quote }}
            - name: KB_DATA_DIR
              value: {{ .Values.storage.kbData.mountPath | quote }}
            # Azure Blob Storage — required only when the domain uses Azure for KB ingestion.
            - name: AZURE_STORAGE_ACCOUNT
              value: {{ .Values.azure.storageAccount | quote }}
            - name: AZURE_STORAGE_KEY
              value: {{ .Values.azure.storageKey | quote }}
            - name: AZURE_CONTAINER_NAME
              value: {{ .Values.azure.containerName | quote }}
          volumeMounts:
            - name: dpg-config
              mountPath: /app/config/dpg.yaml
              subPath: dpg.yaml
            - name: domain-config
              mountPath: /app/config/knowledge_engine.yaml
              subPath: knowledge_engine.yaml
            - name: chroma-data
              mountPath: /app/chroma_db
            - name: kb-data
              mountPath: {{ .Values.storage.kbData.mountPath }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.healthCheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.healthCheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.liveness.periodSeconds }}
      volumes:
        - name: dpg-config
          configMap:
            name: {{ .Release.Name }}-dpg-config
        - name: domain-config
          configMap:
            name: {{ .Release.Name }}-domain-config
        - name: chroma-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-chroma-data
        - name: kb-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-kb-data
