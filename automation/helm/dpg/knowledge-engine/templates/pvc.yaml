apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-chroma-data
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.storage.chromadb.size }}
  {{- if .Values.storage.chromadb.storageClass }}
  storageClassName: {{ .Values.storage.chromadb.storageClass }}
  {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-kb-data
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.storage.kbData.size }}
  {{- if .Values.storage.kbData.storageClass }}
  storageClassName: {{ .Values.storage.kbData.storageClass }}
  {{- end }}
