# Config-agnostic: dpgConfig and domainConfig injected at deploy time via --set-file
configFolder: /app/config
replicaCount: 1

image:
  repository: sanketikahub/dpg-knowledge-engine
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 8001

resources:
  requests:
    cpu: 250m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi

healthCheck:
  readiness:
    initialDelaySeconds: 30
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 60
    periodSeconds: 20

storage:
  chromadb:
    size: 5Gi
    storageClass: ""
  kbData:
    size: 10Gi
    storageClass: ""
    mountPath: /data/kb

# Upload chain auth — set at deploy time; never commit real values here.
uploadAuth:
  reachToKeApiKey: ""
  keToDevkitApiKey: ""
  devkitCallbackUrl: ""

# Azure Blob Storage — required only when the domain uses Azure for KB ingestion.
azure:
  storageAccount: ""
  storageKey: ""
  containerName: ""

# Injected at deploy time — do not set here
dpgConfig: ""
domainConfig: ""
