# Config-agnostic: dpgConfig and domainConfig injected at deploy time via --set-file
configFolder: /app/config
replicaCount: 1

image:
  repository: srivatsak2002/dpg-memory-layer
  tag: "0.2.0"
  pullPolicy: IfNotPresent

service:
  port: 8002

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

healthCheck:
  readiness:
    initialDelaySeconds: 15
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 20

redis:
  url: "redis://redis:6379/0"

memgraph:
  uri: "bolt://memgraph:7687"
  user: memgraph
  password: ""

# Injected at deploy time — do not set here
dpgConfig: ""
domainConfig: ""
