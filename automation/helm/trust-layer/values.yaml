replicaCount: 1

image:
  repository: ghcr.io/your-org/trust-layer
  tag: latest
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# DPG framework defaults — mounted as /app/config/dpg.yaml inside the pod.
dpgConfig:
  server:
    host: "0.0.0.0"
    port: 8003

# Domain-specific config — mounted as /app/config/domain.yaml inside the pod.
config:
  server:
    host: "0.0.0.0"
    port: 8003

  trust:
    input_rules:
      blocked_phrases:
        - "bomb"
        - "weapon"
        - "kill"
        - "threat"
        - "violence"
      escalation_topics:
        - "arrested"
        - "police case"
        - "court notice"
        - "legal action"
        - "FIR"
        - "jail"
        - "suicide"
    output_rules:
      blocked_phrases:
        - "I cannot help with that"
        - "as an AI, I"
        - "guaranteed placement"
        - "100% job guarantee"
