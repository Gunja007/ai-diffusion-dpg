apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-dpg-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    layer: dpg-defaults
data:
  # DPG framework defaults for Trust Layer.
  # Mounted as /app/config/dpg.yaml inside the pod.
  # Edit dpgConfig in values.yaml to change defaults — do not edit this template.
  dpg.yaml: |
{{ .Values.dpgConfig | toYaml | indent 4 }}
