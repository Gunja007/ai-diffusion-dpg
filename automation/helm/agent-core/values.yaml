# automation/helm/agent-core/values.yaml
#
# Full merged config for Agent Core in Kubernetes.
# Endpoints use Kubernetes FQDNs (service.namespace.svc.cluster.local).
# All other values mirror dev-kit/configs/kkb/agent_core.yaml merged with
# dev-kit/dpg/agent_core.yaml.

# ANTHROPIC_API_KEY — do NOT set here. Pass at install time:
# helm install agent-core ./agent-core -n agent-core --set anthropicApiKey=$ANTHROPIC_API_KEY
# Path inside the container that holds dpg.yaml and domain.yaml config files.
configFolder: /app/config

anthropicApiKey: ""

replicaCount: 1

image:
  repository: srivatsak2002/dpg-agent-core
  tag: latest
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# DPG framework defaults — mounted as /app/config/dpg.yaml inside the pod.
dpgConfig:
  server:
    host: "0.0.0.0"
    port: 8000
  agent:
    timeout_ms: 10000
    retry_attempts: 2
    retry_backoff_seconds: [0, 0.5, 1.0]
    max_tool_rounds: 1
  conversation:
    max_turns: 20
    blocked_message: "I'm unable to help with that request."
    escalation_message: "I'm connecting you to a human agent who can better assist you."
    output_blocked_message: "I wasn't able to produce a safe response. Please try rephrasing your question."

# Domain-specific config — mounted as /app/config/domain.yaml inside the pod.
config:
  server:
    host: "0.0.0.0"
    port: 8000

  agent:
    primary_model: claude-haiku-4-5-20251001
    fallback_model: claude-haiku-4-5-20251001
    timeout_ms: 10000
    retry_attempts: 2
    retry_backoff_seconds: [0, 0.5, 1.0]
    max_tool_rounds: 1

  conversation:
    max_turns: 20
    blocked_message: "I'm unable to help with that request."
    escalation_message: "I'm connecting you to a human agent who can better assist you."
    output_blocked_message: "I wasn't able to produce a safe response. Please try rephrasing your question."

  connectors:
    read:
      - name: onest_market_lookup
        description: "Search ONEST live job market data by trade and location"
    write: []
    identity: []

  ke_client:
    endpoint: "http://knowledge-engine.knowledge-engine.svc.cluster.local:8001/assemble_prompt"
    timeout_ms: 30000

  memory_client:
    endpoint: "http://memory-layer.memory-layer.svc.cluster.local:8002"
    timeout_ms: 3000

  trust_client:
    endpoint: "http://trust-layer.trust-layer.svc.cluster.local:8003"
    timeout_ms: 2000

  learning_client:
    endpoint: "http://observability-layer.observability-layer.svc.cluster.local:8004"
    timeout_ms: 2000

  action_gateway_client:
    endpoint: "http://action-gateway.action-gateway.svc.cluster.local:9999/onest/market_lookup"
    timeout_ms: 5000

  preprocessing:
    language_normalisation:
      model: claude-haiku-4-5-20251001
      provider: llm_native
      supported_languages: [hindi, kannada, english, hinglish]
      transliteration: true
      code_switching: true
      bhashini:
        api_key_env: BHASHINI_API_KEY
        user_id_env: BHASHINI_USER_ID
        endpoint: https://dhruva-api.bhashini.gov.in/services/inference/pipeline

    nlu_processor:
      model: claude-haiku-4-5-20251001
      confidence_threshold: 0.5
      history_turns: 2
      intents:
        - market_truth_query
        - scheme_query
        - training_query
        - apply_now
        - counsellor_request
        - pay_range_query
        - unknown
      entities: [trade, location, distance_km, income_urgency]
      sentiment_classes: [neutral, positive, distressed, frustrated]
