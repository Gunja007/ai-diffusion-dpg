# Pass the API key at install/upgrade time ‚Äî never store it in values.yaml or any file.
#
# Install:
#   helm install agent-core ./agent-core -n agent-core --create-namespace \
#     --set anthropicApiKey=$ANTHROPIC_API_KEY
#
# Upgrade:
#   helm upgrade agent-core ./agent-core -n agent-core \
#     --set anthropicApiKey=$ANTHROPIC_API_KEY
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.anthropicApiKey | required "anthropicApiKey is required ‚Äî pass it with --set anthropicApiKey=<your_key>" }}
