apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-domain-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    layer: domain-config
data:
  # Domain-specific config for this deployment (KKB values).
  # Mounted as /app/config/domain.yaml inside the pod.
  # Edit values.yaml to change config — do not edit this template.
  domain.yaml: |
{{ .Values.config | toYaml | indent 4 }}
