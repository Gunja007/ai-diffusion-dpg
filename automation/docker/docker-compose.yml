# automation/docker/docker-compose.yml
#
# Runs all 7 DPG services on a single machine using pre-built Docker Hub images.
# Each service receives two volume-mounted config files:
#   /app/config/dpg.yaml    — DPG framework defaults (from dev-kit/dpg/)
#   /app/config/domain.yaml — domain-specific values (from dev-kit/configs/kkb/)
# Services deep-merge these at startup: domain values override DPG defaults.
# Both config files are mandatory — service will not start if either is missing.
#
# Prerequisites:
#   1. cp .env.example .env && edit .env  (add ANTHROPIC_API_KEY)
#   2. docker compose up -d               (start background services)
#   3. docker compose run --rm reach_layer (interactive CLI session)
#
# Paths in this file are relative to the docker-compose.yml location.
# ../../ resolves to the repository root.

services:

  # ---------------------------------------------------------------------------
  # Memory Layer — session state store (port 8002)
  # ---------------------------------------------------------------------------
  memory_layer:
    image: srivatsak2002/dpg-memory-layer:latest
    container_name: memory_layer
    volumes:
      - ../../dev-kit/dpg/memory_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/kkb/memory_layer.yaml:/app/config/domain.yaml:ro
    networks:
      - dpg_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Trust Layer — content safety gate (port 8003)
  # ---------------------------------------------------------------------------
  trust_layer:
    image: srivatsak2002/dpg-trust-layer:latest
    container_name: trust_layer
    volumes:
      - ../../dev-kit/dpg/trust_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/kkb/trust_layer.yaml:/app/config/domain.yaml:ro
    networks:
      - dpg_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Learning Layer — async observability (port 8004)
  # ---------------------------------------------------------------------------
  learning_layer:
    image: srivatsak2002/dpg-learning-layer:latest
    container_name: learning_layer
    volumes:
      - ../../dev-kit/dpg/learning_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/kkb/learning_layer.yaml:/app/config/domain.yaml:ro
    networks:
      - dpg_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Action Gateway — external API stub / ONEST mock (port 9999)
  # ---------------------------------------------------------------------------
  action_gateway:
    image: srivatsak2002/dpg-action-gateway:latest
    container_name: action_gateway
    volumes:
      - ../../dev-kit/dpg/action_gateway.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/kkb/action_gateway.yaml:/app/config/domain.yaml:ro
    networks:
      - dpg_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9999/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Knowledge Engine — RAG, NLU, prompt assembly (port 8001)
  # ---------------------------------------------------------------------------
  knowledge_engine:
    image: srivatsak2002/dpg-knowledge-engine:latest
    container_name: knowledge_engine
    volumes:
      - ../../dev-kit/dpg/knowledge_engine.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/kkb/knowledge_engine.yaml:/app/config/domain.yaml:ro
      - chroma_data:/app/data/chroma_db    # ChromaDB persistence
    networks:
      - dpg_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s     # ChromaDB init takes longer
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Agent Core — orchestrator and LLM caller (port 8000)
  # ---------------------------------------------------------------------------
  agent_core:
    image: srivatsak2002/dpg-agent-core:latest
    container_name: agent_core
    env_file: .env                         # injects ANTHROPIC_API_KEY
    volumes:
      - ../../dev-kit/dpg/agent_core.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/kkb/agent_core.yaml:/app/config/domain.yaml:ro
    networks:
      - dpg_net
    depends_on:
      knowledge_engine:
        condition: service_healthy
      memory_layer:
        condition: service_healthy
      trust_layer:
        condition: service_healthy
      learning_layer:
        condition: service_healthy
      action_gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Reach Layer — interactive CLI (no HTTP port exposed)
  # Run separately: docker compose run --rm reach_layer
  # ---------------------------------------------------------------------------
  reach_layer:
    image: srivatsak2002/dpg-reach-layer:latest
    container_name: reach_layer
    volumes:
      - ../../dev-kit/dpg/reach_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/kkb/reach_layer.yaml:/app/config/domain.yaml:ro
    networks:
      - dpg_net
    depends_on:
      agent_core:
        condition: service_healthy
    stdin_open: true
    tty: true
    profiles:
      - cli                                # not started by default; run explicitly

networks:
  dpg_net:
    driver: bridge

volumes:
  chroma_data:                             # ChromaDB persistence across container restarts
