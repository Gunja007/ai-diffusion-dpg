# automation/docker/docker-compose.yml  (LOCAL BUILD)
#
# Builds all 7 DPG services from source using each service's Dockerfile.
# Use this file for local development — images are built on your machine.
#
# For pre-built Docker Hub images, use docker-compose.dev.yml instead.
#
# Each service receives two volume-mounted config files:
#   /app/config/dpg.yaml    — DPG framework defaults (from dev-kit/dpg/)
#   /app/config/domain.yaml — domain-specific values (from dev-kit/configs/${DOMAIN:-kkb}/)
# Services deep-merge these at startup: domain values override DPG defaults.
# Both config files are mandatory — service will not start if either is missing.
#
# Ingestion flow (Knowledge Engine):
#   On startup, KE runs: python scripts/ingest.py && python main.py
#   Ingest reads docs from knowledge_engine/data/ (bind-mounted as /app/data),
#   writes embeddings into chroma_data volume at /app/data/chroma_db (writable named
#   volume that overrides the read-only bind mount for that subdirectory).
#   Server starts only after ingest completes successfully.
#
# Prerequisites:
#   1. export ANTHROPIC_API_KEY=sk-ant-...
#   2. docker compose build              (build all images from source)
#   3. docker compose up -d              (runs ingest first, then starts all services)
#   4. docker compose run --rm reach_layer (interactive CLI session)
#
# Paths in this file are relative to the docker-compose.yml location.
# ../../ resolves to the repository root.
#
# Resource limits (local testing):
#   All services: 0.1 CPU, 512 MB RAM
#   Knowledge Engine (ingest + serve): 0.5 CPU, 2 GB RAM
#
# Image tagging:
#   Each image is tagged with ${GIT_SHA:-latest}. In CI, set GIT_SHA to the short
#   commit hash before running docker compose build, then push a second `latest` tag:
#     export GIT_SHA=$(git rev-parse --short HEAD)
#     docker compose build
#     docker compose push
#     # re-tag every image as :latest and push
#     for svc in action_gateway agent_core dev_kit knowledge_engine memory_layer \
#                observability_layer reach_layer_cli reach_layer_web reach_layer_voice \
#                trust_layer; do
#       repo=$(docker compose config --format json | jq -r ".services.${svc}.image" | cut -d: -f1)
#       docker tag ${repo}:${GIT_SHA} ${repo}:latest
#       docker push ${repo}:latest
#     done

services:

  # ---------------------------------------------------------------------------
  # Action Gateway — external API stub / ONEST mock (port 9999)
  # ---------------------------------------------------------------------------
  action_gateway:
    build:
      context: ../..
      dockerfile: action_gateway/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    image: sanketikahub/dpg-action-gateway:${GIT_SHA:-latest}
    container_name: action_gateway
    environment:
      - CONFIG_FOLDER=/app/config
      # Connector API keys are injected here at deploy time by dev-kit (e.g. ONEST_API_KEY=...).
      # When running docker compose manually, add KEY=value lines to this section.
    volumes:
      - ../../dev-kit/dpg/action_gateway.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/action_gateway.yaml:/app/config/action_gateway.yaml:ro
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9999/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Agent Core — orchestrator and LLM caller (port 8000)
  # ---------------------------------------------------------------------------
  agent_core:
    build:
      context: ../..
      dockerfile: agent_core/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    image: sanketikahub/dpg-agent-core:${GIT_SHA:-latest}
    container_name: agent_core
    environment:
      - ANTHROPIC_API_KEY                  # inherited from shell: export ANTHROPIC_API_KEY=sk-...
      - CONFIG_FOLDER=/app/config
    volumes:
      - ../../dev-kit/dpg/agent_core.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/agent_core.yaml:/app/config/agent_core.yaml:ro
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M
    depends_on:
      knowledge_engine:
        condition: service_healthy
      memory_layer:
        condition: service_healthy
      trust_layer:
        condition: service_healthy
      observability_layer:
        condition: service_healthy
      action_gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Dev-Kit — Configuration Agent UI (port 8080)
  # ---------------------------------------------------------------------------
  dev_kit:
    build:
      context: ../..
      dockerfile: dev-kit/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    image: sanketikahub/dpg-dev-kit:${GIT_SHA:-latest}
    container_name: dev_kit
    environment:
      - ANTHROPIC_API_KEY                  # inherited from shell: export ANTHROPIC_API_KEY=sk-...
      # Upload chain auth — dev-kit acts as upload orchestrator.
      # Generate with: openssl rand -hex 32
      - DEVKIT_TO_REACH_API_KEY=${DEVKIT_TO_REACH_API_KEY:-}
      - KE_TO_DEVKIT_API_KEY=${KE_TO_DEVKIT_API_KEY:-}
      # Ingest proxy target. dev_kit and the deployed reach_layer_web run
      # in different compose projects (different networks), so using the
      # service name `reach_layer_web` from inside dev_kit either fails to
      # resolve or resolves to a non-routable IP — POST /api/ingest/submit
      # then returns 504. Default to host.docker.internal:8005 (mapped via
      # extra_hosts: host-gateway below) which lands on the host's
      # published 8005 port from any compose project. Override via the
      # shell only if you've manually wired both projects to a shared
      # network.
      - REACH_LAYER_URL=${REACH_LAYER_URL:-http://host.docker.internal:8005}
      # Absolute host path of the repo. dev_kit rewrites the relative
      # bind sources in the deployed compose file to host-absolute
      # paths so the host docker daemon can resolve them when starting
      # services. Required when dev_kit runs in a container and drives
      # the host daemon via /var/run/docker.sock.
      # Default: ${PWD}/../.. assumes `docker compose -f .../docker-compose.yml`
      # is launched from the automation/docker directory (per CLAUDE.md).
      - HOST_REPO_ROOT=${HOST_REPO_ROOT:-${PWD}/../..}
      # Forwarded so dev_kit's `docker compose up` subprocess (which inherits
      # os.environ via run_compose_up) can substitute ${NGROK_AUTHTOKEN:-} in
      # the deployed ngrok service. Without this the deployed ngrok starts
      # with an empty authtoken and crashes with ERR_NGROK_4018.
      # Set on the host before bringing dev_kit up:
      #   export NGROK_AUTHTOKEN=<token from https://dashboard.ngrok.com/authtokens>
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
      # Voice channel credentials. The deployed reach_layer_voice service
      # references ${VOBIZ_AUTH_ID:-} / ${VOBIZ_AUTH_TOKEN:-} / etc., and
      # CampaignManager hard-fails on startup with
      #   ValueError: reach_layer.channels.voice.vobiz.auth_id is required
      # when those env vars are empty. Forward them through dev_kit so the
      # `docker compose up` subprocess can substitute them.
      # Set on the host before bringing dev_kit up (only required when the
      # voice channel is selected at deploy time):
      #   export VOBIZ_AUTH_ID=...
      #   export VOBIZ_AUTH_TOKEN=...
      #   export VOBIZ_FROM_NUMBER=+...
      #   export RAYA_API_KEY=...
      #   export PUBLIC_URL=https://<your-ngrok-host>   # optional override
      - VOBIZ_AUTH_ID=${VOBIZ_AUTH_ID:-}
      - VOBIZ_AUTH_TOKEN=${VOBIZ_AUTH_TOKEN:-}
      - VOBIZ_FROM_NUMBER=${VOBIZ_FROM_NUMBER:-}
      - RAYA_API_KEY=${RAYA_API_KEY:-}
      - PUBLIC_URL=${PUBLIC_URL:-}
    ports:
      - "8080:8080"
    networks:
      - dpg_net
    volumes:
    - ../../dev-kit/configs:/app/configs
    # Mount the host docker socket so the dev_kit container can drive
    # `docker compose` against the host daemon (deploy / preview / status
    # all shell out to `docker`). Without this the CLI errors with
    # "failed to connect to the docker API at unix:///var/run/docker.sock".
    - /var/run/docker.sock:/var/run/docker.sock
    # Reuse the host operator's `docker login` credentials so dev_kit's
    # CLI is authenticated when it pulls images. Without this, deploys
    # that pull >100 images / 6h hit Docker Hub's anonymous rate limit
    # ("toomanyrequests: You have reached your unauthenticated pull rate
    # limit"). The Dockerfile in dev-kit/Dockerfile runs as root, so the
    # config lands at /root/.docker/config.json.
    # ${HOME} resolves on the host before compose sends to the daemon;
    # if the host operator hasn't run `docker login`, the file is absent
    # and compose will refuse to start dev_kit — drop the line in that
    # case (or run `docker login` first).
    - ${HOME}/.docker/config.json:/root/.docker/config.json:ro
    # On Linux dev_kit's container can't reach the host's published ports
    # via `localhost` (its loopback is its own). The ingest proxy forwards
    # uploads to reach_layer_web, which lives in a different compose
    # project / network and is only reachable via the host's published
    # 8005. host-gateway adds an /etc/hosts entry that points
    # host.docker.internal at the host so the proxy resolves correctly.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Knowledge Engine — RAG, NLU, prompt assembly (port 8001)
  # On startup: runs ingest first, then starts the server.
  # ---------------------------------------------------------------------------
  knowledge_engine:
    build:
      context: ../..
      dockerfile: knowledge_engine/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    image: sanketikahub/dpg-knowledge-engine:${GIT_SHA:-latest}
    container_name: knowledge_engine
    environment:
      - CONFIG_FOLDER=/app/config
      # Upload chain auth — reach-layer calls KE with this key; KE calls back dev-kit with KE_TO_DEVKIT_API_KEY.
      - REACH_TO_KE_API_KEY=${REACH_TO_KE_API_KEY:-}
      - KE_TO_DEVKIT_API_KEY=${KE_TO_DEVKIT_API_KEY:-}
      # dev_kit runs in a *separate* compose project (the host-side
      # automation/docker stack), so the service name `dev_kit` doesn't
      # resolve from KE's network. Default to host.docker.internal:8080,
      # which routes through the host's published 8080 to dev_kit. The
      # extra_hosts: host-gateway entry below makes the alias resolve on
      # Linux; Docker Desktop provides it automatically.
      - KE_DEVKIT_CALLBACK_URL=${KE_DEVKIT_CALLBACK_URL:-http://host.docker.internal:8080}
      - KB_DATA_DIR=/data/kb
      - CHROMA_PERSIST_DIR=/app/chroma_db
      # Azure Blob Storage — required only when the domain uses Azure for KB ingestion.
      - AZURE_STORAGE_ACCOUNT=${AZURE_STORAGE_ACCOUNT:-}
      - AZURE_STORAGE_KEY=${AZURE_STORAGE_KEY:-}
      - AZURE_CONTAINER_NAME=${AZURE_CONTAINER_NAME:-}
    user: root                               # needed to write to root-owned chroma_data named volume
    command: ["sh", "-c", "if [ ! -f /app/chroma_db/chroma.sqlite3 ]; then echo 'ChromaDB empty — running ingest...' && python -m scripts.ingest --config config/knowledge_engine.yaml; else echo 'ChromaDB exists — skipping ingest.'; fi && python main.py"]
    volumes:
      - ../../dev-kit/dpg/knowledge_engine.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/knowledge_engine.yaml:/app/config/knowledge_engine.yaml:ro
      - ../../knowledge_engine/data:/app/data:ro   # source docs (read-only)
      - chroma_data:/app/chroma_db                 # embeddings (separate path, not inside the :ro bind mount)
      - kb_data:/data/kb                           # upload staging area for KB documents
    networks:
      - dpg_net
    # KE → dev_kit ingest callback. dev_kit publishes 8080 on the host
    # but lives in a different compose project, so resolve it through
    # the host gateway rather than relying on cross-project DNS.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 180s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Memory Layer — session state store (port 8002)
  # ---------------------------------------------------------------------------
  memory_layer:
    build:
      context: ../..
      dockerfile: memory_layer/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    image: sanketikahub/dpg-memory-layer:${GIT_SHA:-latest}
    container_name: memory_layer
    environment:
      - CONFIG_FOLDER=/app/config
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - MEMGRAPH_URI=bolt://memgraph:7687
      - MEMGRAPH_USER=memgraph
      - MEMGRAPH_PASSWORD=${MEMGRAPH_PASSWORD:-}
    volumes:
      - ../../dev-kit/dpg/memory_layer.yaml:/app/config/dpg.yaml:ro #ro = read only
      - ../../dev-kit/configs/${DOMAIN:-kkb}/memory_layer.yaml:/app/config/memory_layer.yaml:ro
    networks:
      - dpg_net
    depends_on:
      redis:
        condition: service_healthy
      memgraph:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Observability Layer — async observability (port 8004)
  # ---------------------------------------------------------------------------
  observability_layer:
    build:
      context: ../..
      dockerfile: observability_layer/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    image: sanketikahub/dpg-observability-layer:${GIT_SHA:-latest}
    container_name: observability_layer
    environment:
      - CONFIG_FOLDER=/app/config
    volumes:
      - ../../dev-kit/dpg/observability_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/observability_layer.yaml:/app/config/observability_layer.yaml:ro
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Reach Layer — web channel (port 8005)
  # Open http://localhost:8005 in a browser after all services are healthy.
  #
  # Issue #73: the reach_layer service was split into three independently
  # deployable channel services (cli/web/voice) that share reach_layer_base.
  # Build and deploy only the channel(s) your domain needs.
  # ---------------------------------------------------------------------------
  reach_layer_web:
    build:
      context: ../..
      dockerfile: reach_layer/web/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    image: sanketikahub/dpg-reach-layer-web:${GIT_SHA:-latest}
    container_name: reach_layer_web
    environment:
      - CONFIG_FOLDER=/app/config
      # Optional when auth.enabled: false (default). Required and validated by server.py
      # at startup when auth.enabled: true — export both before running docker compose.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - REACH_SESSION_SECRET=${REACH_SESSION_SECRET:-}
      # Upload chain auth — dev-kit → reach-layer and reach-layer → KE keys.
      - DEVKIT_TO_REACH_API_KEY=${DEVKIT_TO_REACH_API_KEY:-}
      - REACH_TO_KE_API_KEY=${REACH_TO_KE_API_KEY:-}
      - KE_INTERNAL_URL=${KE_INTERNAL_URL:-http://knowledge_engine:8001}
    volumes:
      # Unified Reach Layer config: DPG defaults + per-domain overrides.
      # Loader scopes to the web channel via load_reach_config("web").
      - ../../dev-kit/dpg/reach_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/reach_layer.yaml:/app/config/domain.yaml:ro
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M
    depends_on:
      agent_core:
        condition: service_healthy
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8005/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Reach Layer — CLI channel (on-demand REPL, opt-in via `cli` profile)
  #   docker compose run --rm reach_layer_cli
  # ---------------------------------------------------------------------------
  reach_layer_cli:
    build:
      context: ../..
      dockerfile: reach_layer/cli/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    image: sanketikahub/dpg-reach-layer-cli:${GIT_SHA:-latest}
    container_name: reach_layer_cli
    volumes:
      # Unified Reach Layer config: DPG defaults + per-domain overrides.
      # Loader scopes to the cli channel via load_reach_config("cli").
      - ../../dev-kit/dpg/reach_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/reach_layer.yaml:/app/config/domain.yaml:ro
    networks:
      - dpg_net
    stdin_open: true
    tty: true
    depends_on:
      agent_core:
        condition: service_healthy
    profiles:
      - cli

  # ---------------------------------------------------------------------------
  # Reach Layer — Voice channel (port 8006)
  # Vobiz/WebSocket telephony bridge. PUBLIC_URL is injected by the ngrok
  # service via NGROK_URL or set manually.
  # ---------------------------------------------------------------------------
  reach_layer_voice:
    build:
      context: ../..
      dockerfile: reach_layer/voice/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    image: sanketikahub/dpg-reach-layer-voice:${GIT_SHA:-latest}
    container_name: reach_layer_voice
    environment:
      - DPG_CONFIG_PATH=/app/config/dpg.yaml
      - DOMAIN_CONFIG_PATH=/app/config/domain.yaml
      - NLTK_DATA=/tmp/nltk_data
      - PUBLIC_URL=${PUBLIC_URL:-}                       # set from shell or use ngrok service below
      - VOBIZ_AUTH_ID=${VOBIZ_AUTH_ID:-}
      - VOBIZ_AUTH_TOKEN=${VOBIZ_AUTH_TOKEN:-}
      - VOBIZ_FROM_NUMBER=${VOBIZ_FROM_NUMBER:-}
      - RAYA_API_KEY=${RAYA_API_KEY:-}
      - LOG_LEVEL=DEBUG
    volumes:
      # Unified Reach Layer config: DPG defaults + per-domain overrides.
      # Loader scopes to the voice channel via load_reach_config("voice").
      - ../../dev-kit/dpg/reach_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/reach_layer.yaml:/app/config/domain.yaml:ro
    ports:
      - "8006:8006"
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1g
    depends_on:
      agent_core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health', timeout=3)"]
      interval: 10s
      timeout: 8s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Trust Layer — content safety gate (port 8003)
  # ---------------------------------------------------------------------------
  trust_layer:
    build:
      context: ../..
      dockerfile: trust_layer/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    image: sanketikahub/dpg-trust-layer:${GIT_SHA:-latest}
    container_name: trust_layer
    environment:
      - CONFIG_FOLDER=/app/config
    volumes:
      - ../../dev-kit/dpg/trust_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/trust_layer.yaml:/app/config/trust_layer.yaml:ro
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana — dashboards UI (port 3000)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.3.3
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Jaeger — distributed trace UI (port 16686)
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      # 4317 is not exposed to the host — otelcol reaches jaeger:4317 internally
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Loki — log aggregation (port 3100)
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    ports:
      - "3100:3100"
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Memgraph — persistent user profile store for Memory Layer
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # Memgraph Lab — graph browser UI (port 3002)
  # Open http://localhost:3002 to explore the Memory Layer's context graph.
  # ---------------------------------------------------------------------------
  memgraph_lab:
    image: memgraph/lab:latest
    container_name: memgraph_lab
    environment:
      - QUICK_CONNECT_MG_HOST=memgraph
      - QUICK_CONNECT_MG_PORT=7687
    ports:
      - "3002:3000"
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
    depends_on:
      memgraph:
        condition: service_healthy
    restart: unless-stopped

  memgraph:
    image: memgraph/memgraph
    container_name: memgraph
    command: [
      "/usr/lib/memgraph/memgraph",
      "--storage-wal-enabled=true",
      "--storage-snapshot-interval-sec=300"
    ]
    volumes:
      - memgraph_data:/var/lib/memgraph
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole --host 127.0.0.1 --port 7687 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ngrok — exposes reach_layer_voice (port 8006) to the public internet.
  # Required so Vobiz can reach /answer and /ws/{call_sid} from outside.
  #
  # Prerequisites:
  #   export NGROK_AUTHTOKEN=<your token>   # https://dashboard.ngrok.com/authtokens
  #
  # Once running, find your public URL:
  #   docker logs ngrok                     # prints the forwarding URL on startup
  #   curl http://localhost:4040/api/tunnels # ngrok local API (JSON)
  #
  # Then set PUBLIC_URL and restart the voice service:
  #   export PUBLIC_URL=https://abc123.ngrok-free.app
  #   docker compose up -d reach_layer_voice
  # ---------------------------------------------------------------------------
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    command: http reach_layer_voice:8006 --log stdout
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"                          # ngrok local API / inspector UI
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    depends_on:
      reach_layer_voice:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OTel Collector — receives OTLP, fans out to Jaeger / Prometheus / Loki
  # ---------------------------------------------------------------------------
  otelcol:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: otelcol
    command: ["--config=/etc/otelcol/otelcol-config.yaml"]
    volumes:
      - ./otelcol/otelcol-config.yaml:/etc/otelcol/otelcol-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics scrape endpoint
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prometheus — metrics store (port 9090)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis — session state backend for Memory Layer
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

networks:
  dpg_net:
    driver: bridge

volumes:
  chroma_data:                             # ChromaDB embeddings, persisted across container restarts
  memgraph_data:                           # Memgraph graph database, persisted across container restarts
  kb_data:                                 # KB document upload staging area (shared: reach-layer → knowledge-engine)
