# automation/docker/docker-compose.yml
#
# Runs all 7 DPG services on a single machine using pre-built Docker Hub images.
# Each service receives two volume-mounted config files:
#   /app/config/dpg.yaml    — DPG framework defaults (from dev-kit/dpg/)
#   /app/config/domain.yaml — domain-specific values (from dev-kit/configs/${DOMAIN}/)
# Services deep-merge these at startup: domain values override DPG defaults.
# Both config files are mandatory — service will not start if either is missing.
#
# Ingestion flow (Knowledge Engine):
#   On startup, KE runs: python scripts/ingest.py && python main.py
#   Ingest reads docs from knowledge_engine/data/ (bind-mounted as /app/data),
#   writes embeddings into chroma_data volume at /app/data/chroma_db (writable named
#   volume that overrides the read-only bind mount for that subdirectory).
#   Server starts only after ingest completes successfully.
#
# Prerequisites:
#   1. export ANTHROPIC_API_KEY=sk-ant-...
#   2. docker compose up -d               (runs ingest first, then starts all services)
#   3. docker compose run --rm reach_layer (interactive CLI session)
#
# Paths in this file are relative to the docker-compose.yml location.
# ../../ resolves to the repository root.
#
# Resource limits (local testing):
#   All services: 0.1 CPU, 512 MB RAM
#   Knowledge Engine (ingest + serve): 0.2 CPU, 512 MB RAM

services:

  # ---------------------------------------------------------------------------
  # Redis — session state backend for Memory Layer
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Memgraph — persistent user profile store for Memory Layer (open-source, Bolt-compatible)
  # ---------------------------------------------------------------------------
  memgraph:
    image: memgraph/memgraph
    container_name: memgraph
    command: [
      "/usr/lib/memgraph/memgraph",
      "--storage-wal-enabled=true",
      "--storage-snapshot-interval-sec=300"
    ]
    volumes:
      - memgraph_data:/var/lib/memgraph
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole --host 127.0.0.1 --port 7687 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Memory Layer — session state store (port 8002)
  # ---------------------------------------------------------------------------
  memory_layer:
    image: srivatsak2002/dpg-memory-layer:0.2.0
    container_name: memory_layer
    environment:
      - CONFIG_FOLDER=/app/config
      - REDIS_URL=redis://redis:6379/0
      - MEMGRAPH_URI=bolt://memgraph:7687
      - MEMGRAPH_USER=memgraph
      - MEMGRAPH_PASSWORD=${MEMGRAPH_PASSWORD:-}
    volumes:
      - ../../dev-kit/dpg/memory_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/memory_layer.yaml:/app/config/memory_layer.yaml:ro
    networks:
      dpg_net:
        aliases:
          - memory-layer
    depends_on:
      redis:
        condition: service_healthy
      memgraph:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=3)"]
      interval: 10s
      timeout: 8s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Trust Layer — content safety gate (port 8003)
  # ---------------------------------------------------------------------------
  trust_layer:
    image: srivatsak2002/dpg-trust-layer:0.2.0
    container_name: trust_layer
    environment:
      - CONFIG_FOLDER=/app/config
    volumes:
      - ../../dev-kit/dpg/trust_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/trust_layer.yaml:/app/config/trust_layer.yaml:ro
    networks:
      dpg_net:
        aliases:
          - trust-layer
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health', timeout=3)"]
      interval: 10s
      timeout: 8s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Observability Layer — async observability (port 8004)
  # ---------------------------------------------------------------------------
  observability_layer:
    image: srivatsak2002/dpg-observability-layer:0.2.0
    container_name: observability_layer
    environment:
      - CONFIG_FOLDER=/app/config
    volumes:
      - ../../dev-kit/dpg/observability_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/observability_layer.yaml:/app/config/observability_layer.yaml:ro
    networks:
      dpg_net:
        aliases:
          - observability-layer
    depends_on:
      otelcol:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health', timeout=3)"]
      interval: 10s
      timeout: 8s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Action Gateway — external API stub / ONEST mock (port 9999)
  # ---------------------------------------------------------------------------
  action_gateway:
    image: srivatsak2002/dpg-action-gateway:0.2.0
    container_name: action_gateway
    environment:
      - CONFIG_FOLDER=/app/config
    volumes:
      - ../../dev-kit/dpg/action_gateway.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/action_gateway.yaml:/app/config/action_gateway.yaml:ro
    networks:
      dpg_net:
        aliases:
          - action-gateway
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9999/health', timeout=3)"]
      interval: 10s
      timeout: 8s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Knowledge Engine — RAG, NLU, prompt assembly (port 8001)
  # On startup: runs ingest first, then starts the server.
  # ---------------------------------------------------------------------------
  knowledge_engine:
    image: srivatsak2002/dpg-knowledge-engine:0.2.0
    container_name: knowledge_engine
    environment:
      - CONFIG_FOLDER=/app/config
    user: root                               # needed to write to root-owned chroma_data named volume
    command: ["sh", "-c", "if [ ! -f /app/chroma_db/chroma.sqlite3 ]; then echo 'ChromaDB empty — running ingest...' && python -m scripts.ingest --config config/knowledge_engine.yaml; else echo 'ChromaDB exists — skipping ingest.'; fi && python main.py"]
    volumes:
      - ../../dev-kit/dpg/knowledge_engine.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/knowledge_engine.yaml:/app/config/knowledge_engine.yaml:ro
      - ../../knowledge_engine/data:/app/data:ro   # source docs (read-only)
      - chroma_data:/app/chroma_db            # embeddings (writable, overrides :ro for this subdir)
    networks:
      dpg_net:
        aliases:
          - knowledge-engine
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 180s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Agent Core — orchestrator and LLM caller (port 8000)
  # ---------------------------------------------------------------------------
  agent_core:
    image: srivatsak2002/dpg-agent-core:0.2.0
    container_name: agent_core
    environment:
      - ANTHROPIC_API_KEY                  # inherited from shell: export ANTHROPIC_API_KEY=sk-...
      - CONFIG_FOLDER=/app/config
    volumes:
      - ../../dev-kit/dpg/agent_core.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/agent_core.yaml:/app/config/agent_core.yaml:ro
    networks:
      dpg_net:
        aliases:
          - agent-core
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M
    depends_on:
      knowledge_engine:
        condition: service_healthy
      memory_layer:
        condition: service_healthy
      trust_layer:
        condition: service_healthy
      observability_layer:
        condition: service_healthy
      action_gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Reach Layer — Web UI + FastAPI server (port 8005)
  # ---------------------------------------------------------------------------
  reach_layer:
    image: srivatsak2002/dpg-reach-layer:0.2.0
    container_name: reach_layer
    environment:
      - CONFIG_FOLDER=/app/config
    ports:
      - "8005:8005"
    volumes:
      - ../../dev-kit/dpg/reach_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/reach_layer.yaml:/app/config/reach_layer.yaml:ro
    networks:
      dpg_net:
        aliases:
          - reach-layer
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M
    depends_on:
      agent_core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health', timeout=3)"]
      interval: 10s
      timeout: 8s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OTel Collector — receives OTLP, fans out to Jaeger / Prometheus / Loki
  # ---------------------------------------------------------------------------
  otelcol:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: otelcol
    command: ["--config=/etc/otelcol/otelcol-config.yaml"]
    volumes:
      - ./otelcol/otelcol-config.yaml:/etc/otelcol/otelcol-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics scrape endpoint
    networks:
      dpg_net:
        aliases:
          - otel-collector
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Jaeger — distributed trace UI (port 16686)
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "14250:14250"   # gRPC from Collector
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prometheus — metrics store (port 9090)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Loki — log aggregation (port 3100)
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    ports:
      - "3100:3100"
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana — dashboards UI (port 3000)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.3.3
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
    restart: unless-stopped

networks:
  dpg_net:
    driver: bridge

volumes:
  chroma_data:                             # ChromaDB embeddings, persisted across container restarts
  memgraph_data:                           # Memgraph graph database, persisted across container restarts
