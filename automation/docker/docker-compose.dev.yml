# automation/docker/docker-compose.yml
#
# Runs all 7 DPG services on a single machine using pre-built Docker Hub images.
# Each service receives two volume-mounted config files:
#   /app/config/dpg.yaml    — DPG framework defaults (from dev-kit/dpg/)
#   /app/config/domain.yaml — domain-specific values (from dev-kit/configs/${DOMAIN}/)
# Services deep-merge these at startup: domain values override DPG defaults.
# Both config files are mandatory — service will not start if either is missing.
#
# Ingestion flow (Knowledge Engine):
#   On startup, KE runs: python scripts/ingest.py && python main.py
#   Ingest reads docs from knowledge-engine/data/ (bind-mounted as /app/data),
#   writes embeddings into chroma_data volume at /app/data/chroma_db (writable named
#   volume that overrides the read-only bind mount for that subdirectory).
#   Server starts only after ingest completes successfully.
#
# Prerequisites:
#   1. export ANTHROPIC_API_KEY=sk-ant-...
#   2. docker compose up -d                    (runs ingest first, then starts all services)
#   3. docker compose run --rm reach_layer_cli (interactive CLI session, opt-in via `cli` profile)
#
# Paths in this file are relative to the docker-compose.yml location.
# ../../ resolves to the repository root.
#
# Resource limits are minimal defaults for local dev. The dev-kit overrides
# these at deploy time via _apply_resources_to_compose() when a preset is selected.

services:

  # ---------------------------------------------------------------------------
  # Action Gateway — external API stub / ONEST mock (port 9999)
  # ---------------------------------------------------------------------------
  action_gateway:
    image: sanketikahub/dpg-action-gateway:latest
    pull_policy: always
    container_name: action_gateway
    environment:
      - CONFIG_FOLDER=/app/config
      # Connector API keys are injected here at deploy time by dev-kit (e.g. ONEST_API_KEY=...).
      # When running docker compose manually, add KEY=value lines to this section.
    volumes:
      - ../../dev-kit/dpg/action_gateway.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/action_gateway.yaml:/app/config/action_gateway.yaml:ro
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9999/health', timeout=5)"]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Agent Core — orchestrator and LLM caller (port 8000)
  # ---------------------------------------------------------------------------
  agent_core:
    image: sanketikahub/dpg-agent-core:latest
    pull_policy: always
    container_name: agent_core
    environment:
      - ANTHROPIC_API_KEY                  # inherited from shell: export ANTHROPIC_API_KEY=sk-...
      - CONFIG_FOLDER=/app/config
    volumes:
      - ../../dev-kit/dpg/agent_core.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/agent_core.yaml:/app/config/agent_core.yaml:ro
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    depends_on:
      action_gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # dev-kit — Configuration Agent UI (port 8080)
  # ---------------------------------------------------------------------------
  dev_kit:
    image: sanketikahub/dpg-dev-kit:latest
    pull_policy: always
    container_name: dev_kit
    environment:
      - ANTHROPIC_API_KEY                  # inherited from shell: export ANTHROPIC_API_KEY=sk-...
      # Upload chain auth — dev-kit acts as upload orchestrator.
      # Generate with: openssl rand -hex 32
      - DEVKIT_TO_REACH_API_KEY=${DEVKIT_TO_REACH_API_KEY:-}
      - KE_TO_DEVKIT_API_KEY=${KE_TO_DEVKIT_API_KEY:-}
      - REACH_LAYER_URL=http://reach_layer_web:8005
      # Absolute host path of the repo. dev_kit rewrites the relative
      # bind sources in the deployed compose file to host-absolute
      # paths so the host docker daemon can resolve them when starting
      # services. Required when dev_kit runs in a container and drives
      # the host daemon via /var/run/docker.sock.
      # Default: ${PWD}/../.. assumes `docker compose -f .../docker-compose.dev.yml`
      # is launched from the automation/docker directory (per CLAUDE.md).
      - HOST_REPO_ROOT=${HOST_REPO_ROOT:-${PWD}/../..}
    ports:
      - "8080:8080"
    networks:
      - dpg_net
    volumes:
    - ../../dev-kit/configs:/app/configs
    # Mount the host docker socket so the dev_kit container can drive
    # `docker compose` against the host daemon (deploy / preview / status
    # all shell out to `docker`). Without this the CLI errors with
    # "failed to connect to the docker API at unix:///var/run/docker.sock".
    - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/')\""]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Knowledge Engine — RAG, NLU, prompt assembly (port 8001)
  # On startup: runs ingest first, then starts the server.
  # ---------------------------------------------------------------------------
  knowledge_engine:
    image: sanketikahub/dpg-knowledge-engine:latest
    pull_policy: always
    container_name: knowledge_engine
    environment:
      - CONFIG_FOLDER=/app/config
      # Upload chain auth — reach-layer calls KE with this key; KE calls back dev-kit with KE_TO_DEVKIT_API_KEY.
      - REACH_TO_KE_API_KEY=${REACH_TO_KE_API_KEY:-}
      - KE_TO_DEVKIT_API_KEY=${KE_TO_DEVKIT_API_KEY:-}
      - KE_DEVKIT_CALLBACK_URL=${KE_DEVKIT_CALLBACK_URL:-http://dev_kit:8080}
      - KB_DATA_DIR=/data/kb
      - CHROMA_PERSIST_DIR=/app/chroma_db
      # Azure Blob Storage — required only when the domain uses Azure for KB ingestion.
      - AZURE_STORAGE_ACCOUNT=${AZURE_STORAGE_ACCOUNT:-}
      - AZURE_STORAGE_KEY=${AZURE_STORAGE_KEY:-}
      - AZURE_CONTAINER_NAME=${AZURE_CONTAINER_NAME:-}
    user: root                               # needed to write to root-owned chroma_data named volume
    # Ingest is user-triggered via the dev-kit upload flow (step 8), not on startup.
    # The KE server starts immediately; documents are ingested when the user uploads via /upload.
    volumes:
      - ../../dev-kit/dpg/knowledge_engine.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/knowledge_engine.yaml:/app/config/knowledge_engine.yaml:ro
      - ../../knowledge-engine/data:/app/data:ro   # source docs (read-only)
      - chroma_data:/app/chroma_db            # writable ChromaDB volume (CHROMA_PERSIST_DIR points here)
      - kb_data:/data/kb                      # upload staging area for KB documents
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5)"]
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 180s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Memory Layer — session state store (port 8002)
  # ---------------------------------------------------------------------------
  memory_layer:
    image: sanketikahub/dpg-memory-layer:latest
    pull_policy: always
    container_name: memory_layer
    environment:
      - CONFIG_FOLDER=/app/config
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - MEMGRAPH_URI=bolt://memgraph:7687
      - MEMGRAPH_USER=memgraph
      - MEMGRAPH_PASSWORD=${MEMGRAPH_PASSWORD:-}
    volumes:
      - ../../dev-kit/dpg/memory_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/memory_layer.yaml:/app/config/memory_layer.yaml:ro
    networks:
      - dpg_net
    depends_on:
      redis:
        condition: service_healthy
      memgraph:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=5)"]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Observability Layer — async observability (port 8004)
  # ---------------------------------------------------------------------------
  observability_layer:
    image: sanketikahub/dpg-observability-layer:latest
    pull_policy: always
    container_name: observability_layer
    environment:
      - CONFIG_FOLDER=/app/config
    volumes:
      - ../../dev-kit/dpg/observability_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/observability_layer.yaml:/app/config/observability_layer.yaml:ro
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health', timeout=5)"]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Reach Layer — Web channel (port 8005)
  # React SPA + FastAPI server. Direct mode: POST /chat -> POST /process_turn.
  #
  # Note: Issue #73 split the monolithic reach_layer service into three
  # independently-deployable channel services (cli/web/voice) that share the
  # reach_layer_base HTTP helpers. Deploy only the channel(s) you need.
  # ---------------------------------------------------------------------------
  reach_layer_web:
    image: sanketikahub/dpg-reach-layer-web:latest
    pull_policy: always
    container_name: reach_layer_web
    environment:
      - CONFIG_FOLDER=/app/config
      # Optional when auth.enabled: false (default). Required and validated by server.py
      # at startup when auth.enabled: true — export both before running docker compose.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - REACH_SESSION_SECRET=${REACH_SESSION_SECRET:-}
      # Upload chain auth — dev-kit → reach-layer and reach-layer → KE keys.
      - DEVKIT_TO_REACH_API_KEY=${DEVKIT_TO_REACH_API_KEY:-}
      - REACH_TO_KE_API_KEY=${REACH_TO_KE_API_KEY:-}
      - KE_INTERNAL_URL=${KE_INTERNAL_URL:-http://knowledge_engine:8001}
    ports:
      - "8005:8005"
    volumes:
      # Unified Reach Layer config: DPG defaults + per-domain overrides.
      # Loader scopes to the web channel via load_reach_config("web").
      - ../../dev-kit/dpg/reach_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/reach_layer.yaml:/app/config/domain.yaml:ro
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      agent_core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health', timeout=5)"]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Reach Layer — CLI channel (on-demand REPL)
  # Session mode: POST /sessions/{id}/input + SSE event stream.
  # Launch with:
  #   docker compose -f docker-compose.dev.yml run --rm reach_layer_cli
  # ---------------------------------------------------------------------------
  # reach_layer_cli:
  #   image: sanketikahub/dpg-reach-layer-cli:latest
  #   pull_policy: always
  #   container_name: reach_layer_cli
  #   volumes:
  #     # Unified Reach Layer config: DPG defaults + per-domain overrides.
  #     # Loader scopes to the cli channel via load_reach_config("cli").
  #     - ../../dev-kit/dpg/reach_layer.yaml:/app/config/dpg.yaml:ro
  #     - ../../dev-kit/configs/${DOMAIN:-kkb}/reach_layer.yaml:/app/config/domain.yaml:ro
  #   networks:
  #     - dpg_net
  #   stdin_open: true
  #   tty: true
  #   depends_on:
  #     agent_core:
  #       condition: service_healthy
  #   profiles:
  #     - cli  # do not auto-start with `docker compose up`; use `run --rm`

  # ---------------------------------------------------------------------------
  # Reach Layer — Voice channel (port 8006)
  # Vobiz/WebSocket telephony bridge. Session mode (pipecat pipeline).
  # PUBLIC_URL must be set before starting (export PUBLIC_URL=https://...).
  # Use the ngrok service to get a public URL automatically.
  # ---------------------------------------------------------------------------
  reach_layer_voice:
    image: sanketikahub/dpg-reach-layer-voice:latest
    pull_policy: always
    container_name: reach_layer_voice
    environment:
      - DPG_CONFIG_PATH=/app/config/dpg.yaml
      - DOMAIN_CONFIG_PATH=/app/config/domain.yaml
      - NLTK_DATA=/tmp/nltk_data
      - PUBLIC_URL=${PUBLIC_URL:-}                       # set from shell or use ngrok service
      - VOBIZ_AUTH_ID=${VOBIZ_AUTH_ID:-}
      - VOBIZ_AUTH_TOKEN=${VOBIZ_AUTH_TOKEN:-}
      - VOBIZ_FROM_NUMBER=${VOBIZ_FROM_NUMBER:-}
      - RAYA_API_KEY=${RAYA_API_KEY:-}
    volumes:
      # Unified Reach Layer config: DPG defaults + per-domain overrides.
      # Loader scopes to the voice channel via load_reach_config("voice").
      - ../../dev-kit/dpg/reach_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/reach_layer.yaml:/app/config/domain.yaml:ro
    ports:
      - "8006:8006"
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    depends_on:
      agent_core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8006/health')\""]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Trust Layer — content safety gate (port 8003)
  # ---------------------------------------------------------------------------
  trust_layer:
    image: sanketikahub/dpg-trust-layer:latest
    pull_policy: always
    container_name: trust_layer
    environment:
      - CONFIG_FOLDER=/app/config
    volumes:
      - ../../dev-kit/dpg/trust_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/${DOMAIN:-kkb}/trust_layer.yaml:/app/config/trust_layer.yaml:ro
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health', timeout=5)"]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana — dashboards UI (port 3000)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.3.3
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Jaeger — distributed trace UI (port 16686)
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "14250:14250"   # gRPC from Collector
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Loki — log aggregation (port 3100)
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    ports:
      - "3100:3100"
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Memgraph — persistent user profile store for Memory Layer (open-source, Bolt-compatible)
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # Memgraph Lab — graph browser UI (port 3002)
  # Open http://localhost:3002 to explore the Memory Layer's context graph.
  # ---------------------------------------------------------------------------
  memgraph_lab:
    image: memgraph/lab:latest
    container_name: memgraph_lab
    environment:
      - QUICK_CONNECT_MG_HOST=memgraph
      - QUICK_CONNECT_MG_PORT=7687
    ports:
      - "3002:3000"
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    depends_on:
      memgraph:
        condition: service_healthy
    restart: unless-stopped

  memgraph:
    image: memgraph/memgraph
    container_name: memgraph
    command: [
      "/usr/lib/memgraph/memgraph",
      "--storage-wal-enabled=true",
      "--storage-snapshot-interval-sec=300"
    ]
    volumes:
      - memgraph_data:/var/lib/memgraph
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole --host 127.0.0.1 --port 7687 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ngrok — exposes reach_layer_voice (port 8006) to the public internet.
  # Required so Vobiz can reach /answer and /ws/{call_sid} from outside.
  #
  # Prerequisites:
  #   export NGROK_AUTHTOKEN=<your token>   # https://dashboard.ngrok.com/authtokens
  #
  # Once running, find your public URL:
  #   docker logs ngrok                     # prints the forwarding URL on startup
  #   curl http://localhost:4040/api/tunnels # ngrok local API (JSON)
  #
  # Then set PUBLIC_URL and restart the voice service:
  #   export PUBLIC_URL=https://abc123.ngrok-free.app
  #   docker compose up -d reach_layer_voice
  # ---------------------------------------------------------------------------
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    command: http reach_layer_web:8005 --log stdout
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"                          # ngrok local API / inspector UI
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    depends_on:
      reach_layer_web:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OTel Collector — receives OTLP, fans out to Jaeger / Prometheus / Loki
  # ---------------------------------------------------------------------------
  otelcol:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: otelcol
    command: ["--config=/etc/otelcol/otelcol-config.yaml"]
    volumes:
      - ./otelcol/otelcol-config.yaml:/etc/otelcol/otelcol-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics scrape endpoint
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    # No healthcheck — the contrib image has no wget/curl.
    # OTel collector is not a dependency for any DPG service.
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prometheus — metrics store (port 9090)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis — session state backend for Memory Layer
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

networks:
  dpg_net:
    driver: bridge

volumes:
  chroma_data:                             # ChromaDB embeddings, persisted across container restarts
  memgraph_data:                           # Memgraph graph database, persisted across container restarts
  kb_data:                                 # KB document upload staging area (shared: reach-layer → knowledge-engine)
