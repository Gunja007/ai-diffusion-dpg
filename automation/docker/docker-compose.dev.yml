# automation/docker/docker-compose.yml
#
# Runs all 7 DPG services on a single machine using pre-built Docker Hub images.
# Each service receives two volume-mounted config files:
#   /app/config/dpg.yaml    — DPG framework defaults (from dev-kit/dpg/)
#   /app/config/domain.yaml — domain-specific values (from dev-kit/configs/kkb/)
# Services deep-merge these at startup: domain values override DPG defaults.
# Both config files are mandatory — service will not start if either is missing.
#
# Ingestion flow (Knowledge Engine):
#   On startup, KE runs: python scripts/ingest.py && python main.py
#   Ingest reads docs from knowledge_engine/data/ (bind-mounted as /app/data),
#   writes embeddings into chroma_data volume at /app/data/chroma_db (writable named
#   volume that overrides the read-only bind mount for that subdirectory).
#   Server starts only after ingest completes successfully.
#
# Prerequisites:
#   1. export ANTHROPIC_API_KEY=sk-ant-...
#   2. docker compose up -d               (runs ingest first, then starts all services)
#   3. docker compose run --rm reach_layer (interactive CLI session)
#
# Paths in this file are relative to the docker-compose.yml location.
# ../../ resolves to the repository root.
#
# Resource limits (local testing):
#   All services: 0.1 CPU, 512 MB RAM
#   Knowledge Engine (ingest + serve): 0.2 CPU, 512 MB RAM

services:

  # ---------------------------------------------------------------------------
  # Redis — session state backend for Memory Layer
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Memgraph — persistent user profile store for Memory Layer (open-source, Bolt-compatible)
  # ---------------------------------------------------------------------------
  memgraph:
    image: memgraph/memgraph-platform
    container_name: memgraph
    command: [
      "/usr/lib/memgraph/memgraph",
      "--storage-wal-enabled=true",
      "--storage-snapshot-interval-sec=300"
    ]
    volumes:
      - memgraph_data:/var/lib/memgraph
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7444 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Memory Layer — session state store (port 8002)
  # ---------------------------------------------------------------------------
  memory_layer:
    image: srivatsak2002/dpg-memory-layer:latest
    container_name: memory_layer
    environment:
      - CONFIG_FOLDER=/app/config
      - REDIS_URL=redis://redis:6379/0
      - MEMGRAPH_URI=bolt://memgraph:7687
      - MEMGRAPH_USER=memgraph
      - MEMGRAPH_PASSWORD=
    volumes:
      - ../../dev-kit/dpg/memory_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/kkb/memory_layer.yaml:/app/config/domain.yaml:ro
    networks:
      - dpg_net
    depends_on:
      redis:
        condition: service_healthy
      memgraph:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Trust Layer — content safety gate (port 8003)
  # ---------------------------------------------------------------------------
  trust_layer:
    image: srivatsak2002/dpg-trust-layer:latest
    container_name: trust_layer
    environment:
      - CONFIG_FOLDER=/app/config
    volumes:
      - ../../dev-kit/dpg/trust_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/kkb/trust_layer.yaml:/app/config/domain.yaml:ro
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Learning Layer — async observability (port 8004)
  # ---------------------------------------------------------------------------
  learning_layer:
    image: srivatsak2002/dpg-learning-layer:latest
    container_name: learning_layer
    environment:
      - CONFIG_FOLDER=/app/config
    volumes:
      - ../../dev-kit/dpg/learning_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/kkb/learning_layer.yaml:/app/config/domain.yaml:ro
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Action Gateway — external API stub / ONEST mock (port 9999)
  # ---------------------------------------------------------------------------
  action_gateway:
    image: srivatsak2002/dpg-action-gateway:latest
    container_name: action_gateway
    environment:
      - CONFIG_FOLDER=/app/config
    volumes:
      - ../../dev-kit/dpg/action_gateway.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/kkb/action_gateway.yaml:/app/config/domain.yaml:ro
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9999/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Knowledge Engine — RAG, NLU, prompt assembly (port 8001)
  # On startup: runs ingest first, then starts the server.
  # ---------------------------------------------------------------------------
  knowledge_engine:
    image: srivatsak2002/dpg-knowledge-engine:latest
    container_name: knowledge_engine
    environment:
      - CONFIG_FOLDER=/app/config
    user: root                               # needed to write to root-owned chroma_data named volume
    command: ["sh", "-c", "if [ ! -f /app/data/chroma_db/chroma.sqlite3 ]; then echo 'ChromaDB empty — running ingest...' && python -m scripts.ingest --config config/domain.yaml; else echo 'ChromaDB exists — skipping ingest.'; fi && python main.py"]
    volumes:
      - ../../dev-kit/dpg/knowledge_engine.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/kkb/knowledge_engine.yaml:/app/config/domain.yaml:ro
      - ../../knowledge_engine/data:/app/data:ro   # source docs (read-only)
      - chroma_data:/app/data/chroma_db            # embeddings (writable, overrides :ro for this subdir)
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 180s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Agent Core — orchestrator and LLM caller (port 8000)
  # ---------------------------------------------------------------------------
  agent_core:
    image: srivatsak2002/dpg-agent-core:latest
    container_name: agent_core
    environment:
      - ANTHROPIC_API_KEY                  # inherited from shell: export ANTHROPIC_API_KEY=sk-...
      - CONFIG_FOLDER=/app/config
    volumes:
      - ../../dev-kit/dpg/agent_core.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/kkb/agent_core.yaml:/app/config/domain.yaml:ro
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M
    depends_on:
      knowledge_engine:
        condition: service_healthy
      memory_layer:
        condition: service_healthy
      trust_layer:
        condition: service_healthy
      learning_layer:
        condition: service_healthy
      action_gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Reach Layer — interactive CLI (no HTTP port exposed)
  # Run separately: docker compose run --rm reach_layer
  # ---------------------------------------------------------------------------
  reach_layer:
    image: srivatsak2002/dpg-reach-layer:latest
    container_name: reach_layer
    environment:
      - CONFIG_FOLDER=/app/config
    volumes:
      - ../../dev-kit/dpg/reach_layer.yaml:/app/config/dpg.yaml:ro
      - ../../dev-kit/configs/kkb/reach_layer.yaml:/app/config/domain.yaml:ro
    networks:
      - dpg_net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M
    depends_on:
      agent_core:
        condition: service_healthy
    stdin_open: true
    tty: true
    profiles:
      - cli                                # not started by default; run explicitly

networks:
  dpg_net:
    driver: bridge

volumes:
  chroma_data:                             # ChromaDB embeddings, persisted across container restarts
  memgraph_data:                           # Memgraph graph database, persisted across container restarts
