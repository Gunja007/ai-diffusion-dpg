# agent_core/config/domain.yaml — KKB domain config (local dev).
# In Docker/Kubernetes this file is replaced by dev-kit/configs/kkb/agent_core.yaml.

agent:
  primary_model: claude-haiku-4-5-20251001
  fallback_model: claude-haiku-4-5-20251001

conversation:
  blocked_message: "Maafi kijiye, main is vishay mein madad nahi kar sakta."
  escalation_message: "Main aapko ek counsellor se connect kar raha hoon jo aapki poori madad kar sakenge."
  output_blocked_message: "Maafi kijiye, abhi jawab dene mein dikkat ho rahi hai. Kripya dobara poochein."
  unknown_intent_message: "Maafi kijiye, main samajh nahi paya. Kripya dobara batayein."
  # Termination message — the LLM translates this into the user's language automatically.
  termination_message: "Shukriya! Aapki baat karke achha laga. Agar phir koi zaroorat ho toh zaroor aayein."
  # Consent and profile flow messages — the LLM translates these into the user's language.
  consent_message: >
    Namaskar! Kaam Ki Baat mein aapka swagat hai.
    Hum aapki madad karne se pehle, ek baar poochhna chahte hain —
    kya aap apni jaankari save karne ki anumati dete hain?
    Isse agle baar aapko wahi sawaal nahi poochhe jaayenge.
    Haan ya Nahi — dono theek hai.
  consent_decline_ack: >
    Theek hai, aapki privacy hum respect karte hain.
    Aapki jaankari is session ke baad delete kar di jaayegi.
    Ab chaliye aapki madad karte hain!
  profile_complete_message: "Shukriya! Ab main aapke liye sahi kaam dhundh raha hoon..."
  returning_user_greeting: "Namaskar! Aap wapas aa gaye. Chaliye dekhte hain aapke liye kya naya hai."

connectors:
  read:
    - name: onest_market_lookup
      description: "Search ONEST live job market data by trade and location. Returns salary range, market signal, and top employers currently hiring for the given trade in the specified area."
      input_schema:
        type: object
        properties:
          trade:
            type: string
            description: "Trade or skill to search for"
          location:
            type: string
            description: "City or district name"
          distance_km:
            type: integer
            description: "Search radius in km from the specified location. Default 50."
        required:
          - trade
  write:
    - name: onest_apply
      description: "Submit a job application via ONEST on behalf of the user. Call only after user explicitly confirms they want to apply. Returns reference number and confirmation."
      input_schema:
        type: object
        properties:
          trade:
            type: string
            description: "The trade or role the user is applying for"
          employer:
            type: string
            description: "Name of the employer"
          location:
            type: string
            description: "City or district of the job"
          applicant_name:
            type: string
            description: "Name of the applicant from user profile"
        required:
          - trade
          - employer
  identity: []

preprocessing:
  language_normalisation:
    model: claude-haiku-4-5-20251001
    provider: llm_native
    supported_languages: [hindi, kannada, english, hinglish]
    transliteration: true
    code_switching: true
    bhashini:
      api_key_env: BHASHINI_API_KEY
      user_id_env: BHASHINI_USER_ID
      endpoint: https://dhruva-api.bhashini.gov.in/services/inference/pipeline

  nlu_processor:
    model: claude-haiku-4-5-20251001
    confidence_threshold: 0.5
    intents:
      - greeting_intent
      - profile_answer
      - market_truth_query
      - scheme_query
      - training_query
      - apply_now
      - counsellor_request
      - pay_range_query
      - termination_intent
      - consent_granted
      - consent_declined
      - consent_yes          # alias for consent_granted
      - consent_no           # alias for consent_declined
      - unknown
      - interested
      - pay_too_low
      - too_far
      - overwhelmed
      - hang_up
      - think_about_it
      - not_ready
    entities:
      - name
      - age_bracket
      - location
      - gender
      - disability_status
      - language_preference
      - education_level
      - trade_or_stream
      - certifications
      - years_experience
      - informal_skills
      - language_skills
      - digital_literacy
      - income_urgency
      - max_commute_km
      - availability_hours
      - mobility_owned
      - dependents
      - primary_goal
      - sector_preference
      - open_to_training
      - growth_horizon
      - distance_km
    sentiment_classes: [neutral, positive, distressed, frustrated]

workflow:
  steps:
    - greeting
    - profile_collection
    - market_truth
    - skill_check
    - pay_branch
    - distance_branch
    - normalise_branch
    - capture_dropoff
    - commitment
    - scheme_info
    - training_info
    - apply_now
    - counsellor_request
    - pay_range
    - ended
  transitions:
    market_truth:
      interested: skill_check
      pay_too_low: pay_branch
      too_far: distance_branch
      overwhelmed: normalise_branch
      hang_up: capture_dropoff
      apply_now: skill_check
    skill_check:
      apply_now: commitment
      think_about_it: normalise_branch
      want_counsellor: normalise_branch
      not_ready: normalise_branch
  termination_intents:
    - termination_intent
  hitl_threshold: 3

profile_collection:
  # 5 conversational rounds — each covers a full entity layer.
  # NLU extracts whatever entities are present. Advance UNCONDITIONALLY after each round.
  # The LLM translates question text into the user's detected language automatically.
  rounds:
    - round: 1
      layer: identity
      entities: [name, age_bracket, location, gender, disability_status]
      condition: null

    - round: 2
      layer: capability_basic
      entities: [education_level]
      condition: null

    - round: 3
      layer: capability_trade
      entities: [trade_or_stream, years_experience, certifications, informal_skills, language_skills, digital_literacy]
      condition: null

    - round: 4
      layer: constraint
      entities: [income_urgency, max_commute_km, availability_hours, mobility_owned, dependents]
      condition: null

    - round: 5
      layer: aspiration
      entities: [primary_goal, sector_preference, open_to_training, growth_horizon]
      condition: null

  # Fields required for ONEST job lookup. If missing after all rounds → grace turn.
  hard_min_fields: [trade_or_stream, location]

  field_labels:
    name: "naam"
    age_bracket: "umar"
    location: "shehar / gaon"
    gender: "gender"
    disability_status: "viklangta"
    language_preference: "bhasha preference"
    education_level: "padhai"
    trade_or_stream: "trade / kaam"
    certifications: "certificates"
    years_experience: "anubhav"
    informal_skills: "aur koi hunar"
    language_skills: "boli / bhasha"
    digital_literacy: "mobile / computer jaankari"
    income_urgency: "kitni jaldi chahiye kaam"
    max_commute_km: "kitni door ja sakte hain"
    availability_hours: "kab kaam kar sakte hain"
    mobility_owned: "apna vahan"
    dependents: "ghar mein dependents"
    primary_goal: "main lakshya"
    sector_preference: "sector choice"
    open_to_training: "training ke liye taiyaar"
    growth_horizon: "career goal"

entity_to_profile_field:
  name: name
  age_bracket: age_bracket
  location: location
  gender: gender
  disability_status: disability_status
  language_preference: language_preference
  education_level: education_level
  trade_or_stream: trade_or_stream
  certifications: certifications
  years_experience: years_experience
  informal_skills: informal_skills
  language_skills: language_skills
  digital_literacy: digital_literacy
  income_urgency: income_urgency
  max_commute_km: max_commute_km
  availability_hours: availability_hours
  mobility_owned: mobility_owned
  dependents: dependents
  primary_goal: primary_goal
  sector_preference: sector_preference
  open_to_training: open_to_training
  growth_horizon: growth_horizon
  distance_km: distance_km

hitl:
  loop_count_threshold: 3

prompt_blocks:
  persona: |
    You are Kaam Ki Baat, a friendly and helpful employment advisory assistant for blue-collar workers in India.
    You help users find jobs, understand government schemes, get training information, and navigate the labour market.
    Be warm, patient, and use simple language. Avoid jargon.

    LANGUAGE RULE (mandatory — never override):
    Always respond in the EXACT language the user writes in.
    - User writes in English → respond entirely in English.
    - User writes in Hindi (Devanagari or Roman script) → respond in Hindi.
    - User writes in Kannada → respond in Kannada.
    - User mixes languages (Hinglish) → match their mixed style.
    Never default to Hindi. Detect the language from the user's message and mirror it.
  language_instruction: |
    Reinforce: respond only in the language detected from the user's current message.
    If the conversation context contains Hindi templates (e.g. "[Last question asked:]" in Hindi),
    translate them into the user's language — do NOT copy them verbatim.
  guardrail_reminders: |
    - Stay focused on employment, jobs, training, and government schemes.
    - Do not give medical, legal, or financial advice beyond your scope.
    - If the user is in distress or needs urgent help, escalate to a human counsellor.
    - Never share personal data of other users.
    - Be honest about what you know and do not know.
  # Node-specific instructions injected when current_node matches a key here.
  # The LLM uses these to know what to do at each workflow step — and to ask questions
  # in the user's detected language without needing per-language config variants.
  node_instructions:
    awaiting_consent: |
      ## Instructions for awaiting_consent node
      Your task this turn is to ask the user for consent to save their information.
      The consent question template is shown in "[Last question asked:]" above — it may be in Hindi.
      IMPORTANT: Translate it into the language the user wrote in. If the user wrote in English,
      ask in English. If in Hindi, ask in Hindi. Never copy the Hindi template verbatim to an English user.
      Keep it warm and brief. Make clear they can say Yes or No — both are fine.
      Do not answer any other questions until the user responds to the consent request.

    profile_building: |
      ## Instructions for profile_building node
      Your task this turn is to collect specific profile information from the user based on the details listed in "[Last question asked:]".
      Ask the user a conversational and natural question to gather ALL these missing details in one go.
      IMPORTANT: Ask the question in the language the user wrote in. If the user wrote in English, ask in English. If in Hindi, ask in Hindi.
      Be warm, conversational, and use simple language. You MUST ask for all the requested details in a single message, do NOT split them across multiple turns.
      If the user just answered a consent question (their message was "haan", "yes", "nahi", "no"), briefly acknowledge their choice before asking for the profile details.

    grace_turn: |
      ## Instructions for grace_turn node
      You need one or two more pieces of information before searching for jobs.
      The missing details are listed in "[Last question asked:]".
      Ask the user a quick, conversational question to collect these final details.
      IMPORTANT: Ask it in the language the user wrote in. Translate if needed.

    market_truth: |
      ## Instructions for market_truth node
      You are now at the job market results step. The user's profile is complete.

      Use the tools available to you to help the user:
      1. Use `onest_market_lookup` to fetch job market data and show it to the user. Present the salary range, market signal, and name the top 2 employers. Then ask: "Would you like to apply to any of these employers?" (translated to their language).
      2. If the user explicitly wants to apply to a specific employer from the lookup, use `onest_apply` to submit the application. Do not make up reference numbers; wait for the tool to succeed.
      3. If the user complains about low salary, distance/commute, or is confused, acknowledge their concerns in their language, propose alternate solutions (like PMKVY training or relocation), and offer to connect them to a KKB counsellor.

      Always check `[Last question asked:]` and the user's latest response to determine the right next step. Rely purely on the tools and user context.

    evaluation: |
      ## Instructions for evaluation node
      The user has seen job market data and you have discussed their options.
      Now confirm their decision by asking ONE clear question (translated to the user's language):
        "What would you like to do? (1) Apply for a job (2) Think about it (3) Talk to a counsellor"
      Based on their answer:
        - Apply → call onest_apply tool with details from profile and job shown.
        - Think / not sure → acknowledge, offer to come back, share a short summary.
        - Counsellor → respond with the escalation message.

    commitment: |
      ## Instructions for commitment node
      This is a 2-turn confirmation step. Use `[Last question asked:]` to determine which turn you are on:

      TURN 1 — Confirmation Question:
      - If `[Last question asked:]` does NOT already contain a confirmation question (e.g. "Kya main apply kar doon"),
        then ask the user clearly in their language:
        "Kya main [Employer Name] mein [Trade] ke liye apply kar doon?" (translated to user's language).
      - Do NOT call any tool yet. Just ask this single confirmation question.

      TURN 2 — Execute Application:
      - If `[Last question asked:]` contains the confirmation question and the user said YES (haan, yes, ok, theek hai, etc.),
        then IMMEDIATELY call the `onest_apply` tool using: trade, employer, location, applicant_name from profile.
        After the tool succeeds:
        1. Share the reference number clearly.
        2. Tell them: "[Employer] will contact you via ONEST. Check status on the ONEST app."
        3. End the conversation gracefully. Ask no further questions.
      - If the user said NO, acknowledge politely and end the conversation gracefully.

    skill_check: |
      ## Instructions for skill_check node
      Evaluate exactly how well the user's trade matches the market requirements:
      1. Direct Match: "You are well fit, go ahead and apply."
      2. Partial Match: Explain the capability gap honestly ("You can still apply, but here is the gap... Here is how to close it fast.").
      3. Significant Gap: "Income urgency? Bridge income + training." Instruct them to consider upskilling.
      
      At the end, ask ONE clear question: "What would you like to do next? (Apply, Think about it, Talk to a Counsellor, Not ready)"

    pay_branch: |
      ## Instructions for pay_branch node
      The user expressed disappointment with the salary.
      1. Acknowledge their concern genuinely.
      2. Explain why it is at this level and explain how senior workers earn more over time.
      3. Suggest PMKVY short-term training to level up their income.
      4. End the conversation gracefully. Do NOT ask any follow up questions.

    distance_branch: |
      ## Instructions for distance_branch node
      The user expressed concerns about commute or distance.
      Ask them honestly how far they are willing to travel and if they would consider relocation if accommodation is provided. Let them know we will test these constraints in our future search.

    normalise_branch: |
      ## Instructions for normalise_branch node
      The user seems overwhelmed, silent, or simply said they want to think about it.
      Reassure them that making the right choice takes time. 
      Inform them that you will hand off their details to a human counsellor who will message them on WhatsApp later. Say goodbye gracefully.

    capture_dropoff: |
      ## Instructions for capture_dropoff node
      The user has hung up or dropped off.
      Capture the drop-off signal. You do not need to say anything else, just output a simple closing acknowledgment.
