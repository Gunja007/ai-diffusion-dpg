# agent_core/config/dpg.yaml — DPG framework defaults.
# These values are the same for any domain deployment.

server:
  host: 0.0.0.0
  port: 8000

agent:
  timeout_ms: 10000
  retry_attempts: 2
  retry_backoff_seconds: [0, 0.5, 1.0]
  max_tool_rounds: 3

conversation:
  max_turns: 20
  # blocked_message, escalation_message, output_blocked_message are domain-specific
  # persona text — they must be set in domain.yaml, not here.

# Default service client endpoints (localhost for local dev).
# Override in domain.yaml or deployment config for staging/production.
ke_client:
  endpoint: "http://localhost:8001/retrieve"
  timeout_ms: 30000

memory_client:
  endpoint: "http://localhost:8002"
  timeout_ms: 3000

trust_client:
  endpoint: "http://localhost:8003"
  timeout_ms: 2000

learning_client:
  endpoint: "http://localhost:8004"
  timeout_ms: 2000

action_gateway_client:
  endpoint: "http://localhost:9999"
  timeout_ms: 5000

# Reach Layer channel config — grouped here because TurnAssembler is an
# Agent Core component, but tuning is per-channel.
# assembly_mode lives in reach_layer.yaml (Reach Layer concern, not Agent Core).
reach_layer:
  # Default turn_assembler policy stack — applies to any channel that
  # does not declare its own turn_assembler section under channels.<name>.
  turn_assembler:
    semantic_gate:
      enabled: false             # Enable NLU-based early trigger (requires nlu_processor)
      confidence_threshold: 0.75 # Invoke immediately if NLU confidence >= this value
    silence_trigger:
      silence_ms: 400            # ms of silence before invoking (resets on each segment)
    max_wait_ceiling:
      max_wait_ms: 8000          # Absolute max wait ms — never resets
  channels: {}                   # Per-channel overrides set in domain config

# Observability — OTel collector endpoint for trace/metric export.
observability:
  otel:
    collector_endpoint: "http://localhost:4317"
    sample_rate: 1.0
    export_interval_ms: 5000
