# agent_core/config/config.yaml — service configuration loaded once at startup.
# Secrets (ANTHROPIC_API_KEY) are never stored here — use environment variables.

server:
  host: 0.0.0.0       # 0.0.0.0 for Docker/container; 127.0.0.1 for local-only
  port: 8000

agent:
  primary_model: claude-haiku-4-5-20251001  # PoC/dev: Haiku everywhere. Change to claude-sonnet-4-6 for prod.
  fallback_model: claude-haiku-4-5-20251001 # PoC/dev: same as primary. Change to a lighter fallback for prod.
  timeout_ms: 10000                         # per-request timeout (ms)
  retry_attempts: 2                         # retries on rate-limit/timeout before fallback
  retry_backoff_seconds: [0, 0.5, 1.0]     # delay per attempt (index = attempt number, 0-based)
  max_tool_rounds: 1                        # max tool→LLM cycles per turn

conversation:
  max_turns: 20                             # turns kept in session history
  blocked_message: "I'm unable to help with that request."
  escalation_message: "I'm connecting you to a human agent who can better assist you."
  output_blocked_message: "I wasn't able to produce a safe response. Please try rephrasing your question."

connectors:
  read:
    - name: onest_market_lookup
      description: "Search ONEST live job market data by trade and location"
      # Action Gateway stub serves this at: http://localhost:9999/onest/market_lookup
  write: []     # action connectors (require user consent via Trust Layer)
  identity: []  # identity verification connectors (require user consent)

ke_client:
  endpoint: "http://localhost:8001/assemble_prompt"
  timeout_ms: 30000

memory_client:
  endpoint: "http://localhost:8002"
  timeout_ms: 3000

trust_client:
  endpoint: "http://localhost:8003"
  timeout_ms: 2000

learning_client:
  endpoint: "http://localhost:8004"
  timeout_ms: 2000

action_gateway_client:
  endpoint: "http://localhost:9999/onest/market_lookup"
  timeout_ms: 5000

# Pre-KE processing steps run directly in Agent Core using the primary LLM wrapper.
# These blocks use a fast model (Haiku) regardless of the agent's primary_model.
preprocessing:
  language_normalisation:
    model: claude-haiku-4-5-20251001
    provider: llm_native              # options: llm_native | bhashini (post-PoC stub)
    supported_languages: [hindi, kannada, english, hinglish]
    transliteration: true
    code_switching: true
    bhashini:                         # used only when provider: bhashini (post-PoC)
      api_key_env: BHASHINI_API_KEY   # name of the environment variable holding the key
      user_id_env: BHASHINI_USER_ID   # name of the environment variable holding the user ID
      endpoint: https://dhruva-api.bhashini.gov.in/services/inference/pipeline

  nlu_processor:
    model: claude-haiku-4-5-20251001
    confidence_threshold: 0.5   # below this → early exit, no KE call
    history_turns: 2            # recent turns injected for context-aware classification
    intents:
      - market_truth_query
      - scheme_query
      - training_query
      - apply_now
      - counsellor_request
      - pay_range_query
      - unknown
    entities: [trade, location, distance_km, income_urgency]
    sentiment_classes: [neutral, positive, distressed, frustrated]
