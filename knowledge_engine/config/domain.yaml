# knowledge_engine/config/domain.yaml — DPG domain configuration template.
#
# This file is the template a domain integrator fills in.
# For local dev, set CONFIG_FOLDER in .env.local to point to your domain configs folder.
# The full annotated reference is in dev-kit/dev_kit/schemas/knowledge_engine.yaml.

knowledge:
  blocks:
    glossary:
      enabled: true
      mappings: []  # Required. List of {colloquial: [...], canonical: "..."} entries.
                    # Example: { colloquial: ["naukri chahiye", "job chahiye"], canonical: "market_truth_query" }
      apply_to:     # Required. Fields to apply glossary normalisation to.
        - normalised_input
        - entities

    static_knowledge_base:
      enabled: true
      collection_name: ""           # Required. ChromaDB collection name for this domain.
      chroma_persist_dir: ./data/chroma_db  # Path to ChromaDB persistence directory.
      sources: []                   # Required. List of {path, type, doc_type, refresh} entries.
                                    # type: static | always_include
                                    # refresh: manual | annual | monthly
                                    # Example: { path: ./data/schemes.pdf, type: static, doc_type: scheme, refresh: manual }
      intent_filters: {}            # Required. Map of intent → list of doc_types to retrieve.
                                    # Example: { market_truth_query: [scheme, trade], scheme_query: [scheme] }

    multimodal_input_handler:
      enabled: false                # Set true if the agent accepts image inputs.
      image_model: ""               # Optional. Claude model ID for image understanding (when enabled).

# NOTE: conversation.persona / language_instruction / guardrail_reminders are
# owned by agent_core (the sole orchestrator and LLM caller). The Knowledge
# Engine returns retrieval chunks only — do not duplicate those fields here.

observability:
  domain: ""  # Required. Domain identifier (e.g. "kkb", "farmer_friendly").
